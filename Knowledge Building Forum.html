<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>知識建構協作平台 (KB Platform) - Mobile Optimized</title>
    
    <!-- 引入 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                    },
                    colors: {
                        kb: {
                            blue: '#3b82f6',
                            yellow: '#eab308',
                            green: '#22c55e',
                            red: '#ef4444',
                            purple: '#a855f7',
                        }
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    padding: {
                        'safe-bottom': 'env(safe-area-inset-bottom)',
                    }
                }
            }
        }
    </script>
    <style>
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            overscroll-behavior: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        #canvas-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: -1;
        }
        
        .custom-scroll { -webkit-overflow-scrolling: touch; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .node-card {
            transition: box-shadow 0.2s, transform 0.2s; 
            user-select: none; touch-action: none; -webkit-user-select: none;
            will-change: left, top; 
        }
        .node-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            z-index: 50;
        }
        .node-card.selected-node {
            box-shadow: 0 0 0 3px #3b82f6, 0 10px 15px -3px rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            z-index: 60;
        }
        .promising-node {
            box-shadow: 0 0 0 4px rgba(251, 146, 60, 0.3), 0 0 20px rgba(251, 146, 60, 0.4);
            border-color: #f97316 !important;
        }
        .cluster-zone {
            position: absolute;
            border: 2px dashed rgba(203, 213, 225, 0.6);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 1rem;
            pointer-events: none;
            transition: all 0.5s ease-in-out;
            background: rgba(255, 255, 255, 0.4);
        }
        .cluster-title {
            font-weight: 700;
            font-size: 1rem;
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background: white;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        path.connection { fill: none; stroke-width: 2; transition: stroke 0.3s; pointer-events: none; }
        
        #selection-box {
            position: fixed;
            background-color: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.5);
            pointer-events: none;
            z-index: 100;
            display: none;
        }
        .noselect {
            -webkit-touch-callout: none; -webkit-user-select: none;
            -khtml-user-select: none; -moz-user-select: none;
            -ms-user-select: none; user-select: none;
        }
        
        /* 🔥 [ADDED] Canvas Scrollbar Styles */
        .canvas-scrollbar-track {
            position: absolute;
            background: rgba(226, 232, 240, 0.4);
            border-radius: 10px;
            z-index: 90;
            pointer-events: auto;
            transition: opacity 0.2s;
        }
        .canvas-scrollbar-track:hover { background: rgba(226, 232, 240, 0.7); }
        .canvas-scrollbar-thumb {
            position: absolute;
            background: rgba(100, 116, 139, 0.6);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .canvas-scrollbar-thumb:hover, .canvas-scrollbar-thumb.dragging {
            background: rgba(71, 85, 105, 0.9);
        }
        #scrollbar-v-track { top: 70px; bottom: 70px; right: 6px; width: 8px; }
        #scrollbar-v-thumb { top: 0; left: 0; width: 100%; min-height: 30px; }
        #scrollbar-h-track { left: 20px; right: 20px; bottom: 80px; height: 8px; } /* Elevated to avoid bottom nav */
        #scrollbar-h-thumb { top: 0; left: 0; height: 100%; min-width: 30px; }

        @keyframes pulse-gentle { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .ai-pulse { animation: pulse-gentle 2s infinite; }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in-up 0.5s ease-out forwards; }
        
        .category-scroll-container { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .category-scroll-container::-webkit-scrollbar { display: none; }
        @media (min-width: 768px) { .category-scroll-container { overflow-x: visible; } }
        
        .nav-btn.active { color: #4f46e5; background-color: #e0e7ff; }
        .mobile-nav-btn.active { color: #4f46e5; }
        .filter-btn { transition: background-color 0.2s, color 0.2s, border-color 0.2s; border-color: rgb(226, 232, 240); }
        .filter-btn.active { background-color: rgb(238, 242, 255); color: rgb(79, 70, 229); border-color: rgb(165, 180, 252); }
        
        #canvas-wrapper { touch-action: none; }
        .category-tag { cursor: pointer; transition: all 0.2s; user-select: none; }
        .category-tag.selected { background-color: #e0e7ff; color: #4338ca; border-color: #818cf8; }
        
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-full w-full flex flex-col font-sans">
    <!-- Top Navbar -->
    <nav class="h-14 md:h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-6 z-50 shadow-sm relative shrink-0">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='#'">
            <div class="w-8 h-8 md:w-10 md:h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-lg md:text-xl shrink-0">KB</div>
            <div>
                <h1 class="font-bold text-base md:text-lg leading-tight text-slate-800 truncate max-w-[120px] md:max-w-none">知識建構平台</h1>
                <p class="text-[10px] md:text-xs text-slate-500 hidden md:block">Knowledge Building Environment (v2.30)</p>
            </div>
        </div>
        
        <div class="hidden md:flex items-center bg-slate-100 p-1 rounded-lg gap-1">
            <button onclick="window.location.href='#'" class="nav-btn px-4 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-900 transition flex items-center gap-1"><i class="fa-solid fa-home"></i> 首頁</button>
            <button onclick="window.app.router('entrance')" data-nav="entrance" class="nav-btn px-4 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-900 transition flex items-center gap-1"><i class="fa-solid fa-layer-group"></i> 論壇入口</button>
            <button onclick="window.app.router('canvas')" data-nav="canvas" class="nav-btn px-4 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-900 transition flex items-center gap-1"><i class="fa-solid fa-project-diagram"></i> 知識地圖</button>
            <div class="relative group">
                <button class="nav-btn px-4 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-900 transition flex items-center gap-1">
                    <i class="fa-solid fa-chart-line"></i> 分析中樞 <i class="fa-solid fa-chevron-down text-[10px] ml-1"></i>
                </button>
                <div class="absolute top-full right-0 mt-1 w-48 bg-white rounded-lg shadow-lg border border-slate-100 hidden group-hover:block overflow-hidden z-50">
                    <a href="#" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-indigo-600"><i class="fa-solid fa-user-graduate mr-2"></i> 學生儀表板</a>
                    <a href="#" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-indigo-600"><i class="fa-solid fa-chalkboard-user mr-2"></i> 老師儀表板</a>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-2 md:gap-4">
            <div id="ai-persona-indicator" class="hidden md:flex items-center gap-2 px-3 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-medium border border-indigo-100">
                <i class="fa-solid fa-robot ai-pulse"></i>
                <span id="active-ai-role">AI 協作中</span>
            </div>
            <div class="h-6 w-px bg-slate-200 mx-1 md:mx-2 hidden md:block"></div>
            <div class="flex items-center gap-2 group relative">
                <img id="user-avatar" src="" class="w-8 h-8 rounded-full bg-slate-200 object-cover border border-slate-300 shrink-0">
                <div class="text-right hidden sm:block">
                    <div id="user-name" class="text-sm font-semibold">User</div>
                    <div id="user-role" class="text-xs text-slate-500">Role</div>
                </div>
                <button onclick="window.app.toggleUserMenu()" class="ml-1 md:ml-2 text-slate-400 hover:text-indigo-600 p-1"><i class="fa-solid fa-chevron-down"></i></button>
                <div id="user-menu" class="absolute top-full right-0 mt-2 w-56 bg-white rounded-lg shadow-xl border border-slate-100 hidden overflow-hidden z-[100]"></div>
            </div>
        </div>
    </nav>
    
    <!-- Main Container -->
    <main id="app-container" class="flex-1 relative overflow-hidden bg-slate-50 w-full"></main>
    
    <!-- Desktop Footer -->
    <footer class="hidden md:flex bg-white border-t border-slate-200 px-4 py-2 text-center z-40 text-[10px] md:text-xs text-slate-500 justify-center items-center gap-2 shrink-0">
        <i class="fa-solid fa-seedling text-green-500"></i>
        <span class="truncate">知識建構：在未完成的理解中彼此承擔責任，使想法在社群裡不斷向更好的解釋演化。</span>
    </footer>
    
    <!-- Mobile Bottom Navigation -->
    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center z-50 pb-safe h-14 box-content">
        <button onclick="window.location.href='#'" class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full pt-1 text-slate-400 hover:text-indigo-600"><i class="fa-solid fa-home text-lg mb-0.5"></i> <span class="text-[10px]">首頁</span></button>
        <button onclick="window.app.router('entrance')" data-nav="entrance" class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full pt-1 text-slate-400 hover:text-indigo-600"><i class="fa-solid fa-layer-group text-lg mb-0.5"></i> <span class="text-[10px]">論壇</span></button>
        <button onclick="window.app.router('canvas')" data-nav="canvas" class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full pt-1 text-slate-400 hover:text-indigo-600"><i class="fa-solid fa-project-diagram text-lg mb-0.5"></i> <span class="text-[10px]">地圖</span></button>
        <button onclick="window.app.openAnalyticsMenu()" class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full pt-1 text-slate-400 hover:text-indigo-600"><i class="fa-solid fa-chart-line text-lg mb-0.5"></i> <span class="text-[10px]">分析</span></button>
    </div>
    
    <!-- Mobile Analytics Menu Modal -->
    <div id="modal-analytics-menu" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden flex items-end justify-center">
        <div class="bg-white w-full rounded-t-xl p-6 pb-10 space-y-4 animate-fade-in-up">
            <h3 class="text-lg font-bold text-slate-800 border-b pb-2 mb-2">前往分析中樞</h3>
            <a href="#" class="flex items-center gap-3 p-4 bg-indigo-50 text-indigo-700 rounded-xl font-bold hover:bg-indigo-100 transition">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm text-xl"><i class="fa-solid fa-user-graduate"></i></div>
                <span>學生儀表板 (Student)</span>
            </a>
            <a href="#" class="flex items-center gap-3 p-4 bg-emerald-50 text-emerald-700 rounded-xl font-bold hover:bg-emerald-100 transition">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm text-xl"><i class="fa-solid fa-chalkboard-user"></i></div>
                <span>老師儀表板 (Teacher)</span>
            </a>
            <button onclick="window.ui.closeModal('modal-analytics-menu')" class="w-full py-3 bg-slate-100 text-slate-600 font-bold rounded-xl mt-2">取消</button>
        </div>
    </div>
    
    <!-- Trash Can FAB -->
    <button onclick="window.app.openTrash()" id="btn-trash-fab" class="fixed bottom-20 left-4 md:bottom-8 md:left-8 z-[60] bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 rounded-full w-12 h-12 md:w-14 md:h-14 shadow-lg flex items-center justify-center text-xl transition transform hover:scale-105 group" title="資源回收桶">
        <i class="fa-solid fa-trash-can group-hover:text-red-500 transition-colors"></i>
        <span id="trash-count-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full hidden border-2 border-white">0</span>
    </button>
    
    <!-- Modals -->
    <div id="modal-topic" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] hidden flex items-end md:items-center justify-center p-4">
        <div class="bg-white rounded-t-xl md:rounded-xl shadow-2xl w-full max-w-lg p-6 transform transition-all scale-100 max-h-[85vh] overflow-y-auto mb-safe md:mb-0">
            <h3 id="modal-topic-title" class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-folder-plus text-indigo-600"></i> 開啟探究主題</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">核心問題</label>
                    <input type="text" id="topic-name" placeholder="例如：為什麼天空是藍色的？" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">類別 (可複選)</label>
                    <div id="topic-category-selector" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto custom-scroll p-1"></div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">背景說明</label>
                    <textarea id="topic-desc" rows="3" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500 transition"></textarea>

            <div class="mt-6 flex justify-end gap-3 pb-safe">

                <button id="btn-topic-save" onclick="window.app.saveTopic()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg shadow hover:bg-indigo-700">建立</button>
            </div>
        </div>
    </div>
    
    <div id="modal-node" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] hidden flex items-end md:items-center justify-center sm:p-4">
        <div class="bg-white rounded-t-xl sm:rounded-xl shadow-2xl w-full max-w-2xl p-4 sm:p-6 relative max-h-[90vh] overflow-y-auto flex flex-col mb-safe md:mb-0">
            <div class="flex justify-between items-center mb-4">
                 <h3 class="text-lg md:text-xl font-bold">貢獻想法</h3>
                 <button onclick="window.ui.closeModal('modal-node')" class="text-slate-400 hover:text-slate-600 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scroll pb-2">
                <div class="grid grid-cols-5 gap-1 md:gap-2 mb-4"><div id="scaffold-selector" class="contents"></div></div>
                <div id="scaffold-desc" class="hidden"></div>
                <div class="mb-3">
                    <input type="text" id="node-title" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none font-bold text-base md:text-lg placeholder:font-normal" placeholder="輸入想法標題...">
                </div>
                <div class="relative">
                    <textarea id="node-content" rows="4" class="w-full px-4 py-3 border border-slate-300 rounded-lg outline-none text-base" placeholder="輸入詳細內容..."></textarea>

                    <div>
                        <span class="font-bold block text-xs uppercase text-blue-400 mb-1">AI 建議</span>

                </div>
            </div>
            <div class="mt-4 flex justify-end shrink-0 pt-2 border-t border-slate-100">

            </div>
        </div>
    </div>
    
    <div id="modal-detail" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[65] hidden flex items-center justify-center p-4">

            </div>
            <div class="mt-6 flex justify-end gap-3">

        </div>

    <div id="modal-trash" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4">

                // ====================================================================================
                // --- Week 1 (Base X: 100) ---
                { id: 'g1-w1-1', topicId: 't-g1', type: 'question', title: '灰塵真的會乖乖被推走嗎？', content: '我現在在想,如果我是空氣裡的一粒灰塵,我真的會乖乖被聲波推去濾網嗎?還是其實我會先被氣流帶著亂跑?我覺得我們以前太快把『有聲波』直接當成『一定會有效』了。', author: 'u11', x: 100, y: 400, parentId: null, date: dates.w1, cluster: 'A', promisingness: 50 },
                { id: 'g1-w1-2', topicId: 't-g1', type: 'question', title: '為什麼數值會先亂跳？', content: '我有個卡住的地方:如果聲波真的能幫忙,為什麼有時候數值不是直接往下降,反而會先亂跳?這表示中間是不是有別的東西在影響?', author: 'u12', x: 450, y: 200, parentId: 'g1-w1-1', date: dates.w1+1000, cluster: 'A', promisingness: 55 },
                { id: 'g1-w1-3', topicId: 't-g1', type: 'question', title: '粒子大小的影響', content: '如果粒子大小不一樣,它們受到聲波的影響會一樣嗎?PM1.0、PM2.5、PM10可能根本不是同一種反應。', author: 'u13', x: 450, y: 600, parentId: 'g1-w1-1', date: dates.w1+2000, cluster: 'A', promisingness: 55 },
                { id: 'g1-w1-4', topicId: 't-g1', type: 'buildon', title: '亂跳代表中間過程', content: '我覺得均燊提到『數值先亂跳』很關鍵,因為那代表我們看到的不只是過濾結果,還有中間的動態過程。', author: 'u13', x: 800, y: 100, parentId: 'g1-w1-2', date: dates.w1+3000, cluster: 'B', promisingness: 60 },
                { id: 'g1-w1-5', topicId: 't-g1', type: 'improve', title: '先問粒子在什麼條件下靠近', content: '我覺得我們第一週先不要問『哪個頻率最好』,先改問『粒子在什麼條件下比較容易靠近濾網』,這樣問題會比較準。', author: 'u11', x: 1150, y: 100, parentId: 'g1-w1-4', date: dates.w1+4000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w1-6', topicId: 't-g1', type: 'improve', title: '修改第一週主題', content: '我們可以先把第一週主題改成『粒子會怎麼走』,而不是『裝置怎麼設計』,這樣比較符合現在的課程方向。', author: 'u12', x: 1500, y: 100, parentId: 'g1-w1-5', date: dates.w1+5000, cluster: 'B', promisingness: 70 },
                { id: 'g1-w1-7', topicId: 't-g1', type: 'counter', title: '不能只用顆粒凝聚解釋', content: '如果只用AI說的顆粒凝聚來解釋,我覺得有點太快。因為現在我們還沒分清楚,到底是凝聚、氣流,還是濾網本身造成的。', author: 'u11', x: 800, y: 600, parentId: 'g1-w1-3', date: dates.w1+6000, cluster: 'A', promisingness: 72 },
                { id: 'g1-w1-8', topicId: 't-g1', type: 'counter', title: '高功率不一定好', content: '我不太認同一開始就把高功率當成比較厲害。功率太大也可能把流場搞亂,說不定反而不利。', author: 'u12', x: 450, y: 800, parentId: 'g1-w1-1', date: dates.w1+7000, cluster: 'A', promisingness: 60 },
                { id: 'g1-w1-9', topicId: 't-g1', type: 'buildon', title: '粒子不一定是直線移動', content: '接均燊剛剛說的,我也覺得粒子不一定是直線移動。因為空氣本來就會亂流,如果聲波一打進去,路線可能更複雜,不是只有往前。', author: 'u11', x: 800, y: 300, parentId: 'g1-w1-2', date: dates.w1+8000, cluster: 'B', promisingness: 55 },
                { id: 'g1-w1-10', topicId: 't-g1', type: 'improve', title: '暫時的假設：碰撞與重新分布', content: '我們可以先記下第一週暫時的假設:粒子不是直接被推走,而是先經過擾動、碰撞、重新分布,最後才有可能被濾網抓住。', author: 'u13', x: 1150, y: 500, parentId: 'g1-w1-7', date: dates.w1+9000, cluster: 'B', promisingness: 68 },
                { id: 'g1-w1-11', topicId: 't-g1', type: 'counter', title: '不能只站設計機器的角度', content: '如果我們只站在人怎麼設計機器的角度,我覺得很容易把自然現象想得太簡單。粒子不會照我們希望的方式移動。', author: 'u13', x: 800, y: 800, parentId: 'g1-w1-8', date: dates.w1+10000, cluster: 'A', promisingness: 65 },
                { id: 'g1-w1-ra', topicId: 't-g1', type: 'riseabove', title: 'W1 小結：粒子行為才是重點', content: '這週真正重要的不是裝置看起來會不會成功,而是粒子在聲波和氣流裡到底怎麼移動。\n(從『裝置怎麼做比較強』轉成『粒子怎麼移動』)', author: 'u11', x: 1850, y: 350, parentId: 'g1-w1-6', date: dates.w1+11000, cluster: 'C', promisingness: 85 }, // 熱點

                // --- Week 2 (Base X: 2200) --- Parent is RA of W1 (串聯)
                { id: 'g1-w2-1', topicId: 't-g1', type: 'improve', title: '哪些條件會讓粒子抓住/逃掉？ (W2 主節點)', content: '我們這週可以把問題改成:『哪些條件會讓粒子比較容易被抓住,哪些條件會讓它逃掉?』這樣比直接問裝置好不好更有方向。', author: 'u13', x: 2200, y: 350, parentId: 'g1-w1-ra', date: dates.w2, cluster: 'A', promisingness: 75 }, // 熱點
                { id: 'g1-w2-2', topicId: 't-g1', type: 'question', title: '粒子會不會先在死角聚起來？', content: '我在想,粒子會不會不是被推去濾網,而是先在某些區域聚起來,之後才慢慢被吸過去?如果是這樣,那裝置裡面可能會有我們沒看到的『死角』。', author: 'u11', x: 2550, y: 150, parentId: 'g1-w2-1', date: dates.w2+1000, cluster: 'A', promisingness: 55 },
                { id: 'g1-w2-3', topicId: 't-g1', type: 'question', title: '氣流穩不穩？會有渦流嗎？', content: '我比較想追問的是:我們裝置裡的氣流到底穩不穩?如果裡面本來就有渦流,那聲波一進去,可能不是單純變強,而是整個路徑都變了。', author: 'u12', x: 2550, y: 550, parentId: 'g1-w2-1', date: dates.w2+2000, cluster: 'A', promisingness: 60 },
                { id: 'g1-w2-4', topicId: 't-g1', type: 'question', title: '聚成大顆是好是壞？', content: '如果粒子在濾網前先聚成比較大顆,那到底是好事還是壞事?理論上比較好抓,可是也有可能堵住路徑,讓後面的流場變掉。', author: 'u13', x: 2900, y: 50, parentId: 'g1-w2-2', date: dates.w2+3000, cluster: 'A', promisingness: 65 },
                { id: 'g1-w2-5', topicId: 't-g1', type: 'buildon', title: '渦流解釋了先升後降', content: '均燊說的渦流我覺得很值得看,因為這可能解釋為什麼有些數據不是平滑下降,而是先上升再掉。', author: 'u13', x: 2900, y: 550, parentId: 'g1-w2-3', date: dates.w2+4000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w2-6', topicId: 't-g1', type: 'counter', title: 'PM降了不等於被穩定過濾', content: '如果只是看到PM降了就說有效,我覺得還不夠。因為有可能只是粒子移到別的地方(死角),不一定真的被穩定過濾掉。', author: 'u11', x: 3250, y: 100, parentId: 'g1-w2-4', date: dates.w2+5000, cluster: 'B', promisingness: 72 }, // 熱點
                { id: 'g1-w2-7', topicId: 't-g1', type: 'buildon', title: '死角造成假象', content: '坤冀提到死角我很有感,因為如果粒子卡在某個區域,那看起來就像過濾沒那麼差,但其實只是暫時堆在那裡。', author: 'u12', x: 2900, y: 250, parentId: 'g1-w2-2', date: dates.w2+6000, cluster: 'B', promisingness: 60 },
                { id: 'g1-w2-8', topicId: 't-g1', type: 'buildon', title: '不同大小不能混著看', content: '接竑睿上週講的粒徑差異,我覺得不同大小的粒子應該真的不能混著看。因為大的可能比較快被攔,小的可能先飄來飄去。', author: 'u11', x: 2550, y: 750, parentId: 'g1-w2-1', date: dates.w2+7000, cluster: 'B', promisingness: 55 },
                { id: 'g1-w2-9', topicId: 't-g1', type: 'counter', title: '太強不一定比較好', content: '我不太想再用『越強越好』這種說法,因為現在看起來很多現象都不是線性的,太強不一定比較好。', author: 'u13', x: 2550, y: 950, parentId: 'g1-w2-1', date: dates.w2+8000, cluster: 'A', promisingness: 60 },
                { id: 'g1-w2-10', topicId: 't-g1', type: 'counter', title: '忽略流場本身', content: '如果我們一直把『凝聚』當核心,我怕會忽略流場本身。也許真正差異大的,不是顆粒有沒有黏在一起,而是它們被帶到哪裡。', author: 'u12', x: 2900, y: 950, parentId: 'g1-w2-9', date: dates.w2+9000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w2-11', topicId: 't-g1', type: 'improve', title: '列出所有影響條件', content: '這週我覺得可以先把影響條件列出來:粒子大小、聲波頻率、功率、氣流方向、濾網位置。先列清楚,後面比較不會亂。', author: 'u11', x: 2900, y: 750, parentId: 'g1-w2-8', date: dates.w2+10000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w2-12', topicId: 't-g1', type: 'improve', title: '看見變化不等於理解', content: '我覺得第二週可以先加上一句判斷:『看見數值變化,不等於已經理解粒子行為。』這句很像我們現在的狀態。', author: 'u12', x: 3250, y: 750, parentId: 'g1-w2-11', date: dates.w2+11000, cluster: 'B', promisingness: 68 },
                { id: 'g1-w2-ra', topicId: 't-g1', type: 'riseabove', title: 'W2 小結：條件組合才是關鍵', content: '粒子行為不是單一答案,聲波、氣流、粒徑、濾網位置可能一起作用,所以要研究的是條件組合。', author: 'u12', x: 3600, y: 550, parentId: 'g1-w2-10', date: dates.w2+12000, cluster: 'C', promisingness: 88 }, // 熱點

                // --- Week 3 (Base X: 4000) ---
                { id: 'g1-w3-1', topicId: 't-g1', type: 'question', title: '要先選什麼核心變數？ (W3 主節點)', content: '如果我們現在只能先抓最核心的變數,我覺得要先選什麼?是頻率、功率,還是濾網和擋板位置?我覺得不能全部一起看,不然會太散。', author: 'u11', x: 4000, y: 550, parentId: 'g1-w2-ra', date: dates.w3, cluster: 'A', promisingness: 60 },
                { id: 'g1-w3-2', topicId: 't-g1', type: 'question', title: '主因 vs 讓效果明顯的條件', content: '我們要不要先分清楚『造成變化的主因』跟『只是讓效果更明顯的條件』?不然很多東西會混在一起。', author: 'u12', x: 4350, y: 350, parentId: 'g1-w3-1', date: dates.w3+1000, cluster: 'A', promisingness: 65 },
                { id: 'g1-w3-3', topicId: 't-g1', type: 'question', title: '粒子聚了還是被濾了？', content: '我想追問的是,我們到底要先理解『粒子有沒有聚』,還是『粒子最後有沒有真的被濾掉』?這兩個看起來很像,但其實不是同一件事。', author: 'u13', x: 4350, y: 750, parentId: 'g1-w3-1', date: dates.w3+2000, cluster: 'A', promisingness: 68 },
                { id: 'g1-w3-4', topicId: 't-g1', type: 'improve', title: '變數分三層', content: '我建議這週開始把變數分成三層:核心變數、輔助變數、干擾變數。這樣之後討論不會全部堆在一起。', author: 'u12', x: 4700, y: 350, parentId: 'g1-w3-2', date: dates.w3+3000, cluster: 'B', promisingness: 75 }, // 熱點
                { id: 'g1-w3-5', topicId: 't-g1', type: 'buildon', title: '三層分類很好', content: '均燊那個三層分類我覺得很好,因為我們最近討論最容易卡住的點,就是每個變數都覺得很重要。', author: 'u13', x: 5050, y: 350, parentId: 'g1-w3-4', date: dates.w3+4000, cluster: 'B', promisingness: 60 },
                { id: 'g1-w3-6', topicId: 't-g1', type: 'buildon', title: '先看頻率加結構', content: '我比較贊成先看頻率加結構。因為頻率會影響聲場,結構會影響流場,這兩個可能才是最直接碰到粒子路徑的地方。', author: 'u11', x: 4350, y: 150, parentId: 'g1-w3-1', date: dates.w3+5000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w3-7', topicId: 't-g1', type: 'improve', title: '聲場和結構條件下...', content: '這週我想把我們的問題寫得更清楚:不是『聲波能不能過濾』,而是『在什麼聲場和結構條件下,粒子比較容易被導向濾網』。', author: 'u11', x: 4700, y: 150, parentId: 'g1-w3-6', date: dates.w3+6000, cluster: 'B', promisingness: 78 }, // 熱點
                { id: 'g1-w3-8', topicId: 't-g1', type: 'improve', title: '訂出三個重點', content: '我覺得這週可以先把目前最值得追的重點訂成三個:頻率、結構、粒子行為變化。其他像材料細節先暫時排後面。', author: 'u13', x: 5050, y: 150, parentId: 'g1-w3-7', date: dates.w3+7000, cluster: 'B', promisingness: 70 },
                { id: 'g1-w3-9', topicId: 't-g1', type: 'counter', title: '功率不一定是核心', content: '如果把功率當第一優先,我覺得還是不夠準。因為功率比較像是放大條件,不一定是決定方向的核心原因。', author: 'u11', x: 4350, y: 950, parentId: 'g1-w3-1', date: dates.w3+8000, cluster: 'A', promisingness: 60 },
                { id: 'g1-w3-10', topicId: 't-g1', type: 'counter', title: '一定要捨棄一些方向', content: '如果我們什麼都想保留,後面反而做不出判斷。所以這週一定要捨棄一些比較不急的方向。', author: 'u12', x: 4700, y: 950, parentId: 'g1-w3-9', date: dates.w3+9000, cluster: 'A', promisingness: 55 },
                { id: 'g1-w3-11', topicId: 't-g1', type: 'buildon', title: '有研究味了', content: '坤冀把問題改寫後,我覺得比較有研究味了。因為它不再只是要一個厲害結果,而是要找出條件。', author: 'u12', x: 5050, y: 550, parentId: 'g1-w3-7', date: dates.w3+10000, cluster: 'B', promisingness: 60 },
                { id: 'g1-w3-12', topicId: 't-g1', type: 'counter', title: '跳過中間機制很危險', content: '如果我們只看最後效率,我怕會跳過中間機制。到時就算結果不錯,也很難說服別人為什麼。', author: 'u13', x: 4700, y: 750, parentId: 'g1-w3-3', date: dates.w3+11000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w3-ra', topicId: 't-g1', type: 'riseabove', title: 'W3 小結：聲場×流場×粒子路徑', content: '真正值得研究的,不是單一數字變高或變低,而是『聲場×流場×粒子路徑』怎麼一起影響粒子被濾網抓住。', author: 'u11', x: 5400, y: 150, parentId: 'g1-w3-8', date: dates.w3+12000, cluster: 'C', promisingness: 90 }, // 熱點

                // --- Week 4 (Base X: 5800) ---
                { id: 'g1-w4-1', topicId: 't-g1', type: 'question', title: '設計比較好的判準是什麼？ (W4 主節點)', content: '如果後面要說某個設計比較好,我們的判準到底是什麼?只看過濾效率,好像還是不夠。', author: 'u11', x: 5800, y: 150, parentId: 'g1-w3-ra', date: dates.w4, cluster: 'A', promisingness: 65 },
                { id: 'g1-w4-2', topicId: 't-g1', type: 'question', title: '真的有效 vs 剛好漂亮', content: '我們要怎麼判斷是『真的有效』,還是『量測過程剛好出現漂亮曲線』?我覺得這個差很多。', author: 'u12', x: 6150, y: 50, parentId: 'g1-w4-1', date: dates.w4+1000, cluster: 'A', promisingness: 68 },
                { id: 'g1-w4-3', topicId: 't-g1', type: 'question', title: 'PM2.5降但PM10升？', content: '如果某個條件可以讓PM2.5降很多,但PM10反而先升,我們要怎麼看?這算有效,還是代表中間有別的機制?', author: 'u13', x: 6150, y: 250, parentId: 'g1-w4-1', date: dates.w4+2000, cluster: 'A', promisingness: 70 }, // 熱點
                { id: 'g1-w4-4', topicId: 't-g1', type: 'improve', title: '判準：效果、穩定、可解釋', content: '我們這週可以把判準先訂成:效果、穩定性、可解釋性。這樣才不會只挑最好看的結果。', author: 'u11', x: 6500, y: 150, parentId: 'g1-w4-3', date: dates.w4+3000, cluster: 'B', promisingness: 80 }, // 熱點
                { id: 'g1-w4-5', topicId: 't-g1', type: 'counter', title: '不能單看單次最強', content: '我不認同只看單次最強值。單次很強不代表整體穩定,尤其我們這題很容易被偶然值影響。', author: 'u12', x: 6500, y: -50, parentId: 'g1-w4-2', date: dates.w4+4000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w4-6', topicId: 't-g1', type: 'buildon', title: '提防最好看的圖', content: '我覺得均燊講的很重要,因為我們很容易被『最好看的那張圖』帶走,但那不一定是最值得相信的。', author: 'u13', x: 6850, y: -50, parentId: 'g1-w4-5', date: dates.w4+5000, cluster: 'B', promisingness: 60 },
                { id: 'g1-w4-7', topicId: 't-g1', type: 'buildon', title: '看數值下降與過程合理', content: '我覺得至少要同時看兩件事:數值有沒有穩定下降,還有過程是不是合理。如果過程一直亂跳,我會覺得要小心。', author: 'u11', x: 6150, y: 450, parentId: 'g1-w4-1', date: dates.w4+6000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w4-8', topicId: 't-g1', type: 'buildon', title: '可解釋性很重要', content: '坤冀說的可解釋性我認同,因為我們現在不是做黑箱結果,而是要能說明為什麼。', author: 'u12', x: 6850, y: 150, parentId: 'g1-w4-4', date: dates.w4+7000, cluster: 'B', promisingness: 68 },
                { id: 'g1-w4-9', topicId: 't-g1', type: 'improve', title: '加上與文獻對比', content: '這週我想加一個判準:能不能和文獻或前面觀察對得上。只靠自己一次實驗,我覺得還不夠穩。', author: 'u13', x: 7200, y: 150, parentId: 'g1-w4-8', date: dates.w4+8000, cluster: 'B', promisingness: 72 }, // 熱點
                { id: 'g1-w4-10', topicId: 't-g1', type: 'improve', title: '合理波動內穩定較佳', content: '我建議把『越高越好』改成『在合理波動內,穩定表現較佳』。這樣比較符合我們前幾週的討論。', author: 'u12', x: 6500, y: 450, parentId: 'g1-w4-7', date: dates.w4+9000, cluster: 'B', promisingness: 75 }, // 熱點
                { id: 'g1-w4-11', topicId: 't-g1', type: 'counter', title: '波動大不能說最好', content: '如果某組條件效率很高,但波動也很大,我覺得不能直接說它最好。因為那可能只是剛好碰到漂亮數字。', author: 'u11', x: 6850, y: 450, parentId: 'g1-w4-10', date: dates.w4+10000, cluster: 'A', promisingness: 60 },
                { id: 'g1-w4-12', topicId: 't-g1', type: 'counter', title: '不能退回工程師視角', content: '如果後面只比數字大小,我覺得我們又會退回最一開始那種工程師視角,忽略中間真正的物理現象。', author: 'u13', x: 7200, y: 450, parentId: 'g1-w4-11', date: dates.w4+11000, cluster: 'A', promisingness: 70 },
                { id: 'g1-w4-ra', topicId: 't-g1', type: 'riseabove', title: 'W4 小結：效果、穩定與解釋性', content: '第一組要追的不是『哪個條件最猛』,而是『哪個條件最能同時兼顧效果、穩定性和可解釋性』。', author: 'u11', x: 7600, y: 150, parentId: 'g1-w4-9', date: dates.w4+12000, cluster: 'C', promisingness: 92 }, // 熱點

                // --- Week 5 (Base X: 8000) ---
                { id: 'g1-w5-1', topicId: 't-g1', type: 'question', title: '擋板配置要是主線嗎？ (W5 主節點)', content: '如果我們要讓『結構差異』真的被看見,擋板配置是不是要先成為一條主線?因為它很可能直接影響流場死角。', author: 'u11', x: 8000, y: 150, parentId: 'g1-w4-ra', date: dates.w5, cluster: 'A', promisingness: 65 },
                { id: 'g1-w5-2', topicId: 't-g1', type: 'question', title: '先挑代表頻率？', content: '我們要不要先挑最有代表性的頻率,再去比擋板和濾網結構?不然每個組合都做,量太大也不容易整理。', author: 'u12', x: 8350, y: -50, parentId: 'g1-w5-1', date: dates.w5+1000, cluster: 'A', promisingness: 60 },
                { id: 'g1-w5-3', topicId: 't-g1', type: 'question', title: '擋板、濾網方向、距離先做誰？', content: '濾網重疊、直放橫放、和擋板距離,這三個裡面哪個最值得先做?我覺得應該先找最可能改變粒子路徑的。', author: 'u13', x: 8350, y: 350, parentId: 'g1-w5-1', date: dates.w5+2000, cluster: 'A', promisingness: 65 },
                { id: 'g1-w5-4', topicId: 't-g1', type: 'improve', title: '分聲場與結構兩主線', content: '我想把方案寫成比較清楚的兩條:一條看聲場條件,一條看結構條件,最後再交叉比。這樣比較不會全部混掉。', author: 'u11', x: 8700, y: 150, parentId: 'g1-w5-2', date: dates.w5+3000, cluster: 'B', promisingness: 78 }, // 熱點
                { id: 'g1-w5-5', topicId: 't-g1', type: 'counter', title: '不能平均做一點', content: '如果每個條件都平均做一點,我怕最後什麼都碰到,卻沒有一條做深。', author: 'u13', x: 8700, y: 550, parentId: 'g1-w5-3', date: dates.w5+4000, cluster: 'A', promisingness: 60 },
                { id: 'g1-w5-6', topicId: 't-g1', type: 'counter', title: '不能忘記比較的目的', content: '如果我們只顧著增加設計新奇度,我覺得很容易忘記研究最重要的是能不能比較。', author: 'u12', x: 9050, y: 550, parentId: 'g1-w5-5', date: dates.w5+5000, cluster: 'A', promisingness: 65 },
                { id: 'g1-w5-7', topicId: 't-g1', type: 'buildon', title: '濾網擺放也要看', content: '我覺得除了擋板,濾網擺放方式也要一起看。因為粒子最後能不能被抓住,不是只有前面怎麼飛,還有進濾網前怎麼過。', author: 'u11', x: 8700, y: 350, parentId: 'g1-w5-3', date: dates.w5+6000, cluster: 'B', promisingness: 60 },
                { id: 'g1-w5-8', topicId: 't-g1', type: 'buildon', title: '分兩條主線可行', content: '坤冀那種分兩條主線的方法我覺得可行,因為這樣我們可以先各自看清楚,再討論交互作用。', author: 'u12', x: 9050, y: 150, parentId: 'g1-w5-4', date: dates.w5+7000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w5-9', topicId: 't-g1', type: 'buildon', title: '偏向先看擋板和距離', content: '我比較偏向先看擋板和距離,因為這兩個比較像直接碰到流場。濾網方向也重要,但可能排在後面。', author: 'u13', x: 9050, y: 350, parentId: 'g1-w5-7', date: dates.w5+8000, cluster: 'B', promisingness: 60 },
                { id: 'g1-w5-10', topicId: 't-g1', type: 'improve', title: '代表頻率×結構差異', content: '我提議這週先做『代表頻率×結構差異』的比較表。這樣每次討論不會只停在口頭。', author: 'u12', x: 9400, y: 150, parentId: 'g1-w5-8', date: dates.w5+9000, cluster: 'B', promisingness: 72 }, // 熱點
                { id: 'g1-w5-11', topicId: 't-g1', type: 'improve', title: '先小量比較再擴大', content: '這週我想把方案改成『先小量比較,再擴大』。先找到比較有感的差異,再往下追。', author: 'u13', x: 9400, y: 350, parentId: 'g1-w5-9', date: dates.w5+10000, cluster: 'B', promisingness: 68 },
                { id: 'g1-w5-12', topicId: 't-g1', type: 'counter', title: '一次改太多難找原因', content: '如果我們一次把太多設計一起改,我覺得後面反而很難知道到底是哪個條件造成差異。', author: 'u11', x: 9750, y: 350, parentId: 'g1-w5-11', date: dates.w5+11000, cluster: 'A', promisingness: 65 },
                { id: 'g1-w5-13', topicId: 't-g1', type: 'buildon', title: '新版補強：改變路徑還是流場', content: '我現在的想法是,如果真的要讓第一組再往前推,後面不能只是換很多設計來看差異,而是要更清楚地問:這一次改動,到底是在改變粒子路徑,還是在改變局部流場。', author: 'u11', x: 9750, y: 550, parentId: 'g1-w5-12', date: dates.w5+12000, cluster: 'B', promisingness: 82 }, // 熱點
                { id: 'g1-w5-14', topicId: 't-g1', type: 'buildon', title: '新版補強：帶到能接住的位置', content: '我開始覺得真正的問題不是『結構越複雜越好』,而是『哪一種結構改動,最有可能把粒子帶到濾網真正能接住的位置』。', author: 'u12', x: 10100, y: 550, parentId: 'g1-w5-13', date: dates.w5+13000, cluster: 'B', promisingness: 80 }, // 熱點
                { id: 'g1-w5-15', topicId: 't-g1', type: 'buildon', title: '新版補強：驗證哪條假設', content: '如果回到我們前面一直在修的問題,我現在比較在意的是:後面每一次比較,都要能說得出它是在驗證哪一條假設,不然會變得很像只是一直試。', author: 'u13', x: 10450, y: 550, parentId: 'g1-w5-14', date: dates.w5+14000, cluster: 'B', promisingness: 78 }, // 熱點
                { id: 'g1-w5-ra', topicId: 't-g1', type: 'riseabove', title: 'W5 小結：比較背後的邏輯', content: '先用代表性頻率穩住聲場,再用擋板、濾網方向與距離去看流場和粒子路徑怎麼改變,才是能回答問題的設計。', author: 'u11', x: 9750, y: 150, parentId: 'g1-w5-10', date: dates.w5+15000, cluster: 'C', promisingness: 94 }, // 熱點

                // --- Week 6 (Base X: 10200) ---
                { id: 'g1-w6-1', topicId: 't-g1', type: 'question', title: '波動大懷疑量測還是解釋？ (W6 主節點)', content: '如果某個條件理論上應該有效,可是實際數據波動很大,我們要先懷疑量測問題,還是先懷疑原本的解釋有問題?', author: 'u11', x: 10200, y: 150, parentId: 'g1-w5-ra', date: dates.w6, cluster: 'A', promisingness: 70 }, // 熱點
                { id: 'g1-w6-2', topicId: 't-g1', type: 'question', title: '主因其實是風？', content: '會不會有些條件其實是聲波看起來有用,但真正主因比較像風或其他連帶效應?這個我覺得一定要分。', author: 'u12', x: 10550, y: -50, parentId: 'g1-w6-1', date: dates.w6+1000, cluster: 'A', promisingness: 68 },
                { id: 'g1-w6-3', topicId: 't-g1', type: 'question', title: '先升後降的意義', content: '現在我比較在意的是,當PM數值先升後降時,我們到底該怎麼解讀?這到底是凝聚被放大,還是路徑改變造成的過程現象?', author: 'u13', x: 10550, y: 350, parentId: 'g1-w6-1', date: dates.w6+2000, cluster: 'A', promisingness: 72 }, // 熱點
                { id: 'g1-w6-4', topicId: 't-g1', type: 'counter', title: '不能太快推給器材', content: '如果遇到失敗就直接說是器材問題,我覺得太快了。有時候失敗反而是在提醒我們,原本的機制想得太單純。', author: 'u11', x: 10900, y: -50, parentId: 'g1-w6-2', date: dates.w6+3000, cluster: 'A', promisingness: 76 }, // 熱點
                { id: 'g1-w6-5', topicId: 't-g1', type: 'improve', title: '先分主因再最佳化', content: '我覺得這週可以加一句很關鍵的話:『先分清楚主因,再談最佳化。』不然後面會一直修枝葉。', author: 'u12', x: 11250, y: -50, parentId: 'g1-w6-4', date: dates.w6+4000, cluster: 'B', promisingness: 80 }, // 熱點
                { id: 'g1-w6-6', topicId: 't-g1', type: 'counter', title: '不能不提失敗案例', content: '如果我們後面完全不提失敗案例,我覺得說服力反而會變弱,因為那代表我們只挑對自己有利的結果。', author: 'u13', x: 11600, y: -50, parentId: 'g1-w6-5', date: dates.w6+5000, cluster: 'A', promisingness: 72 }, // 熱點
                { id: 'g1-w6-7', topicId: 't-g1', type: 'buildon', title: '失敗逼我們承認解釋不完整', content: '坤冀講的很對,失敗不一定只是做不好,也可能是在逼我們承認:原本的解釋不夠完整。', author: 'u12', x: 10900, y: 150, parentId: 'g1-w6-4', date: dates.w6+6000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w6-8', topicId: 't-g1', type: 'buildon', title: '最大收穫是不夠穩', content: '我覺得這週最大的收穫不是找到最強條件,而是發現很多『看起來有效』的結果其實不夠穩。', author: 'u11', x: 11250, y: 150, parentId: 'g1-w6-7', date: dates.w6+7000, cluster: 'B', promisingness: 68 },
                { id: 'g1-w6-9', topicId: 't-g1', type: 'buildon', title: '怕很多現象混在一起', content: '均燊提到『先分主因』我很認同,因為第一組這題最怕的就是把很多現象混在一起講。', author: 'u13', x: 11600, y: 150, parentId: 'g1-w6-5', date: dates.w6+8000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w6-10', topicId: 't-g1', type: 'improve', title: '有效是維持合理趨勢', content: '我想把我們的說法改成:有效不是一次漂亮結果,而是多次下來都還能維持合理趨勢。', author: 'u11', x: 10900, y: 350, parentId: 'g1-w6-3', date: dates.w6+9000, cluster: 'B', promisingness: 65 },
                { id: 'g1-w6-11', topicId: 't-g1', type: 'counter', title: '硬湊有效不算理解', content: '如果最後只是把所有有效條件硬湊在一起,我覺得不算真的理解。因為我們還是要知道到底是哪一個在主導。', author: 'u12', x: 11250, y: 350, parentId: 'g1-w6-10', date: dates.w6+10000, cluster: 'A', promisingness: 68 },
                { id: 'g1-w6-12', topicId: 't-g1', type: 'improve', title: '找解釋成敗的線索', content: '我們可以把本週的重點修成:不是找最漂亮的成功,而是找最能解釋成功和失敗的線索。', author: 'u13', x: 11600, y: 350, parentId: 'g1-w6-11', date: dates.w6+11000, cluster: 'B', promisingness: 75 }, // 熱點
                { id: 'g1-w6-13', topicId: 't-g1', type: 'buildon', title: '新版補強：淘汰太快的解釋', content: '這週我最明確的感覺是,失敗其實在幫我們淘汰太快的解釋。也就是說,原本看起來很順的說法,只要一碰到波動就站不住,那它可能本來就不夠好。', author: 'u11', x: 11950, y: 350, parentId: 'g1-w6-12', date: dates.w6+12000, cluster: 'B', promisingness: 82 }, // 熱點
                { id: 'g1-w6-14', topicId: 't-g1', type: 'buildon', title: '新版補強：主因有沒有抓對', content: '我的想法是,第一組到這裡不能再只追數值好不好看,而是要比較誠實地回頭問:真正主因到底有沒有被我們抓對。', author: 'u12', x: 12300, y: 350, parentId: 'g1-w6-13', date: dates.w6+13000, cluster: 'B', promisingness: 80 }, // 熱點
                { id: 'g1-w6-15', topicId: 't-g1', type: 'buildon', title: '新版補強：重新分清楚角色', content: '如果用知識建構的角度看,我覺得這週最重要的不是把失敗藏起來,而是承認失敗正在幫我們把『聲場、流場、結構』三者的角色重新分清楚。', author: 'u13', x: 12650, y: 350, parentId: 'g1-w6-14', date: dates.w6+14000, cluster: 'B', promisingness: 85 }, // 熱點
                { id: 'g1-w6-ra', topicId: 't-g1', type: 'riseabove', title: 'W6 小結：失敗算證據', content: '不是AI說顆粒凝聚就結束,也不是數字變好就算成功;失敗也在提醒我們聲波、氣流、結構到底誰在主導。', author: 'u11', x: 11950, y: -50, parentId: 'g1-w6-6', date: dates.w6+15000, cluster: 'C', promisingness: 95 }, // 熱點

                // --- Week 7 (Base X: 12400) ---
                { id: 'g1-w7-1', topicId: 't-g1', type: 'question', title: '初期的問題該改寫了嗎？ (W7 主節點)', content: '如果回頭看七週,我們最早問的『聲波能不能推粒子去濾網』,現在是不是要改寫了?我覺得答案已經不像一開始那麼直線。', author: 'u11', x: 12400, y: -50, parentId: 'g1-w6-ra', date: dates.w7, cluster: 'A', promisingness: 72 }, // 熱點
                { id: 'g1-w7-2', topicId: 't-g1', type: 'question', title: '真的有幫助 vs 看起來有幫助', content: '我覺得我們最後要回答的問題,是不是其實變成:什麼條件下,聲波真的有幫助;什麼條件下,它只是看起來有幫助?', author: 'u12', x: 12750, y: -250, parentId: 'g1-w7-1', date: dates.w7+1000, cluster: 'A', promisingness: 75 }, // 熱點
                { id: 'g1-w7-3', topicId: 't-g1', type: 'question', title: '變成條件組合問題', content: '我現在比較想知道,我們這七週最大的改變是不是:從想抓一個最強答案,變成接受這是一個條件組合問題?', author: 'u13', x: 12750, y: 150, parentId: 'g1-w7-1', date: dates.w7+2000, cluster: 'A', promisingness: 78 }, // 熱點
                { id: 'g1-w7-4', topicId: 't-g1', type: 'improve', title: '共同塑造路徑結果', content: '如果要當成最後的小組整理,我會把它寫成:『過濾效果不是單一頻率造成,而是聲場與結構共同塑造粒子路徑的結果。』', author: 'u11', x: 13100, y: -50, parentId: 'g1-w7-2', date: dates.w7+3000, cluster: 'B', promisingness: 88 }, // 熱點
                { id: 'g1-w7-5', topicId: 't-g1', type: 'improve', title: '補完整判斷', content: '我想把最後判斷再補完整一點:不能只追高效率,也要看穩定、可重複,還有能不能解釋。', author: 'u12', x: 13450, y: -50, parentId: 'g1-w7-4', date: dates.w7+4000, cluster: 'B', promisingness: 82 }, // 熱點
                { id: 'g1-w7-6', topicId: 't-g1', type: 'improve', title: '改變粒子的可過濾性', content: '如果要做最後整合,我會用一句比較完整的話:『第一組真正研究的不是聲波本身,而是聲波如何透過聲場與流場改變粒子的可過濾性。』', author: 'u13', x: 13800, y: -50, parentId: 'g1-w7-5', date: dates.w7+5000, cluster: 'B', promisingness: 90 }, // 熱點
                { id: 'g1-w7-7', topicId: 't-g1', type: 'buildon', title: '改變互動讓粒子被抓', content: '我現在比較會說,聲波不是單獨把粒子推過去,而是改變了粒子、流場和結構之間的互動,讓某些條件下更容易被抓住。', author: 'u11', x: 13100, y: -250, parentId: 'g1-w7-2', date: dates.w7+6000, cluster: 'B', promisingness: 75 }, // 熱點
                { id: 'g1-w7-8', topicId: 't-g1', type: 'counter', title: '不留失敗反而退步', content: '如果最後只留成功案例,我覺得我們反而會退步,因為這七週最有價值的其實是那些讓我們改想法的失敗。', author: 'u12', x: 13100, y: 150, parentId: 'g1-w7-3', date: dates.w7+7000, cluster: 'A', promisingness: 72 }, // 熱點
                { id: 'g1-w7-9', topicId: 't-g1', type: 'buildon', title: '條件組合讓題目扎實', content: '我覺得是,而且這樣反而讓題目更扎實。因為我們不是只說有效,而是知道『什麼情況下比較有效』。', author: 'u13', x: 13450, y: 150, parentId: 'g1-w7-8', date: dates.w7+8000, cluster: 'B', promisingness: 70 }, // 熱點
                { id: 'g1-w7-10', topicId: 't-g1', type: 'counter', title: '不接受某數字最強', content: '所以我現在不太會再接受那種『某個數字最強,所以答案就是它』的講法,因為那太忽略條件了。', author: 'u11', x: 13800, y: 150, parentId: 'g1-w7-9', date: dates.w7+9000, cluster: 'A', promisingness: 68 },
                { id: 'g1-w7-11', topicId: 't-g1', type: 'buildon', title: '共同塑造很接近重點', content: '坤冀那句『共同塑造粒子路徑』我覺得很接近我們這七週走出來的重點,因為它把聲波和結構都放進去了。', author: 'u12', x: 13450, y: -250, parentId: 'g1-w7-7', date: dates.w7+10000, cluster: 'B', promisingness: 68 },
                { id: 'g1-w7-12', topicId: 't-g1', type: 'counter', title: '不再用簡單句', content: '所以我現在不太會說「音量越大越強」或「頻率越高越好」這種簡單句,因為這題後來看起來根本不是這樣。', author: 'u13', x: 14150, y: 150, parentId: 'g1-w7-10', date: dates.w7+11000, cluster: 'A', promisingness: 68 },
                { id: 'g1-w7-13', topicId: 't-g1', type: 'buildon', title: '新版補強：一直修的想法', content: '如果回頭整理,我覺得我們不是把原本的想法全部推翻,而是一直在修。從『聲波會推粒子』,修到『聲波可能透過改變流場與粒子路徑,增加被攔截的機會』,這個差很多。', author: 'u11', x: 14150, y: -50, parentId: 'g1-w7-6', date: dates.w7+12000, cluster: 'B', promisingness: 85 }, // 熱點
                { id: 'g1-w7-14', topicId: 't-g1', type: 'buildon', title: '新版補強：知道說法站不住', content: '我現在的想法是,第一組最後最有價值的不是找出一個最好數字,而是知道哪些說法太快、哪些說法比較站得住。這會讓我們的結論更有底氣。', author: 'u12', x: 14500, y: -50, parentId: 'g1-w7-13', date: dates.w7+13000, cluster: 'B', promisingness: 85 }, // 熱點
                { id: 'g1-w7-15', topicId: 't-g1', type: 'buildon', title: '新版補強：修成自然現象', content: '如果用知識建構的角度看,我會說我們這七週其實是在把『裝置怎麼做』慢慢修成『自然現象怎麼運作』。我覺得這就是第一組最後最明顯的成長。', author: 'u13', x: 14850, y: -50, parentId: 'g1-w7-14', date: dates.w7+14000, cluster: 'B', promisingness: 90 }, // 熱點
                { id: 'g1-w7-ra', topicId: 't-g1', type: 'riseabove', title: 'W7 小結：終極共識', content: '過濾效果不是單一頻率造成,而是聲場與結構共同塑造粒子路徑的結果;真正有意義的是找出什麼條件讓粒子比較穩定地被抓住。', author: 'u11', x: 15200, y: -50, parentId: 'g1-w7-15', date: dates.w7+15000, cluster: 'C', promisingness: 100 }, // 熱點
                // --- G2 Week 1 (Base X: 100) ---
                { id: 'g2-w1-1', topicId: 't-g2', type: 'question', title: '我們以前有點太快把『偵測到變化』直接', content: '我現在越想越覺得，我們以前有點太快把『偵測到變化』直接當成『有危險』。可是像心跳變快、 呼吸變快，很多時候也可能只是運動完、情緒激動，甚至講話講太久。那我們現在這套邏輯，到底是在抓真 正異常，還是在抓所有看起來不一樣的狀況？', author: 'u21', x: 100, y: 350, parentId: null, date: dates.w1, cluster: 'A', promisingness: 55 },
                { id: 'g2-w1-2', topicId: 't-g2', type: 'buildon', title: '如果照顧場景是在家裡', content: '如果照顧場景是在家裡，不是在醫院，那人的狀 態本來就會很多變。有人剛起床、有人剛走動、有人正在追劇笑到不行，數值一定不會一直很平。這樣看來 ，我們可能不是先把門檻壓低，而是先弄清楚『哪些變化值得被當成警訊』。', author: 'u21', x: 450, y: 350, parentId: 'g2-w1-1', date: dates.w1+1000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w1-3', topicId: 't-g2', type: 'improve', title: '我覺得我們這週先不要急著修模型', content: '我覺得我們這週先不要急著修模型，先整理一張表：哪些『看起來像異常』，但其實在居家情境 裡很常見。先把這一層釐清，後面才不會一直被數值牽著走。', author: 'u21', x: 800, y: 350, parentId: 'g2-w1-2', date: dates.w1+2000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w1-4', topicId: 't-g2', type: 'counter', title: '但我也不是說只要是居家情境就 可以放', content: '但我也不是說只要是居家情境就 可以放鬆。因為有些真正危險的狀況，一開始看起來也可能只是普通變化。所以問題不是不要提醒，而是 系統現在太容易把『不同』直接翻成『危險』。', author: 'u21', x: 1150, y: 350, parentId: 'g2-w1-3', date: dates.w1+3000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w1-5', topicId: 't-g2', type: 'buildon', title: '我現在雖然還沒有完全想清楚', content: '我現在雖然還沒有完全想清楚，但我開始覺得第二組真正麻煩的地方不是抓不到 異常，而是太容易把『和平常不一樣』直接翻成『有危險』。', author: 'u21', x: 1500, y: 350, parentId: 'g2-w1-4', date: dates.w1+4000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w1-6', topicId: 't-g2', type: 'question', title: '如果系統常常誤報', content: '我比較在意的是，如果系統常常誤報，家裡的人會不會最後乾脆不理它？因為一開始可能覺 得很安全，可是提醒太多次又都沒事，久了就會麻痺。那這樣真的有比較安心嗎？', author: 'u22', x: 450, y: 150, parentId: 'g2-w1-1', date: dates.w1+5000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w1-7', topicId: 't-g2', type: 'buildon', title: '接朱洺賢說 的', content: '接朱洺賢說 的，我也覺得『有反應』不代表『有用』。像感測器抓得到數值，這件事本身其實不難，難的是抓到之後要怎 麼解釋。尤其居家環境比實驗室亂很多，訊號一定比較不乾淨。', author: 'u22', x: 800, y: 150, parentId: 'g2-w1-6', date: dates.w1+6000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w1-8', topicId: 't-g2', type: 'improve', title: '我提議我們先分成兩種錯：一種是明明沒', content: '我提議我們先分成兩種錯：一種是明明沒事卻一直叫，一種是真的有事但沒叫到。這樣後面討 論比較不會全部混在一起，也比較能知道我們到底在改哪一種問題。', author: 'u22', x: 1150, y: 150, parentId: 'g2-w1-7', date: dates.w1+7000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w1-9', topicId: 't-g2', type: 'counter', title: '如果我們只追求『不要誤 報』', content: '如果我們只追求『不要誤 報』，會不會反而變成太保守，真的危險時又抓不到？所以我覺得後面一定會變成在抓一個平衡，不可能只 追一邊。', author: 'u22', x: 1500, y: 150, parentId: 'g2-w1-8', date: dates.w1+8000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w1-10', topicId: 't-g2', type: 'buildon', title: '系統如果一直亂跳', content: '我比較在意的是，系統如果一直亂跳，家裡的人最後會不會直接把它當背景音。這 個問題我覺得不能放到很後面才想。', author: 'u22', x: 1850, y: 150, parentId: 'g2-w1-9', date: dates.w1+9000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w1-11', topicId: 't-g2', type: 'question', title: '如果我是被照顧的人', content: '如果我是被照顧的人，我應該不會希望自己只是翻個身、走去倒水，系統就一直把我當成快出 事。被一直提醒其實也會有壓力，甚至會覺得自己好像一直被監視。那這樣的照護到底是在幫忙，還是在 增加負擔？', author: 'u23', x: 450, y: 550, parentId: 'g2-w1-1', date: dates.w1+10000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w1-12', topicId: 't-g2', type: 'buildon', title: '我覺得第二組很特別的地方', content: '我覺得第二組很特別的地方，是我們不是只做一個會叫的系統，而是要做一個讓人 願意相信的系統。信任這件事不是看它叫得多快，而是看它講得有沒有道理。', author: 'u23', x: 800, y: 550, parentId: 'g2-w1-11', date: dates.w1+11000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w1-13', topicId: 't-g2', type: 'improve', title: '這週我想先把『被照顧者的正常生活動作', content: '這週我想先把『被照顧者的正常生活動作』也列進去。因為如果只收集異常案例，我們最後很容 易把普通生活也當成風險。', author: 'u23', x: 1150, y: 550, parentId: 'g2-w1-12', date: dates.w1+12000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w1-14', topicId: 't-g2', type: 'counter', title: '不過我也覺得不能完全站在『不要打擾使', content: '不過我也覺得不能完全站在『不要打擾使用者』這一邊。因為真的有 危險時，被打擾一下其實是必要的。所以我們要找的不是安靜的系統，而是合理的系統。', author: 'u23', x: 1500, y: 550, parentId: 'g2-w1-13', date: dates.w1+13000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w1-15', topicId: 't-g2', type: 'buildon', title: '如果站在被照顧者那邊看', content: '如果站在被照顧者那邊看，我會覺得一直被提醒其實也會有壓力，所以『有提醒』不 一定就等於『有幫助』。', author: 'u23', x: 1850, y: 550, parentId: 'g2-w1-14', date: dates.w1+14000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w1-ra', topicId: 't-g2', type: 'riseabove', title: 'W1 小結：第二組第一週先把『偵測到變化』和『真', content: '第二組第一週先把『偵測到變化』和『真的有危險』拆開，開始建立對異常判讀的懷疑。', author: 'u21', x: 2200, y: 350, parentId: 'g2-w1-15', date: dates.w1+15000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G2 Week 2 (Base X: 2300) ---
                { id: 'g2-w2-1', topicId: 't-g2', type: 'question', title: '我現在卡住的一點是 (W2 主節點)', content: '我現在卡住的一點是，我們是不是太習慣用固定門檻想事情？像呼吸比較快，有可能是運動 後、情緒緊張、房間悶，也有可能是真的不舒服。那如果同一個數值在不同情境意義不同，固定門檻真的夠 用嗎？', author: 'u21', x: 2300, y: 350, parentId: 'g2-w1-ra', date: dates.w2, cluster: 'A', promisingness: 75 },
                { id: 'g2-w2-2', topicId: 't-g2', type: 'buildon', title: '我覺得要把『人』跟『當下情境』一起放', content: '我覺得要把『人』跟『當下情境』一起放進來看。因為有些人本來心跳就比較快，有些人平 常活動量就比較大。如果系統完全不看個體差異，最後其實是在拿平均值硬套每一個人。', author: 'u21', x: 2650, y: 350, parentId: 'g2-w2-1', date: dates.w2+1000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w2-3', topicId: 't-g2', type: 'improve', title: '我建議我們開始做『基線』這件事', content: '我建議我們開始做『基線』這件事。不是一上來就判正常或異常，而是先記錄這個人在平常安 靜、剛活動完、睡前這幾種狀態，大概會落在哪個範圍。', author: 'u21', x: 3000, y: 350, parentId: 'g2-w2-2', date: dates.w2+2000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w2-4', topicId: 't-g2', type: 'counter', title: '但基線也不是記一次就好', content: '但基線也不是記一次就好。因為人不是 機器，今天跟昨天可能就不一樣。所以我覺得基線不是固定答案，比較像一個參考區間。', author: 'u21', x: 3350, y: 350, parentId: 'g2-w2-3', date: dates.w2+3000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w2-5', topicId: 't-g2', type: 'riseabove', title: '我現在比較想把問題改寫成：我們不是在', content: '我現在比較想把問題改寫成：我們不是在找『全世界通用的危險門檻』，而是在找『這個人在 這個情境下，看起來不尋常的變化』。這樣比較像居家照護真正要做的事。', author: 'u21', x: 3700, y: 350, parentId: 'g2-w2-4', date: dates.w2+4000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g2-w2-6', topicId: 't-g2', type: 'buildon', title: '我開始覺得第二組不能一直想找一條大家', content: '我開始覺得第二組不能一直想找一條大家通用的危險線，因為不同人的日常狀態 本來就差很多。', author: 'u21', x: 4050, y: 350, parentId: 'g2-w2-5', date: dates.w2+5000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w2-7', topicId: 't-g2', type: 'question', title: '如果我們之後真的要加情境', content: '如果我們之後真的要加情境，那情境到底要加到什麼程度？因為加太多，系統會變很複雜；加 太少，又沒辦法降低誤報。我覺得這裡要先想清楚。', author: 'u22', x: 2650, y: 150, parentId: 'g2-w2-1', date: dates.w2+6000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w2-8', topicId: 't-g2', type: 'buildon', title: '我目前比較認同先加最基本、最會影響判', content: '我目前比較認同先加最基本、最會影響判 讀的情境就好，例如剛活動完、正在睡、室內太熱，這些是比較常發生也比較容易影響數值的。先抓大宗， 可能比較做得出來。', author: 'u22', x: 3000, y: 150, parentId: 'g2-w2-7', date: dates.w2+7000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w2-9', topicId: 't-g2', type: 'improve', title: '我建議我們可以先做情境標記', content: '我建議我們可以先做情境標記。像量到數值的同時，旁邊先加上『靜止』『活動後』『睡眠中』這種 標籤。就算後面模型還沒完全改，至少資料會比較能解釋。', author: 'u22', x: 3350, y: 150, parentId: 'g2-w2-8', date: dates.w2+8000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w2-10', topicId: 't-g2', type: 'counter', title: '但我覺得情境標記也不能全部靠人 工', content: '但我覺得情境標記也不能全部靠人 工。因為如果每次都要人自己選，實際上很難長期用。後面還是得回到系統怎麼半自動判斷。', author: 'u22', x: 3700, y: 150, parentId: 'g2-w2-9', date: dates.w2+9000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w2-11', topicId: 't-g2', type: 'buildon', title: '如果真的要把情境加進去', content: '如果真的要把情境加進去，我還是會想先抓最常見、最會影響判讀的那些，不然系 統會變得很重。', author: 'u22', x: 4050, y: 150, parentId: 'g2-w2-10', date: dates.w2+10000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w2-12', topicId: 't-g2', type: 'question', title: '如果站在家屬角度', content: '如果站在家屬角度，他們其實最需要的可能不是很多數據，而是『現在要不要擔心』。那我們現 在提供一堆波形跟數值，真的有比較幫助嗎？還是只是看起來很專業？', author: 'u23', x: 2650, y: 550, parentId: 'g2-w2-1', date: dates.w2+11000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w2-13', topicId: 't-g2', type: 'buildon', title: '我覺得情境很重要', content: '我覺得情境很重要，因 為家屬平常其實知道被照顧者的生活習慣。像有人睡前呼吸就比較快，有人只要一緊張就會亂掉。所以系 統不能假裝每個人都長一樣。', author: 'u23', x: 3000, y: 550, parentId: 'g2-w2-12', date: dates.w2+12000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w2-14', topicId: 't-g2', type: 'improve', title: '也許我們後面不只要顯示數值', content: '也許我們後面不只要顯示數值，而是顯示『目前判讀依據』。例如：剛活動完，所以這個變化暫 時先視為可接受。這樣家屬會比較知道系統不是亂叫。', author: 'u23', x: 3350, y: 550, parentId: 'g2-w2-13', date: dates.w2+13000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w2-15', topicId: 't-g2', type: 'counter', title: '不過我也知道', content: '不過我也知道，講太多理由有時候家屬 會看不懂。所以判讀依據可能要簡化成大家能懂的語言，不然系統又會變成只有做專題的人自己看得懂。', author: 'u23', x: 3700, y: 550, parentId: 'g2-w2-14', date: dates.w2+14000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w2-16', topicId: 't-g2', type: 'buildon', title: '我現在比較在意的是', content: '我現在比較在意的是，系統最後講出來的判讀，家屬到底看不看得懂、敢不敢信。', author: 'u23', x: 4050, y: 550, parentId: 'g2-w2-15', date: dates.w2+15000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w2-ra', topicId: 't-g2', type: 'riseabove', title: 'W2 小結：第二組第二週把『異常』放回人的基線與', content: '第二組第二週把『異常』放回人的基線與生活情境，不再用單一門檻看所有人。', author: 'u21', x: 4400, y: 350, parentId: 'g2-w2-16', date: dates.w2+16000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G2 Week 3 (Base X: 4500) ---
                { id: 'g2-w3-1', topicId: 't-g2', type: 'question', title: '如果我們只能優先抓幾個關鍵變數 (W3 主節點)', content: '如果我們只能優先抓幾個關鍵變數，你們覺得最值得先理解的是哪一個？是個體基線、當下 情境，還是感測干擾？我現在有點覺得，這三個其實會一起影響，但還是得先有主次。', author: 'u21', x: 4500, y: 350, parentId: 'g2-w2-ra', date: dates.w3, cluster: 'A', promisingness: 75 },
                { id: 'g2-w3-2', topicId: 't-g2', type: 'buildon', title: '我傾向 先抓『個體基線 + 情境』', content: '我傾向 先抓『個體基線 + 情境』，因為這兩個決定了我們到底在比較什麼。如果連比較基準都不清楚，後面感測再 準也只是把數值量得更漂亮而已。', author: 'u21', x: 4850, y: 350, parentId: 'g2-w3-1', date: dates.w3+1000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w3-3', topicId: 't-g2', type: 'counter', title: '但如果感測器本身就被干擾', content: '但如果感測器本身就被干擾，那前面那些判斷也可能是建立在錯資料上。像移動造成的雜訊、 距離不穩、角度偏掉，這些可能會直接把整個判讀拉歪。', author: 'u21', x: 5200, y: 350, parentId: 'g2-w3-2', date: dates.w3+2000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w3-4', topicId: 't-g2', type: 'improve', title: '所以我現在比較想把問題拆成兩層： 第', content: '所以我現在比較想把問題拆成兩層： 第一層是『量到的是不是真的』，第二層是『真的數值代表什麼』。這樣我們比較不會把訊號問題跟判讀問題 混在一起。', author: 'u21', x: 5550, y: 350, parentId: 'g2-w3-3', date: dates.w3+3000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w3-5', topicId: 't-g2', type: 'buildon', title: '如果照這樣分', content: '如果照這樣分，我們之後測試也可以跟著拆。先測感測穩不穩，再測判讀合不合理。這樣出錯 時比較找得到原因，不會全部都怪模型。', author: 'u21', x: 5900, y: 350, parentId: 'g2-w3-4', date: dates.w3+4000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w3-6', topicId: 't-g2', type: 'riseabove', title: '我覺得第二組現在真正的研究重點', content: '我覺得第二組現在真正的研究重點，已經不是單 純做非接觸式監測，而是建立『可信的居家判讀條件』。也就是說，我們不只是要量到，而是要知道在什麼 條件下量到的東西才值得相信。', author: 'u21', x: 6250, y: 350, parentId: 'g2-w3-5', date: dates.w3+5000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g2-w3-7', topicId: 't-g2', type: 'buildon', title: '我現在比較傾向先把『資料有沒有可信』', content: '我現在比較傾向先把『資料有沒有可信』放前面，因為如果入口就不穩，後面再怎麼 判都很容易歪掉。', author: 'u21', x: 6600, y: 350, parentId: 'g2-w3-6', date: dates.w3+6000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w3-8', topicId: 't-g2', type: 'question', title: '如果要先驗證『量到的是不是真的』', content: '如果要先驗證『量到的是不是真的』，那我們是不是應該先做幾個最容易干擾的情境測試？例 如移動中、遮擋、距離太遠，看看數值會亂到什麼程度。', author: 'u22', x: 4850, y: 150, parentId: 'g2-w3-1', date: dates.w3+7000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w3-9', topicId: 't-g2', type: 'buildon', title: '我滿同意分成兩層', content: '我滿同意分成兩層。因為我之前常常會 不自覺把結果不好直接想成模型不夠強，但現在回頭看，有時候根本是量測條件太差，資料本身就不乾 淨。', author: 'u22', x: 5200, y: 150, parentId: 'g2-w3-8', date: dates.w3+8000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w3-10', topicId: 't-g2', type: 'improve', title: '我們後面測試表可以加一欄『本次資料是', content: '我們後面測試表可以加一欄『本次資料是否可信』。如果明顯是在雜訊很多的狀況下量到，就先 不要拿去當判讀依據，不然會越學越亂。', author: 'u22', x: 5550, y: 150, parentId: 'g2-w3-9', date: dates.w3+9000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w3-11', topicId: 't-g2', type: 'counter', title: '不過如果把太多資料都排掉', content: '不過如果把太多資料都排掉，又可能變成系統只能在 很理想的情況下用。居家環境本來就不理想，所以我們還是得想辦法處理，而不是一直丟掉。', author: 'u22', x: 5900, y: 150, parentId: 'g2-w3-10', date: dates.w3+10000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w3-12', topicId: 't-g2', type: 'buildon', title: '也許我們可以先定義『黃金量測窗口』', content: '也許我們可以先定義『黃金量測窗口』。不是每時每刻都硬量，而是先找比較穩的時間點，例如 安靜坐著、睡前、剛醒來。這樣比較接近真正可用。', author: 'u22', x: 6250, y: 150, parentId: 'g2-w3-11', date: dates.w3+11000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w3-13', topicId: 't-g2', type: 'buildon', title: '我會想先抓幾個最容易亂掉的情境去測', content: '我會想先抓幾個最容易亂掉的情境去測，這樣比較快看出我們到底卡在感測，還是 卡在判讀。', author: 'u22', x: 6600, y: 150, parentId: 'g2-w3-12', date: dates.w3+12000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w3-14', topicId: 't-g2', type: 'question', title: '我覺得除了技術變數之外', content: '我覺得除了技術變數之外，還有一個很重要的是『被照顧者會不會願意配合』。如果系統要求 他一定要固定坐好、不准動太多，現實上很可能根本做不到。那這算不算也是一種研究變數？', author: 'u23', x: 4850, y: 550, parentId: 'g2-w3-1', date: dates.w3+13000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w3-15', topicId: 't-g2', type: 'buildon', title: '我有點認同晨銘說的黃金量測窗口', content: '我有點認同晨銘說的黃金量測窗口。因為居家照護不是要把人變成實驗對象，而是要找他比較自然、也比 較不辛苦的時間點。這樣才比較像真的能長期用。', author: 'u23', x: 5200, y: 550, parentId: 'g2-w3-14', date: dates.w3+14000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w3-16', topicId: 't-g2', type: 'improve', title: '也許我們後面可以把問題改成：在不增加', content: '也許我們後面可以把問題改成：在不增加使用者負擔的前提下，什麼時候最容易量到可信資 料？這樣就不只是在想技術，也是在想照護關係。', author: 'u23', x: 5550, y: 550, parentId: 'g2-w3-15', date: dates.w3+15000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w3-17', topicId: 't-g2', type: 'counter', title: '但我也知道', content: '但我也知道，有些危險不是剛好都發生在黃 金時間。所以我們不能因為想降低負擔，就只挑最好量的時候。後面還是要想，平常時段至少能做到什麼 程度。', author: 'u23', x: 5900, y: 550, parentId: 'g2-w3-16', date: dates.w3+16000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w3-18', topicId: 't-g2', type: 'buildon', title: '我覺得我們現在比較像在找一個平衡：不', content: '我覺得我們現在比較像在找一個平衡：不是全時段都很精準，也不是只有理想狀況才有用，而 是找到在生活裡真正可行的判讀方式。', author: 'u23', x: 6250, y: 550, parentId: 'g2-w3-17', date: dates.w3+17000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w3-19', topicId: 't-g2', type: 'buildon', title: '我的想法是', content: '我的想法是，第二組後面不能只追求量得到，也要想這樣量會不會讓被照顧者很不 方便。', author: 'u23', x: 6600, y: 550, parentId: 'g2-w3-18', date: dates.w3+18000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w3-ra', topicId: 't-g2', type: 'riseabove', title: 'W3 小結：第二組第三週開始從很多可能因素中', content: '第二組第三週開始從很多可能因素中，聚焦哪些條件最值得被先理解與先量測。', author: 'u21', x: 6950, y: 350, parentId: 'g2-w3-19', date: dates.w3+19000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G2 Week 4 (Base X: 6700) ---
                { id: 'g2-w4-1', topicId: 't-g2', type: 'question', title: '如果今天一個數值偏離個體平常範圍 (W4 主節點)', content: '如果今天一個數值偏離個體平常範圍，可是剛好也符合當下情境，例如活動後呼吸變快，那這 種到底算不算異常？我發現真正困難的不是抓變化，而是決定哪種變化值得介入。', author: 'u21', x: 6700, y: 350, parentId: 'g2-w3-ra', date: dates.w4, cluster: 'A', promisingness: 75 },
                { id: 'g2-w4-2', topicId: 't-g2', type: 'buildon', title: '我現在比較 傾向把『真正異常』定義成', content: '我現在比較 傾向把『真正異常』定義成兩件事同時發生：第一，數值確實偏離基線；第二，這個偏離沒辦法被當下情境合 理解釋。這樣感覺比只看門檻更像在判讀。', author: 'u21', x: 7050, y: 350, parentId: 'g2-w4-1', date: dates.w4+1000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w4-3', topicId: 't-g2', type: 'counter', title: '不過這樣也有風險', content: '不過這樣也有風險，因為有些危險一開始就藏在看起來合理的情境裡。像剛活動完本來就會喘 ，可是如果恢復得異常慢，可能也是問題。', author: 'u21', x: 7400, y: 350, parentId: 'g2-w4-2', date: dates.w4+2000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w4-4', topicId: 't-g2', type: 'improve', title: '所以我覺得我們不能只看單點', content: '所以我覺得我們不能只看單點，而要看變化持續多 久。比方說活動後呼吸變快沒關係，但如果過了一段時間還沒回來，那就要提高警覺。', author: 'u21', x: 7750, y: 350, parentId: 'g2-w4-3', date: dates.w4+3000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w4-5', topicId: 't-g2', type: 'buildon', title: '這樣一來', content: '這樣一來，我們的判準就不只是『多少算異常』，還要加上『持續多久還沒恢復』。我覺得這比較 接近居家照護真的會需要的判斷方式。', author: 'u21', x: 8100, y: 350, parentId: 'g2-w4-4', date: dates.w4+4000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w4-6', topicId: 't-g2', type: 'riseabove', title: '我現在比較清楚了：第二組不是在找一條', content: '我現在比較清楚了：第二組不是在找一條固定的警 戒線，而是在建立一個『基線 × 情境 × 時間』一起運作的判讀框架。這樣才有可能讓提醒比較可信。', author: 'u21', x: 8450, y: 350, parentId: 'g2-w4-5', date: dates.w4+5000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g2-w4-7', topicId: 't-g2', type: 'buildon', title: '我開始覺得真正異常不是『有變化』而已', content: '我開始覺得真正異常不是『有變化』而已，而是『這個變化放回當下情境後，還是講 不太通』。', author: 'u21', x: 8800, y: 350, parentId: 'g2-w4-6', date: dates.w4+6000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w4-8', topicId: 't-g2', type: 'question', title: '如果要把『持續多久』也算進去', content: '如果要把『持續多久』也算進去，那我們後面記錄資料的方式是不是要改？因為以前可能只看 某一個時刻的值，現在可能要連一段時間一起看。', author: 'u22', x: 7050, y: 150, parentId: 'g2-w4-1', date: dates.w4+7000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w4-9', topicId: 't-g2', type: 'buildon', title: '我滿認同加上時間', content: '我滿認同加上時間。因為很多誤報都像是一 瞬間跳掉，可是真的危險有時候反而不是那種一下子衝很高，而是持續怪怪的。', author: 'u22', x: 7400, y: 150, parentId: 'g2-w4-8', date: dates.w4+8000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w4-10', topicId: 't-g2', type: 'improve', title: '我建議我們之後的判讀邏輯可以先分三級', content: '我建議我們之後的判讀邏輯可以先分三級：暫時觀察、提醒注意、立即警報。這樣就不用把所 有狀況都壓成只有正常或異常兩種。', author: 'u22', x: 7750, y: 150, parentId: 'g2-w4-9', date: dates.w4+9000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w4-11', topicId: 't-g2', type: 'counter', title: '但是分級也不能分得太花', content: '但是分級也不能分得太花。因為如果家屬看不懂每個等級 差在哪裡，最後還是會亂。所以分類要清楚，理由也要能講得出來。', author: 'u22', x: 8100, y: 150, parentId: 'g2-w4-10', date: dates.w4+10000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w4-12', topicId: 't-g2', type: 'buildon', title: '我們也可以把觸發原因一起顯示', content: '我們也可以把觸發原因一起顯示，例如『活動後恢復過慢』或『睡眠中長時間偏離基線』。這樣至 少比單純跳紅燈更有說服力。', author: 'u22', x: 8450, y: 150, parentId: 'g2-w4-11', date: dates.w4+11000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w4-13', topicId: 't-g2', type: 'buildon', title: '如果要把持續時間放進去', content: '如果要把持續時間放進去，我覺得後面記錄方式就不能再只看一個瞬間，要看一整 段。', author: 'u22', x: 8800, y: 150, parentId: 'g2-w4-12', date: dates.w4+12000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w4-14', topicId: 't-g2', type: 'question', title: '如果我是家屬', content: '如果我是家屬，我其實不太需要系統一直跟我講『有變化』，我比較想知道『現在要不要做什 麼』。那我們現在設計的判準，有沒有真的對應到家屬的行動？', author: 'u23', x: 7050, y: 550, parentId: 'g2-w4-1', date: dates.w4+13000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w4-15', topicId: 't-g2', type: 'buildon', title: '晨銘說的分級我覺得不錯', content: '晨銘說的分級我覺得不錯，因 為照護現場真的不是每一個提醒都要馬上衝去處理。有些可能只是多看一下，有些才是真的要立刻介入。', author: 'u23', x: 7400, y: 550, parentId: 'g2-w4-14', date: dates.w4+14000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w4-16', topicId: 't-g2', type: 'improve', title: '我覺得每個等級可以對應一個比較生活化', content: '我覺得每個等級可以對應一個比較生活化的提示，不要全部都很像醫療警報。像『建議再觀察 10 分鐘』、『建議聯繫家人』這種，比單純異常兩個字有用。', author: 'u23', x: 7750, y: 550, parentId: 'g2-w4-15', date: dates.w4+15000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w4-17', topicId: 't-g2', type: 'counter', title: '但如果文字太像安撫', content: '但如果文字太像安撫，又可能讓人 誤會事情不嚴重。所以生活化不代表隨便，還是要保留該有的警覺。', author: 'u23', x: 8100, y: 550, parentId: 'g2-w4-16', date: dates.w4+16000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w4-18', topicId: 't-g2', type: 'riseabove', title: '我覺得我們最後要做的不只是會量的系統', content: '我覺得我們最後要做的不只是會量的系統，而是會幫人做出下一步判斷的系統。真正的異 常不是數值本身，而是數值、情境和後續風險一起看起來不對勁。', author: 'u23', x: 8450, y: 550, parentId: 'g2-w4-17', date: dates.w4+17000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g2-w4-19', topicId: 't-g2', type: 'buildon', title: '我比較認同把提醒分級', content: '我比較認同把提醒分級，因為家屬需要的不是每次都被嚇到，而是知道現在到底要 不要做什麼。', author: 'u23', x: 8800, y: 550, parentId: 'g2-w4-18', date: dates.w4+18000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w4-ra', topicId: 't-g2', type: 'riseabove', title: 'W4 小結：第二組第四週不再只看單點數值', content: '第二組第四週不再只看單點數值，而是開始用基線、情境、時間與行動建構判準。', author: 'u21', x: 9150, y: 350, parentId: 'g2-w4-19', date: dates.w4+19000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G2 Week 5 (Base X: 8900) ---
                { id: 'g2-w5-1', topicId: 't-g2', type: 'question', title: '如果我們現在已經知道不能只看單一數值 (W5 主節點)', content: '如果我們現在已經知道不能只看單一數值，那系統邏輯是不是也要改成『多個條件一起判 斷』？不然前面討論那麼多，最後還是用單一門檻收掉，感覺有點白做。', author: 'u21', x: 8900, y: 350, parentId: 'g2-w4-ra', date: dates.w5, cluster: 'A', promisingness: 75 },
                { id: 'g2-w5-2', topicId: 't-g2', type: 'buildon', title: '我想像的做法是', content: '我想像的做法是，先看 這筆資料可信不可信，再看有沒有偏離個體基線，最後再看當下情境能不能解釋。如果三層都過不了，才 往高風險推。', author: 'u21', x: 9250, y: 350, parentId: 'g2-w5-1', date: dates.w5+1000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w5-3', topicId: 't-g2', type: 'counter', title: '但這樣做也可能變太複雜', content: '但這樣做也可能變太複雜，尤其我們還是高中生專題，不可能做成超完整醫療系統。所以我覺 得要找一個『簡化但還合理』的版本。', author: 'u21', x: 9600, y: 350, parentId: 'g2-w5-2', date: dates.w5+2000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w5-4', topicId: 't-g2', type: 'improve', title: '也許可以先做最核心的三層：訊號品質、', content: '也許可以先做最核心的三層：訊號品質、情境標記、偏離 程度。先把這三個做出來，就已經比單一門檻成熟很多了。', author: 'u21', x: 9950, y: 350, parentId: 'g2-w5-3', date: dates.w5+3000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w5-5', topicId: 't-g2', type: 'buildon', title: '另外我覺得跌倒偵測也可以用一樣的邏輯', content: '另外我覺得跌倒偵測也可以用一樣的邏輯。不是只看有沒有倒，而是看倒下去之後的狀態是不 是持續異常。這樣比較不會把綁鞋帶或撿東西都當成危險。', author: 'u21', x: 10300, y: 350, parentId: 'g2-w5-4', date: dates.w5+4000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w5-6', topicId: 't-g2', type: 'improve', title: '我想把現在的系統流程畫成判讀樹', content: '我想把現在的系統流程畫成判讀樹 ，這樣我們才知道每一步到底在判什麼。畫出來之後，也比較容易發現哪裡邏輯還太跳。', author: 'u21', x: 10650, y: 350, parentId: 'g2-w5-5', date: dates.w5+5000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w5-7', topicId: 't-g2', type: 'riseabove', title: '我覺得我們真正的進步', content: '我覺得我們真正的進步，是把『感測器很會看』這件事，慢慢改寫成『系統比較會判斷』。前 者只是技術能力，後者才比較接近照護能力。', author: 'u21', x: 11000, y: 350, parentId: 'g2-w5-6', date: dates.w5+6000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g2-w5-8', topicId: 't-g2', type: 'buildon', title: '我現在的想法是', content: '我現在的想法是，第二組後面不能只講『多條件判斷』這句漂亮話，而是要把每一層 到底在判什麼講清楚。', author: 'u21', x: 11350, y: 350, parentId: 'g2-w5-7', date: dates.w5+7000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w5-9', topicId: 't-g2', type: 'question', title: '如果我們改成多條件判斷', content: '如果我們改成多條件判斷，那測試時要怎麼驗證它真的有比較好？總不能只看感覺，我覺得 後面還是要有一套能比較前後差異的方法。', author: 'u22', x: 9250, y: 150, parentId: 'g2-w5-1', date: dates.w5+8000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w5-10', topicId: 't-g2', type: 'buildon', title: '我想到最直接的方式', content: '我想到最直接的方式，是拿幾個很容易誤判的案例 來跑看看。像活動後喘、短暫彎腰、講話太久，這些都是以前很容易中招的。', author: 'u22', x: 9600, y: 150, parentId: 'g2-w5-9', date: dates.w5+9000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w5-11', topicId: 't-g2', type: 'improve', title: '我們可以做一張『舊邏輯 vs 新邏輯', content: '我們可以做一張『舊邏輯 vs 新邏輯』的比較表，看同一個案例下，原本怎麼判、現在怎麼判，這 樣進步比較看得出來。', author: 'u22', x: 9950, y: 150, parentId: 'g2-w5-10', date: dates.w5+10000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w5-12', topicId: 't-g2', type: 'counter', title: '不過也不能只挑對我們有利的案例', content: '不過也不能只挑對我們有利的案例。因為如果真的要證明邏輯有變好， 還是要放進一些邊界案例，不然很容易看起來很好，其實只是挑題目。', author: 'u22', x: 10300, y: 150, parentId: 'g2-w5-11', date: dates.w5+11000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w5-13', topicId: 't-g2', type: 'buildon', title: '我覺得晨間剛起床、晚上準備睡覺、運動', content: '我覺得晨間剛起床、晚上準備睡覺、運動後休息，這三種都可以算邊界案例。因為它們介在正 常和異常之間，很適合測我們的判準夠不夠穩。', author: 'u22', x: 10650, y: 150, parentId: 'g2-w5-12', date: dates.w5+12000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w5-14', topicId: 't-g2', type: 'improve', title: '系統顯示上', content: '系統顯示上，我傾向不要一次丟太多技術字。 可以把詳細理由藏在第二層，第一層先給使用者簡單判讀。這樣比較像真的會有人用。', author: 'u22', x: 11000, y: 150, parentId: 'g2-w5-13', date: dates.w5+13000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w5-15', topicId: 't-g2', type: 'buildon', title: '我開始覺得比較舊邏輯和新邏輯很重要', content: '我開始覺得比較舊邏輯和新邏輯很重要，因為只有這樣才看得出我們不是只換一 個說法，而是真的改了判讀方式。', author: 'u22', x: 11350, y: 150, parentId: 'g2-w5-14', date: dates.w5+14000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w5-16', topicId: 't-g2', type: 'question', title: '如果系統最後判定要提醒', content: '如果系統最後判定要提醒，那提醒應該要傳給誰、用什麼方式講，這件事是不是也很重要？因 為不同對象看到同一句話，壓力感可能差很多。', author: 'u23', x: 9250, y: 550, parentId: 'g2-w5-1', date: dates.w5+15000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w5-17', topicId: 't-g2', type: 'buildon', title: '我覺得給家屬的訊息跟給照護人員的訊息', content: '我覺得給家屬的訊息跟給照護人員的訊息可以 不一樣。家屬可能需要先知道現在狀況與建議動作，照護人員則可以看到更多判讀依據。', author: 'u23', x: 9600, y: 550, parentId: 'g2-w5-16', date: dates.w5+16000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w5-18', topicId: 't-g2', type: 'improve', title: '也許提醒畫面可以分成『簡要版』和『詳', content: '也許提醒畫面可以分成『簡要版』和『詳細版』。簡要版給一般人，詳細版保留給真的想看依據的 人。這樣比較不會讓資訊一出來就把人嚇到。', author: 'u23', x: 9950, y: 550, parentId: 'g2-w5-17', date: dates.w5+17000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w5-19', topicId: 't-g2', type: 'counter', title: '但如果做兩版', content: '但如果做兩版，也要小心不要讓簡要版講太少， 變成不知道為什麼要相信它。說到底，系統還是要讓人知道這不是亂判。', author: 'u23', x: 10300, y: 550, parentId: 'g2-w5-18', date: dates.w5+18000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w5-20', topicId: 't-g2', type: 'buildon', title: '我覺得我們這組最大的核心', content: '我覺得我們這組最大的核心，應該不是做一個很會通報的 AI，而是做一個讓人願意把照護判 斷交給它一部分的系統。這種信任感其實是設計出來的。', author: 'u23', x: 10650, y: 550, parentId: 'g2-w5-19', date: dates.w5+19000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w5-21', topicId: 't-g2', type: 'riseabove', title: '所以我現在會把第二組的題目理 解成：', content: '所以我現在會把第二組的題目理 解成：不是讓 AI 代替人照顧，而是幫人在不在身邊的時候，先做一層比較合理的風險判讀。真正要守護的 ，其實是信任。', author: 'u23', x: 11000, y: 550, parentId: 'g2-w5-20', date: dates.w5+20000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g2-w5-22', topicId: 't-g2', type: 'buildon', title: '真正要解決的可能不是提醒太少', content: '真正要解決的可能不是提醒太少，而是提醒怎麼講才不會讓人又累、又怕、又不知 道該怎麼做。', author: 'u23', x: 11350, y: 550, parentId: 'g2-w5-21', date: dates.w5+21000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w5-ra', topicId: 't-g2', type: 'riseabove', title: 'W5 小結：第二組第五週把判準推進到系統邏輯', content: '第二組第五週把判準推進到系統邏輯，從『感測』走向『可解釋的判讀』。', author: 'u21', x: 11700, y: 350, parentId: 'g2-w5-22', date: dates.w5+22000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G2 Week 6 (Base X: 11100) ---
                { id: 'g2-w6-1', topicId: 't-g2', type: 'question', title: '如果今天系統判錯 (W6 主節點)', content: '如果今天系統判錯，我們第一反應通常會說『模型不夠準』，可是現在回頭看，好像很多錯都不 是單一原因。那我們之後是不是要練習把錯誤拆開來看？', author: 'u21', x: 11100, y: 350, parentId: 'g2-w5-ra', date: dates.w6, cluster: 'A', promisingness: 75 },
                { id: 'g2-w6-2', topicId: 't-g2', type: 'buildon', title: '例如有些誤報是情境沒判進去', content: '例如有些誤報是情境沒判進去，有些 是基線根本沒建好，有些則是訊號一開始就不可信。把這些都叫做『判錯』其實太粗了，因為修正方法完全 不同。', author: 'u21', x: 11450, y: 350, parentId: 'g2-w6-1', date: dates.w6+1000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w6-3', topicId: 't-g2', type: 'improve', title: '我建議我們把錯誤分型', content: '我建議我們把錯誤分型。至少分成：資料不可信、情境誤讀、門檻太死、恢復時間沒算進去。這 樣後面檢討才不會每次都只說要再優化。', author: 'u21', x: 11800, y: 350, parentId: 'g2-w6-2', date: dates.w6+2000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w6-4', topicId: 't-g2', type: 'counter', title: '但我也覺得不能分得太學術', content: '但我也覺得不能分得太學術，分到最後自己都記不 住。分類的重點應該是幫助我們下次改得更準，而不是看起來很厲害。', author: 'u21', x: 12150, y: 350, parentId: 'g2-w6-3', date: dates.w6+3000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w6-5', topicId: 't-g2', type: 'buildon', title: '我最近越來越覺得', content: '我最近越來越覺得，專題做到後面最有價值的不是系統沒有出錯，而是我們知道它為什麼出 錯。因為那代表我們開始真的在理解它。', author: 'u21', x: 12500, y: 350, parentId: 'g2-w6-4', date: dates.w6+4000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w6-6', topicId: 't-g2', type: 'improve', title: '也許我們的結果討論可以直接寫『哪些狀', content: '也許我們的結果討論可以直接寫『哪些狀況下系統目 前不適合判讀』。這雖然不像全能系統那麼好看，但我覺得反而更真。', author: 'u21', x: 12850, y: 350, parentId: 'g2-w6-5', date: dates.w6+5000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w6-7', topicId: 't-g2', type: 'riseabove', title: '我現在比較確定了：第二組真正的進步', content: '我現在比較確定了：第二組真正的進步，不是把錯誤消滅到零，而是把錯誤變成可以解釋、 可以修正、可以對外說清楚的知識。這才像研究。', author: 'u21', x: 13200, y: 350, parentId: 'g2-w6-6', date: dates.w6+6000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g2-w6-8', topicId: 't-g2', type: 'buildon', title: '這週我最明確的感覺是', content: '這週我最明確的感覺是，錯誤不能只被當成丟臉，它其實是在幫我們指出哪一層判 斷還太快。', author: 'u21', x: 13550, y: 350, parentId: 'g2-w6-7', date: dates.w6+7000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w6-9', topicId: 't-g2', type: 'question', title: '如果我們把錯誤分型', content: '如果我們把錯誤分型，那測試紀錄是不是也要跟著改？不然最後還是只有『有成功』『沒成功』 這兩欄，很多東西根本看不出來。', author: 'u22', x: 11450, y: 150, parentId: 'g2-w6-1', date: dates.w6+8000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w6-10', topicId: 't-g2', type: 'buildon', title: '我覺得可以在每次測試後直接記：這次最', content: '我覺得可以在每次測試後直接記：這次最可能是哪一類錯。 這樣累積幾次之後，就會看出我們一直卡在哪裡，不用每次都從頭猜。', author: 'u22', x: 11800, y: 150, parentId: 'g2-w6-9', date: dates.w6+9000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w6-11', topicId: 't-g2', type: 'improve', title: '而且我覺得『漏報』要特別重看', content: '而且我覺得『漏報』要特別重看。因為誤報至少還會跳出來，漏報比較可怕，是沒人知道它錯 了。這種情況應該要有專門的討論。', author: 'u22', x: 12150, y: 150, parentId: 'g2-w6-10', date: dates.w6+10000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w6-12', topicId: 't-g2', type: 'counter', title: '但是如果全部都往保守方向修', content: '但是如果全部都往保守方向修，可能會變成系統太常叫。 這就是為什麼我們最後還是得回到平衡，而不是只看哪一類錯比較可怕。', author: 'u22', x: 12500, y: 150, parentId: 'g2-w6-11', date: dates.w6+11000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w6-13', topicId: 't-g2', type: 'buildon', title: '我想到一個方式', content: '我想到一個方式，可以記錄每個錯誤發生時的環境條件，例如距離、動作、光線、當時狀態。這 樣比較容易找到共通點。', author: 'u22', x: 12850, y: 150, parentId: 'g2-w6-12', date: dates.w6+12000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w6-14', topicId: 't-g2', type: 'improve', title: '我們後面成果展示也可以把『成功案例』', content: '我們後面成果展示也可以把『成功案例』跟『失效案例』放一起。因為只 有放成功的話，評審反而看不出我們真的有在思考。', author: 'u22', x: 13200, y: 150, parentId: 'g2-w6-13', date: dates.w6+13000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w6-15', topicId: 't-g2', type: 'buildon', title: '我現在比較會把錯分開看', content: '我現在比較會把錯分開看，因為有些是資料本身不穩，有些是我們把情境想得太簡 單，修法根本不同。', author: 'u22', x: 13550, y: 150, parentId: 'g2-w6-14', date: dates.w6+14000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w6-16', topicId: 't-g2', type: 'question', title: '如果系統常在某些情況下判錯', content: '如果系統常在某些情況下判錯，我們是不是也要誠實告訴使用者？因為如果假裝它什麼都能 判，反而比較危險。', author: 'u23', x: 11450, y: 550, parentId: 'g2-w6-1', date: dates.w6+15000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w6-17', topicId: 't-g2', type: 'buildon', title: '我覺得居家照護很重要的一點是『知道系', content: '我覺得居家照護很重要的一點是『知道系統的邊界』。像什麼情況下比較 準、什麼情況下只能參考，這些如果講清楚，家屬反而比較能正確使用。', author: 'u23', x: 11800, y: 550, parentId: 'g2-w6-16', date: dates.w6+16000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w6-18', topicId: 't-g2', type: 'improve', title: '也許我們可以在系統裡加一個『目前判讀', content: '也許我們可以在系統裡加一個『目前判讀可信度』，不是每次都裝得很肯定。這樣雖然看起來沒 那麼帥，但我覺得更負責任。', author: 'u23', x: 12150, y: 550, parentId: 'g2-w6-17', date: dates.w6+17000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w6-19', topicId: 't-g2', type: 'counter', title: '不過可信度如果做得太抽象', content: '不過可信度如果做得太抽象，使用者也可能看不懂。所以可能要 轉成比較生活化的說法，例如『建議再確認』或『目前環境干擾較多』。', author: 'u23', x: 12500, y: 550, parentId: 'g2-w6-18', date: dates.w6+18000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w6-20', topicId: 't-g2', type: 'buildon', title: '我覺得這一週讓我最有感的是', content: '我覺得這一週讓我最有感的是，照護不是只有在正確的時候才有價值，而是在不確定時，也能 讓人知道現在該怎麼面對不確定。', author: 'u23', x: 12850, y: 550, parentId: 'g2-w6-19', date: dates.w6+19000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w6-21', topicId: 't-g2', type: 'riseabove', title: '所以第二組最後不是要變成一個什麼都敢', content: '所以第二組最後不是要變成一個什麼都敢判的系統，而 是變成一個知道自己什麼時候該判、什麼時候該保留的系統。這其實更像真正的守護。', author: 'u23', x: 13200, y: 550, parentId: 'g2-w6-20', date: dates.w6+20000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g2-w6-22', topicId: 't-g2', type: 'buildon', title: '我的想法是', content: '我的想法是，願意把系統邊界講出來，反而比較像真的照護系統，不然只會看起來 很強但不夠負責。', author: 'u23', x: 13550, y: 550, parentId: 'g2-w6-21', date: dates.w6+21000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w6-ra', topicId: 't-g2', type: 'riseabove', title: 'W6 小結：第二組第六週開始把錯誤當成可解釋、可', content: '第二組第六週開始把錯誤當成可解釋、可修正、可對外說清楚的知識，而不是只當失敗。', author: 'u21', x: 13900, y: 350, parentId: 'g2-w6-22', date: dates.w6+22000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G2 Week 7 (Base X: 13300) ---
                { id: 'g2-w7-1', topicId: 't-g2', type: 'question', title: '如果要用一句話講我們第二組這七週到底 (W7 主節點)', content: '如果要用一句話講我們第二組這七週到底進步了什麼，你們會怎麼說？我現在最不想看到的 就是又回到『我們做了一個能監測的系統』這種講法，因為那真的太前面了。', author: 'u21', x: 13300, y: 350, parentId: 'g2-w6-ra', date: dates.w7, cluster: 'A', promisingness: 75 },
                { id: 'g2-w7-2', topicId: 't-g2', type: 'buildon', title: '我自己的感覺是', content: '我自己的感覺是， 我們從『看得到』慢慢走到『比較知道怎麼判』。前面是技術，後面才比較像研究，因為我們開始一直追問這 個判斷到底站不站得住。', author: 'u21', x: 13650, y: 350, parentId: 'g2-w7-1', date: dates.w7+1000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w7-3', topicId: 't-g2', type: 'improve', title: '我想把我們的核心模型整理成四步：先看', content: '我想把我們的核心模型整理成四步：先看資料可信度，再看個體基線，再看生活情境，最後再 決定要不要提醒。這樣比只說 AI 很聰明具體很多。', author: 'u21', x: 14000, y: 350, parentId: 'g2-w7-2', date: dates.w7+2000, cluster: 'B', promisingness: 68 },
