                { id: 'g4-w4-7', topicId: 't-g4', type: 'buildon', title: '我現在的想法是', content: '我現在的想法是，第四組後面不能只靠一次熄滅就下結論，因為真正有研究價值的 是：這個條件是不是穩、是不是能重複、是不是有過程證據支持。', author: 'u41', x: 8800, y: 350, parentId: 'g4-w4-6', date: dates.w4+6000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w4-8', topicId: 't-g4', type: 'question', title: '如果一個條件偶爾能滅', content: '如果一個條件偶爾能滅，但很不穩定；另一個條件不一定每次都滅，但很常讓火焰接近失穩， 那哪個比較有研究價值？', author: 'u42', x: 7050, y: 150, parentId: 'g4-w4-1', date: dates.w4+7000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w4-9', topicId: 't-g4', type: 'buildon', title: '我其實比較想追第二種', content: '我其實比較想追第二種。因為穩定接近失穩，代表我們比較有可能真 的抓到規律。偶爾一次大成功，有時候反而像運氣。', author: 'u42', x: 7400, y: 150, parentId: 'g4-w4-8', date: dates.w4+8000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w4-10', topicId: 't-g4', type: 'counter', title: '不過如果最後永遠只接近不成功', content: '不過如果最後永遠只接近不成功，也還是要小心別把它講得太滿。因為應用上還是會回到能不 能真的滅掉。', author: 'u42', x: 7750, y: 150, parentId: 'g4-w4-9', date: dates.w4+9000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w4-11', topicId: 't-g4', type: 'improve', title: '所以也許可以分成『研究價值高』跟『應', content: '所以也許可以分成『研究價值高』跟『應用效果高』兩條線來看，不一定要完全綁在 一起。', author: 'u42', x: 8100, y: 150, parentId: 'g4-w4-10', date: dates.w4+10000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w4-12', topicId: 't-g4', type: 'buildon', title: '這樣我們就不會只追最漂亮的結果', content: '這樣我們就不會只追最漂亮的結果，也會看到哪些條件比較值得再深挖。', author: 'u42', x: 8450, y: 150, parentId: 'g4-w4-11', date: dates.w4+11000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w4-13', topicId: 't-g4', type: 'riseabove', title: '我現 在比較能說清楚第四組在幹嘛了：', content: '我現 在比較能說清楚第四組在幹嘛了：我們不是只想找到最會熄的那一下，而是想找到讓火焰穩定走向失穩的 條件。', author: 'u42', x: 8800, y: 150, parentId: 'g4-w4-12', date: dates.w4+12000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g4-w4-14', topicId: 't-g4', type: 'buildon', title: '我開始比較清楚了：研究價值高的', content: '我開始比較清楚了：研究價值高的，不一定是最會熄的條件，而可能是最穩定讓火 焰接近失穩的條件。', author: 'u42', x: 9150, y: 150, parentId: 'g4-w4-13', date: dates.w4+13000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w4-15', topicId: 't-g4', type: 'improve', title: '我的想法是', content: '我的想法是，這其實就是第四組後期最重要的轉向：從找亮點，改成找規律。', author: 'u42', x: 9500, y: 150, parentId: 'g4-w4-14', date: dates.w4+14000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w4-16', topicId: 't-g4', type: 'question', title: '如果我們要把『接近失穩』也算進來', content: '如果我們要把『接近失穩』也算進來，那後面是不是要把觀察現象講得更固定一點？不然很容 易變成每次講法都不一樣。', author: 'u43', x: 7050, y: 550, parentId: 'g4-w4-1', date: dates.w4+15000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w4-17', topicId: 't-g4', type: 'buildon', title: '像火焰明顯傾斜、底部跳動、整體變小、', content: '像火焰明顯傾斜、底部跳動、整體變小、忽明忽暗，這些其實都可以 先整理成幾個固定觀察點。', author: 'u43', x: 7400, y: 550, parentId: 'g4-w4-16', date: dates.w4+16000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w4-18', topicId: 't-g4', type: 'improve', title: '我覺得這樣後面不只比較好記', content: '我覺得這樣後面不只比較好記，也比較能跟影片對照，大家比較不會各講各的。', author: 'u43', x: 7750, y: 550, parentId: 'g4-w4-17', date: dates.w4+17000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w4-19', topicId: 't-g4', type: 'counter', title: '但 也不能把觀察做得太細', content: '但 也不能把觀察做得太細，不然現場記錄會很忙。還是要抓最關鍵幾個。', author: 'u43', x: 8100, y: 550, parentId: 'g4-w4-18', date: dates.w4+18000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w4-20', topicId: 't-g4', type: 'buildon', title: '我會更想把現場那些固定的擾動現象先講', content: '我會更想把現場那些固定的擾動現象先講清楚，因為那是我們最先看到規律的地 方。', author: 'u43', x: 8450, y: 550, parentId: 'g4-w4-19', date: dates.w4+19000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w4-21', topicId: 't-g4', type: 'question', title: '如果現在判準變多', content: '如果現在判準變多，那測試表是不是也要跟著改？不然最後資料格式還是只寫熄沒熄。', author: 'u44', x: 7050, y: 850, parentId: 'g4-w4-1', date: dates.w4+20000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w4-22', topicId: 't-g4', type: 'buildon', title: '我覺得要', content: '我覺得要，至少要把最終結果、過程現象、條件設定分開，不然後面要分析很麻煩。', author: 'u44', x: 7400, y: 850, parentId: 'g4-w4-21', date: dates.w4+21000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w4-23', topicId: 't-g4', type: 'improve', title: '表格可以先簡單做成：條件、現象、結果', content: '表格可以先簡單做成：條件、現象、結果、是否可重複。這四個其實就很夠用了。', author: 'u44', x: 7750, y: 850, parentId: 'g4-w4-22', date: dates.w4+22000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w4-24', topicId: 't-g4', type: 'counter', title: '因 為如果表格太複雜', content: '因 為如果表格太複雜，現場很容易漏記，到最後反而比現在更亂。', author: 'u44', x: 8100, y: 850, parentId: 'g4-w4-23', date: dates.w4+23000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w4-25', topicId: 't-g4', type: 'buildon', title: '表格要跟著改', content: '表格要跟著改。', author: 'u44', x: 8450, y: 850, parentId: 'g4-w4-24', date: dates.w4+24000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w4-26', topicId: 't-g4', type: 'improve', title: '不然資料接不起來', content: '不然資料接不起來。', author: 'u44', x: 8800, y: 850, parentId: 'g4-w4-25', date: dates.w4+25000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w4-ra', topicId: 't-g4', type: 'riseabove', title: 'W4 小結：第四組第四週正式建立判準：結果不能只', content: '第四組第四週正式建立判準：結果不能只看熄不熄，還要把過程現象、可重複性和接近失穩', author: 'u41', x: 9850, y: 475, parentId: 'g4-w4-26', date: dates.w4+26000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G4 Week 5 (Base X: 8900) ---
                { id: 'g4-w5-1', topicId: 't-g4', type: 'question', title: '如果我們已經知道不能只追最大音量 (W5 主節點)', content: '如果我們已經知道不能只追最大音量，那後面比較應該怎麼做才最能逼近機制？是先固定頻 率看距離，還是先固定距離看頻率？', author: 'u41', x: 8900, y: 350, parentId: 'g4-w4-ra', date: dates.w5, cluster: 'A', promisingness: 75 },
                { id: 'g4-w5-2', topicId: 't-g4', type: 'buildon', title: '我覺得要先選一條主線', content: '我覺得要先選一條主線，不然全部一起比很容易散掉。像 先固定某個區間，再去看距離或頻率怎麼影響失穩，會比較清楚。', author: 'u41', x: 9250, y: 350, parentId: 'g4-w5-1', date: dates.w5+1000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-3', topicId: 't-g4', type: 'counter', title: '但如果主線選錯', content: '但如果主線選錯，也可能浪費很多時間。所以前面幾週那些『接近失穩』的紀錄就很重要，可以 拿來判斷哪條線最值得追。', author: 'u41', x: 9600, y: 350, parentId: 'g4-w5-2', date: dates.w5+2000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w5-4', topicId: 't-g4', type: 'improve', title: '我建議從最常出現明顯擾動的條件先下手', content: '我建議從最常出現明顯擾動的條件先下手，因為那表示我們比較接 近火焰的弱點。', author: 'u41', x: 9950, y: 350, parentId: 'g4-w5-3', date: dates.w5+3000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w5-5', topicId: 't-g4', type: 'buildon', title: '這樣做也比較不會只是為了漂亮數據而測', content: '這樣做也比較不會只是為了漂亮數據而測，而是真的順著火焰被影響的方向往下挖。', author: 'u41', x: 10300, y: 350, parentId: 'g4-w5-4', date: dates.w5+4000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-6', topicId: 't-g4', type: 'improve', title: '後面我想把第四組的實驗邏輯整理成：先', content: '後面我想把第四組的實驗邏輯整理成：先找接近失穩區，再做細部比較，最後再驗證可重複性。', author: 'u41', x: 10650, y: 350, parentId: 'g4-w5-5', date: dates.w5+5000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w5-7', topicId: 't-g4', type: 'riseabove', title: '我覺得第四組現在已經不只是做實驗', content: '我覺得第四組現在已經不只是做實驗，而是在建立一個『如何逼近火焰失穩邊界』的研究策 略。', author: 'u41', x: 11000, y: 350, parentId: 'g4-w5-6', date: dates.w5+6000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g4-w5-8', topicId: 't-g4', type: 'buildon', title: '我現在的想法是', content: '我現在的想法是，第四組後面真的不是在做很多組測試，而是在慢慢縮小『最可能 有效的區域』。', author: 'u41', x: 11350, y: 350, parentId: 'g4-w5-7', date: dates.w5+7000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-9', topicId: 't-g4', type: 'question', title: '如果我們現在要做比較', content: '如果我們現在要做比較，那哪些比較最有價值？我覺得不是所有條件都要比，而是要比那些 真的會改變判斷的。', author: 'u42', x: 9250, y: 150, parentId: 'g4-w5-1', date: dates.w5+8000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w5-10', topicId: 't-g4', type: 'buildon', title: '像距離和角度就很值得一起看', content: '像距離和角度就很值得一起看，因為它們都影響聲波怎麼打到火焰。頻率 則比較像第二層，可以接著追。', author: 'u42', x: 9600, y: 150, parentId: 'g4-w5-9', date: dates.w5+9000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-11', topicId: 't-g4', type: 'counter', title: '不過也不能把頻率放太後面', content: '不過也不能把頻率放太後面，因為它可能才是火焰容易被擾動的真正關鍵。', author: 'u42', x: 9950, y: 150, parentId: 'g4-w5-10', date: dates.w5+10000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w5-12', topicId: 't-g4', type: 'improve', title: '也許可 以先用兩階段', content: '也許可 以先用兩階段。第一階段找出大方向，第二階段再追最有希望的那組頻率和距離。', author: 'u42', x: 10300, y: 150, parentId: 'g4-w5-11', date: dates.w5+11000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w5-13', topicId: 't-g4', type: 'buildon', title: '這樣也比較符合我們實際時間', content: '這樣也比較符合我們實際時間，不會一開始就把版圖開太大。', author: 'u42', x: 10650, y: 150, parentId: 'g4-w5-12', date: dates.w5+12000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-14', topicId: 't-g4', type: 'riseabove', title: '我覺得我現在比 較看懂第四組的路線了', content: '我覺得我現在比 較看懂第四組的路線了：不是把每個條件都摸一遍，而是慢慢收斂到最可能讓火焰失穩的組合。', author: 'u42', x: 11000, y: 150, parentId: 'g4-w5-13', date: dates.w5+13000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g4-w5-15', topicId: 't-g4', type: 'buildon', title: '如果回到我們前面一直在修的問題', content: '如果回到我們前面一直在修的問題，我覺得這週最重要的不是多做，而是更有目的 地做。', author: 'u42', x: 11350, y: 150, parentId: 'g4-w5-14', date: dates.w5+14000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-16', topicId: 't-g4', type: 'improve', title: '真正要解決的', content: '真正要解決的，不是條件不夠多，而是怎麼讓每一次比較都更接近火焰失穩的原 因。', author: 'u42', x: 11700, y: 150, parentId: 'g4-w5-15', date: dates.w5+15000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w5-17', topicId: 't-g4', type: 'question', title: '如果我們後面要做更細的比較', content: '如果我們後面要做更細的比較，那現場操作是不是也要更一致？像火焰高度、設備位置、測試 時間這些如果一直飄，後面很難比。', author: 'u43', x: 9250, y: 550, parentId: 'g4-w5-1', date: dates.w5+16000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w5-18', topicId: 't-g4', type: 'buildon', title: '我覺得對', content: '我覺得對，因為之前有些感覺差很多的結果，後來回頭看 可能是現場狀況不完全一樣。', author: 'u43', x: 9600, y: 550, parentId: 'g4-w5-17', date: dates.w5+17000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-19', topicId: 't-g4', type: 'improve', title: '所以我支持把流程固定化', content: '所以我支持把流程固定化。至少測試前先確認幾個重點：火焰大小、距離位置、角度、測試秒 數。', author: 'u43', x: 9950, y: 550, parentId: 'g4-w5-18', date: dates.w5+18000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w5-20', topicId: 't-g4', type: 'counter', title: '不過也不能因為想要一致', content: '不過也不能因為想要一致，就把整個流程變太僵，不然操作會很卡。還是要抓最必要的。', author: 'u43', x: 10300, y: 550, parentId: 'g4-w5-19', date: dates.w5+19000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w5-21', topicId: 't-g4', type: 'buildon', title: '至少把最會影響結果的那幾項固定起來', content: '至少把最會影響結果的那幾項固定起來，後面比較就會乾淨很多。', author: 'u43', x: 10650, y: 550, parentId: 'g4-w5-20', date: dates.w5+20000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-22', topicId: 't-g4', type: 'buildon', title: '現場流程越固定', content: '現場流程越固定，我覺得後面越容易看出差異，不然有時候看起來差很多，結果只 是操作不一樣。', author: 'u43', x: 11000, y: 550, parentId: 'g4-w5-21', date: dates.w5+21000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-23', topicId: 't-g4', type: 'question', title: '如果要證明我們現在不是只靠運氣', content: '如果要證明我們現在不是只靠運氣，那是不是可重複性一定要拉進來？不然一次漂亮真的不 夠。', author: 'u44', x: 9250, y: 850, parentId: 'g4-w5-1', date: dates.w5+22000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w5-24', topicId: 't-g4', type: 'buildon', title: '我覺得至少同條件要重做幾次', content: '我覺得至少同條件要重做幾次，看結果是不是差不多。不然真的很難說是條件有效，還是 剛好。', author: 'u44', x: 9600, y: 850, parentId: 'g4-w5-23', date: dates.w5+23000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-25', topicId: 't-g4', type: 'improve', title: '所以表格後面可以多一欄：同條件重複結', content: '所以表格後面可以多一欄：同條件重複結果。這樣就不只是單次表現。', author: 'u44', x: 9950, y: 850, parentId: 'g4-w5-24', date: dates.w5+24000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w5-26', topicId: 't-g4', type: 'counter', title: '但重複做也 很花時間', content: '但重複做也 很花時間，所以要先挑最值得重複驗證的條件，不然全部都重做會炸掉。', author: 'u44', x: 10300, y: 850, parentId: 'g4-w5-25', date: dates.w5+25000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w5-27', topicId: 't-g4', type: 'buildon', title: '我覺得先挑那些最接近失穩、最有希望的', content: '我覺得先挑那些最接近失穩、最有希望的條件來重複驗證，會比較合理。', author: 'u44', x: 10650, y: 850, parentId: 'g4-w5-26', date: dates.w5+26000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-28', topicId: 't-g4', type: 'buildon', title: '重做要挑重點', content: '重做要挑重點。', author: 'u44', x: 11000, y: 850, parentId: 'g4-w5-27', date: dates.w5+27000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w5-29', topicId: 't-g4', type: 'improve', title: '先驗最有希望的', content: '先驗最有希望的。', author: 'u44', x: 11350, y: 850, parentId: 'g4-w5-28', date: dates.w5+28000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w5-ra', topicId: 't-g4', type: 'riseabove', title: 'W5 小結：第四組第五週把判準推成研究策略', content: '第四組第五週把判準推成研究策略，從『做很多測試』走向『怎麼逼近有效區與失穩邊界』。', author: 'u41', x: 12050, y: 475, parentId: 'g4-w5-29', date: dates.w5+29000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G4 Week 6 (Base X: 11100) ---
                { id: 'g4-w6-1', topicId: 't-g4', type: 'question', title: '如果某些條件一直都做不出來 (W6 主節點)', content: '如果某些條件一直都做不出來，那我們到底要把它當成失敗，還是把它看成在告訴我們『這裡 不是火焰容易被影響的區域』？', author: 'u41', x: 11100, y: 350, parentId: 'g4-w5-ra', date: dates.w6, cluster: 'A', promisingness: 75 },
                { id: 'g4-w6-2', topicId: 't-g4', type: 'buildon', title: '我現在比較偏向後者', content: '我現在比較偏向後者。因為一直做不出來，本身就代表那個條 件可能不在有效區。這種資訊其實很重要。', author: 'u41', x: 11450, y: 350, parentId: 'g4-w6-1', date: dates.w6+1000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-3', topicId: 't-g4', type: 'counter', title: '但也要小心', content: '但也要小心，有時候不是條件不對，而是操作不穩。所以不是所有失敗都能直接當機制。', author: 'u41', x: 11800, y: 350, parentId: 'g4-w6-2', date: dates.w6+2000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w6-4', topicId: 't-g4', type: 'improve', title: '所以我覺得要先分：是條件本身不有效', content: '所以我覺得要先分：是條件本身不有效，還是操作/控制條件還不夠穩。這兩種失敗意義完全不一 樣。', author: 'u41', x: 12150, y: 350, parentId: 'g4-w6-3', date: dates.w6+3000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w6-5', topicId: 't-g4', type: 'buildon', title: '如果這兩種分開', content: '如果這兩種分開，第四組後面就可以更清楚知道，哪些要回去修流程，哪些則是可以直接列為 邊界。', author: 'u41', x: 12500, y: 350, parentId: 'g4-w6-4', date: dates.w6+4000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-6', topicId: 't-g4', type: 'improve', title: '我甚至覺得可以把『一直失敗的區間』直', content: '我甚至覺得可以把『一直失敗的區間』直接標出來，因為那會讓我們的結果更完整，不是 只有成功區。', author: 'u41', x: 12850, y: 350, parentId: 'g4-w6-5', date: dates.w6+5000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w6-7', topicId: 't-g4', type: 'riseabove', title: '我現在很確定一件事：第四組最有價值的', content: '我現在很確定一件事：第四組最有價值的不是只找到成功條件，而是把『哪裡有效、哪裡無 效、哪裡接近邊界』都慢慢畫出來。這才像真正理解聲波滅火。', author: 'u41', x: 13200, y: 350, parentId: 'g4-w6-6', date: dates.w6+6000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g4-w6-8', topicId: 't-g4', type: 'buildon', title: '這週最重要的不是再幫成功找掌聲', content: '這週最重要的不是再幫成功找掌聲，而是幫失敗找位置。因為有些失敗不是沒價值 ，而是在告訴我們：這裡不在有效區。', author: 'u41', x: 13550, y: 350, parentId: 'g4-w6-7', date: dates.w6+7000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-9', topicId: 't-g4', type: 'question', title: '如果我們把邊界畫出來', content: '如果我們把邊界畫出來，那評審看到的就不只是『能不能滅』，而是『在什麼範圍內比較可能有 效』。這樣是不是比只秀一次成功更有說服力？', author: 'u42', x: 11450, y: 150, parentId: 'g4-w6-1', date: dates.w6+8000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w6-10', topicId: 't-g4', type: 'buildon', title: '我覺得是', content: '我覺得是，因為這樣比較像研究成果，不是表 演成果。一次成功很亮眼，但邊界圖比較能說明我們真的摸到規律。', author: 'u42', x: 11800, y: 150, parentId: 'g4-w6-9', date: dates.w6+9000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-11', topicId: 't-g4', type: 'counter', title: '不過也不能因為邊界圖很漂亮', content: '不過也不能因為邊界圖很漂亮，就把真正成功的案例講得太輕。因為成功還是很重要，它是最 後結果。', author: 'u42', x: 12150, y: 150, parentId: 'g4-w6-10', date: dates.w6+10000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w6-12', topicId: 't-g4', type: 'improve', title: '所以我覺得最好是兩種都放：成功案例告', content: '所以我覺得最好是兩種都放：成功案例告訴別人我們做得到，邊界與失敗案例告訴別 人我們知道為什麼。', author: 'u42', x: 12500, y: 150, parentId: 'g4-w6-11', date: dates.w6+11000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w6-13', topicId: 't-g4', type: 'buildon', title: '這樣第四組的內容就不會只是『看我們有', content: '這樣第四組的內容就不會只是『看我們有滅掉』，而是『看我們怎麼一步一步逼近這件事』。', author: 'u42', x: 12850, y: 150, parentId: 'g4-w6-12', date: dates.w6+12000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-14', topicId: 't-g4', type: 'riseabove', title: '我覺得我現在最能講清楚第四組的地方', content: '我覺得我現在最能講清楚第四組的地方，就是：我們不是只在追一個成功瞬間，而是在畫出 一張火焰對聲波反應的條件地圖。', author: 'u42', x: 13200, y: 150, parentId: 'g4-w6-13', date: dates.w6+13000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g4-w6-15', topicId: 't-g4', type: 'buildon', title: '我開始很明確地覺得', content: '我開始很明確地覺得，邊界圖會比單一成功案例更能說服人，因為它看得出我們不 是只抓到一次幸運。', author: 'u42', x: 13550, y: 150, parentId: 'g4-w6-14', date: dates.w6+14000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-16', topicId: 't-g4', type: 'improve', title: '如果回頭整理', content: '如果回頭整理，這週其實是在把『一次成功』修成『一張條件地圖』。', author: 'u42', x: 13900, y: 150, parentId: 'g4-w6-15', date: dates.w6+15000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w6-17', topicId: 't-g4', type: 'question', title: '我覺得有些反覆失敗其實很有感', content: '我覺得有些反覆失敗其實很有感，因為你會看到火焰每次都差不多在某個程度停住。這種『就 是差一步』的感覺，是不是也很值得講？', author: 'u43', x: 11450, y: 550, parentId: 'g4-w6-1', date: dates.w6+16000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w6-18', topicId: 't-g4', type: 'buildon', title: '因為那代表條件不是完全沒用', content: '因為那代表條件不是完全沒用，而是還沒跨過那條 線。我覺得這種狀態很像在提醒我們臨界點就在附近。', author: 'u43', x: 11800, y: 550, parentId: 'g4-w6-17', date: dates.w6+17000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-19', topicId: 't-g4', type: 'improve', title: '所以我支持把『反覆接近但未成功』也列', content: '所以我支持把『反覆接近但未成功』也列成一種重要結果，不然很可惜。', author: 'u43', x: 12150, y: 550, parentId: 'g4-w6-18', date: dates.w6+18000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w6-20', topicId: 't-g4', type: 'counter', title: '但也要避免 自己太自我感動', content: '但也要避免 自己太自我感動，覺得每次差一點都超有意義。還是要有條件和現象一起佐證。', author: 'u43', x: 12500, y: 550, parentId: 'g4-w6-19', date: dates.w6+19000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w6-21', topicId: 't-g4', type: 'buildon', title: '至少有影片、紀錄和重複次數搭配', content: '至少有影片、紀錄和重複次數搭配，就比較不會只是感覺。', author: 'u43', x: 12850, y: 550, parentId: 'g4-w6-20', date: dates.w6+20000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-22', topicId: 't-g4', type: 'buildon', title: '那些一直差一步的情況', content: '那些一直差一步的情況，我現在反而會特別重看。因為它們很像在提醒我們，臨界 點可能就在附近。', author: 'u43', x: 13200, y: 550, parentId: 'g4-w6-21', date: dates.w6+21000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-23', topicId: 't-g4', type: 'question', title: '如果這週開始把失敗納入', content: '如果這週開始把失敗納入，那後面是不是也要整理成幾種失敗類型？不然全部都叫失敗，資 訊還是很混。', author: 'u44', x: 11450, y: 850, parentId: 'g4-w6-1', date: dates.w6+22000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w6-24', topicId: 't-g4', type: 'buildon', title: '我覺得可以分成：完全無效、僅有擾動、', content: '我覺得可以分成：完全無效、僅有擾動、接近失穩但未熄、操作條件不穩造成失 敗。這樣後面比較好看。', author: 'u44', x: 11800, y: 850, parentId: 'g4-w6-23', date: dates.w6+23000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-25', topicId: 't-g4', type: 'improve', title: '這些分類如果先定好', content: '這些分類如果先定好，之後整理圖表或說明書也比較容易。', author: 'u44', x: 12150, y: 850, parentId: 'g4-w6-24', date: dates.w6+24000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w6-26', topicId: 't-g4', type: 'counter', title: '但分類也不要太細', content: '但分類也不要太細，不 然反而會拖到大家自己都記不住。', author: 'u44', x: 12500, y: 850, parentId: 'g4-w6-25', date: dates.w6+25000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w6-27', topicId: 't-g4', type: 'buildon', title: '我覺得抓到這四類其實就很夠用了', content: '我覺得抓到這四類其實就很夠用了，因為已經能把成功跟各種失敗區分開。', author: 'u44', x: 12850, y: 850, parentId: 'g4-w6-26', date: dates.w6+26000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-28', topicId: 't-g4', type: 'buildon', title: '失敗也要分類', content: '失敗也要分類。', author: 'u44', x: 13200, y: 850, parentId: 'g4-w6-27', date: dates.w6+27000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w6-29', topicId: 't-g4', type: 'improve', title: '不然資訊很混', content: '不然資訊很混。', author: 'u44', x: 13550, y: 850, parentId: 'g4-w6-28', date: dates.w6+28000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w6-ra', topicId: 't-g4', type: 'riseabove', title: 'W6 小結：第四組第六週開始把失敗也當成正式證據', content: '第四組第六週開始把失敗也當成正式證據，慢慢畫出有效區、邊界區與無效區。', author: 'u41', x: 14250, y: 475, parentId: 'g4-w6-29', date: dates.w6+29000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G4 Week 7 (Base X: 13300) ---
                { id: 'g4-w7-1', topicId: 't-g4', type: 'question', title: '如果現在要我用一句話講第四組這七週的 (W7 主節點)', content: '如果現在要我用一句話講第四組這七週的進步，我一定不會再說『找到最強音量』。因為我們 最後根本不是停在那裡。那你們覺得我們真正找到的是什麼？', author: 'u41', x: 13300, y: 350, parentId: 'g4-w6-ra', date: dates.w7, cluster: 'A', promisingness: 75 },
                { id: 'g4-w7-2', topicId: 't-g4', type: 'buildon', title: '我自己的答案是：我們找到的不 是單一', content: '我自己的答案是：我們找到的不 是單一最強值，而是一套讓火焰比較容易走向失穩的條件邏輯。這裡面有距離、頻率、聲壓，也有火焰本身 的狀態。', author: 'u41', x: 13650, y: 350, parentId: 'g4-w7-1', date: dates.w7+1000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-3', topicId: 't-g4', type: 'improve', title: '我想把第四組的模型整理成三層：第一層', content: '我想把第四組的模型整理成三層：第一層先看條件有沒有進入有效區，第二層看火焰有沒有出 現持續擾動/接近失穩，第三層才看能不能穩定熄滅。', author: 'u41', x: 14000, y: 350, parentId: 'g4-w7-2', date: dates.w7+2000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w7-4', topicId: 't-g4', type: 'counter', title: '但如果只講這三層', content: '但如果只講這三層，好像又少了邊界和失 敗。因為我們後面其實很重要的一件事，就是知道哪裡通常做不出來。', author: 'u41', x: 14350, y: 350, parentId: 'g4-w7-3', date: dates.w7+3000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w7-5', topicId: 't-g4', type: 'buildon', title: '那也許可以再加一個觀念：有效區、邊界', content: '那也許可以再加一個觀念：有效區、邊界區、無效區。這樣就能把成功與失敗一起放進來。', author: 'u41', x: 14700, y: 350, parentId: 'g4-w7-4', date: dates.w7+4000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-6', topicId: 't-g4', type: 'improve', title: '這樣第四組最後就不只是『找到方法』', content: '這樣第四組最後就不只是『找到方法』，而是『畫出方法在哪些條件下比較有用』。', author: 'u41', x: 15050, y: 350, parentId: 'g4-w7-5', date: dates.w7+5000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w7-7', topicId: 't-g4', type: 'riseabove', title: '我會把第四組七週的知識建構歷程收成這', content: '我會把第四組七週的知識建構歷程收成這句：我們從『音量迷思』一路走到『聲波—火焰互 動的有效區與失穩邊界』。這才是我們真正建起來的核心知識。', author: 'u41', x: 15400, y: 350, parentId: 'g4-w7-6', date: dates.w7+6000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g4-w7-8', topicId: 't-g4', type: 'buildon', title: '如果回頭整理', content: '如果回頭整理，我覺得第四組最明顯的改變，就是我們已經不會再用『最大、最強、 最猛』去理解這題了。', author: 'u41', x: 15750, y: 350, parentId: 'g4-w7-7', date: dates.w7+7000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-9', topicId: 't-g4', type: 'question', title: '如果要讓別人一聽就懂第四組到底學到什', content: '如果要讓別人一聽就懂第四組到底學到什麼，我覺得關鍵不是火有沒有熄，而是我們看事情 的方式變了。那這個變化要怎麼說最清楚？', author: 'u42', x: 13650, y: 150, parentId: 'g4-w7-1', date: dates.w7+8000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w7-10', topicId: 't-g4', type: 'buildon', title: '我覺得可以說', content: '我覺得可以說，我們從一開始很想找『越大越強』， 到後來比較像在找『什麼條件下火焰最容易被逼近失穩』。這個角度完全不一樣。', author: 'u42', x: 14000, y: 150, parentId: 'g4-w7-9', date: dates.w7+9000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-11', topicId: 't-g4', type: 'counter', title: '不過如果只講失穩', content: '不過如果只講失穩，也可能讓人以為我們沒有真的做到熄滅。所以還是要把成功案例放回來。', author: 'u42', x: 14350, y: 150, parentId: 'g4-w7-10', date: dates.w7+10000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w7-12', topicId: 't-g4', type: 'improve', title: '也許可以說：成功熄滅是結果', content: '也許可以說：成功熄滅是結果，但失穩與邊界讓我們知道為什麼有些條件比較接近成功。這樣 兩邊都有。', author: 'u42', x: 14700, y: 150, parentId: 'g4-w7-11', date: dates.w7+11000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w7-13', topicId: 't-g4', type: 'buildon', title: '我很喜歡這種講法', content: '我很喜歡這種講法，因為它不會只剩下表演感，而是真的把研究的路走出來。', author: 'u42', x: 15050, y: 150, parentId: 'g4-w7-12', date: dates.w7+12000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-14', topicId: 't-g4', type: 'riseabove', title: '我會把第四組最後的收穫講成：我們不是', content: '我會把第四組最後的收穫講成：我們不是只在找一個最猛設定，而是在建立一種更懂火焰反應的比較方 法。', author: 'u42', x: 15400, y: 150, parentId: 'g4-w7-13', date: dates.w7+13000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g4-w7-15', topicId: 't-g4', type: 'buildon', title: '我的想法是', content: '我的想法是，第四組後期最重要的收穫不是哪一次滅得最漂亮，而是我們終於能把 有效區、邊界區和無效區講成一個完整故事。', author: 'u42', x: 15750, y: 150, parentId: 'g4-w7-14', date: dates.w7+14000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-16', topicId: 't-g4', type: 'improve', title: '如果回到我們一路修的主線', content: '如果回到我們一路修的主線，我會說：我們不是一直在追最強，而是在追最能穩定 逼近失穩的條件。', author: 'u42', x: 16100, y: 150, parentId: 'g4-w7-15', date: dates.w7+15000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w7-17', topicId: 't-g4', type: 'question', title: '如果回頭看', content: '如果回頭看，我自己變最大的是，現在不會只盯著最後熄沒熄。我會看它先怎麼晃、怎麼變 弱、哪裡開始不穩。這種改變是不是其實很重要？', author: 'u43', x: 13650, y: 550, parentId: 'g4-w7-1', date: dates.w7+16000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w7-18', topicId: 't-g4', type: 'buildon', title: '我覺得很重要', content: '我覺得很重要，因為這表示我們不是只在等 答案，而是開始看過程。過程裡其實藏超多訊息。', author: 'u43', x: 14000, y: 550, parentId: 'g4-w7-17', date: dates.w7+17000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-19', topicId: 't-g4', type: 'improve', title: '所以如果後面要整理', content: '所以如果後面要整理，我覺得可以把『過程現象』也當成一個正式成果，不是附帶的描述。', author: 'u43', x: 14350, y: 550, parentId: 'g4-w7-18', date: dates.w7+18000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w7-20', topicId: 't-g4', type: 'counter', title: '但還是要記得', content: '但還是要記得，過程不能只有感覺，最好要配影片、照片或重複觀察。', author: 'u43', x: 14700, y: 550, parentId: 'g4-w7-19', date: dates.w7+19000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w7-21', topicId: 't-g4', type: 'buildon', title: '至少這七週讓我知道', content: '至少這七週讓我知道，很多時候真正有價值的不是最後那一秒，而是前面一連串火焰開始撐不 住的樣子。', author: 'u43', x: 15050, y: 550, parentId: 'g4-w7-20', date: dates.w7+20000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-22', topicId: 't-g4', type: 'buildon', title: '我現在會把自己最大的改變講成：以前我', content: '我現在會把自己最大的改變講成：以前我比較像等結果，後來我會開始看過程。', author: 'u43', x: 15400, y: 550, parentId: 'g4-w7-21', date: dates.w7+21000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-23', topicId: 't-g4', type: 'question', title: '如果要把第四組最後的成果整理成可以讓', content: '如果要把第四組最後的成果整理成可以讓評審一眼看懂的樣子，我覺得圖表應該很重要。那 你們覺得最值得畫的是什麼？', author: 'u44', x: 13650, y: 850, parentId: 'g4-w7-1', date: dates.w7+22000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w7-24', topicId: 't-g4', type: 'buildon', title: '我覺得可以畫『有效區、邊界區、無效區', content: '我覺得可以畫『有效區、邊界區、無效區』這種概念圖，或者把不 同條件下的結果分級呈現出來。', author: 'u44', x: 14000, y: 850, parentId: 'g4-w7-23', date: dates.w7+23000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-25', topicId: 't-g4', type: 'improve', title: '這樣比只列很多數據更好懂', content: '這樣比只列很多數據更好懂，因為別人會直接看到我們不是只做零碎實驗，而是真的在畫規 律。', author: 'u44', x: 14350, y: 850, parentId: 'g4-w7-24', date: dates.w7+24000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w7-26', topicId: 't-g4', type: 'counter', title: '但圖表也不能畫得太夢幻', content: '但圖表也不能畫得太夢幻，還是要能回到實際測試紀錄，不然會看起來很像想像圖。', author: 'u44', x: 14700, y: 850, parentId: 'g4-w7-25', date: dates.w7+25000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w7-27', topicId: 't-g4', type: 'buildon', title: '我覺得只要跟我們前面定的分類和條件表', content: '我覺得只要跟我們前面定的分類和條件表接起來，就會很有說服力。', author: 'u44', x: 15050, y: 850, parentId: 'g4-w7-26', date: dates.w7+26000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-28', topicId: 't-g4', type: 'riseabove', title: '如果要我 收一句', content: '如果要我 收一句，我會說：第四組最後不是交出一個『越大越好』的答案，而是交出一張『聲波滅火在什麼條件下可能 有效』的理解地圖。', author: 'u44', x: 15400, y: 850, parentId: 'g4-w7-27', date: dates.w7+27000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g4-w7-29', topicId: 't-g4', type: 'buildon', title: '圖表很重要', content: '圖表很重要。', author: 'u44', x: 15750, y: 850, parentId: 'g4-w7-28', date: dates.w7+28000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w7-30', topicId: 't-g4', type: 'improve', title: '邊界區最好畫出來', content: '邊界區最好畫出來。', author: 'u44', x: 16100, y: 850, parentId: 'g4-w7-29', date: dates.w7+29000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w7-ra', topicId: 't-g4', type: 'riseabove', title: 'W7 小結：第四組第七週最後建起來的', content: '第四組第七週最後建起來的，不只是『某個條件有效』，而是一張更高階的聲波—火焰互動', author: 'u41', x: 16450, y: 475, parentId: 'g4-w7-30', date: dates.w7+30000, cluster: 'C', promisingness: 95 }, // 熱點
                // --- G5 Week 1 (Base X: 100) ---
                { id: 'g5-w1-1', topicId: 't-g5', type: 'question', title: '我現在最想先問的一件事是：我們平常是', content: '我現在最想先問的一件事是：我們平常是不是太容易把『講得很像真的』直接當成『它應該是真 的』？因為生成式 AI 最厲害的地方本來就不是先查證，而是先把話說得很順。那這樣的順，到底是在幫助 理解，還是在掩蓋錯誤？', author: 'u51', x: 100, y: 350, parentId: null, date: dates.w1, cluster: 'A', promisingness: 55 },
                { id: 'g5-w1-2', topicId: 't-g5', type: 'buildon', title: '如果順暢本身就會讓人比較放下戒心', content: '如果順暢本身就會讓人比較放下戒心，那幻覺最可怕的地方可能不是 單純答錯，而是它讓你覺得它沒錯。', author: 'u51', x: 450, y: 350, parentId: 'g5-w1-1', date: dates.w1+1000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w1-3', topicId: 't-g5', type: 'improve', title: '所以我覺得第五組第一步先不要急著講模', content: '所以我覺得第五組第一步先不要急著講模型好不好，而是先把『流暢感』從『可信度』裡面拆出 來。', author: 'u51', x: 800, y: 350, parentId: 'g5-w1-2', date: dates.w1+2000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w1-4', topicId: 't-g5', type: 'counter', title: '但我也不是說只要講得順就一定有問題', content: '但我也不是說只要講得順就一定有問題，因為真的正確的答案也可能講得很順。重點應該 是：我們現在有沒有把這兩件事混在一起。', author: 'u51', x: 1150, y: 350, parentId: 'g5-w1-3', date: dates.w1+3000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w1-5', topicId: 't-g5', type: 'buildon', title: '我現在雖然還只是初步在想', content: '我現在雖然還只是初步在想，但我真的越來越覺得，生成式 AI 最危險的不是亂講 這件事本身，而是它亂講的時候看起來太像真的。', author: 'u51', x: 1500, y: 350, parentId: 'g5-w1-4', date: dates.w1+4000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w1-6', topicId: 't-g5', type: 'question', title: '如果我們真的要研究幻覺', content: '如果我們真的要研究幻覺，那是不是不能只看它有沒有錯，還要看它是怎麼錯的？因為有些 錯一下就看出來，有些錯會讓人真的被帶走。', author: 'u52', x: 450, y: 150, parentId: 'g5-w1-1', date: dates.w1+5000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w1-7', topicId: 't-g5', type: 'buildon', title: '我覺得文碩講的『順不等於真』很重要', content: '我覺得文碩講的『順不等於真』很重要，因為人很 容易先被語氣說服，再去想內容。', author: 'u52', x: 800, y: 150, parentId: 'g5-w1-6', date: dates.w1+6000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w1-8', topicId: 't-g5', type: 'improve', title: '我們可不可以先記錄幾種情況：一種是答', content: '我們可不可以先記錄幾種情況：一種是答案一看就怪，一種是看起來很合理但其實有問題。這 兩種的危險程度可能差很多。', author: 'u52', x: 1150, y: 150, parentId: 'g5-w1-7', date: dates.w1+7000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w1-9', topicId: 't-g5', type: 'counter', title: '不過這樣分也還不夠', content: '不過這樣分也還不夠，因為還要看使用者有沒有能力發現。對熟 的人可能一下就知道錯，對不熟的人可能完全看不出來。', author: 'u52', x: 1500, y: 150, parentId: 'g5-w1-8', date: dates.w1+8000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w1-10', topicId: 't-g5', type: 'buildon', title: '我會想一直追問', content: '我會想一直追問，因為有些錯一看就知道怪，但有些錯是要停下來想才會發現。這 兩種如果不分，後面會很混。', author: 'u52', x: 1850, y: 150, parentId: 'g5-w1-9', date: dates.w1+9000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w1-11', topicId: 't-g5', type: 'question', title: '如果一般人拿 AI 查東西', content: '我最在意的是，如果一般人拿 AI 查東西，看到答案講得很完整，他真的還會去懷疑嗎？我覺 得很多時候不會。那這樣風險其實不只是答錯，而是人會因為太方便就直接相信。', author: 'u53', x: 450, y: 550, parentId: 'g5-w1-1', date: dates.w1+10000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w1-12', topicId: 't-g5', type: 'buildon', title: '所以幻覺的 代價可能跟題目本身有關', content: '所以幻覺的 代價可能跟題目本身有關。像查一個小知識答錯，可能只是尷尬；但如果是醫療、法律或重要決策，那後果 就完全不一樣。', author: 'u53', x: 800, y: 550, parentId: 'g5-w1-11', date: dates.w1+11000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w1-13', topicId: 't-g5', type: 'improve', title: '我覺得第五組這週可以先把問題寫成：不', content: '我覺得第五組這週可以先把問題寫成：不是 AI 有沒有錯，而是『什麼樣的錯，在什麼情境下， 最容易造成真的後果』。', author: 'u53', x: 1150, y: 550, parentId: 'g5-w1-12', date: dates.w1+12000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w1-14', topicId: 't-g5', type: 'counter', title: '但如果一開始就講很大', content: '但如果一開始就講很大，也可能太散。所以還是要先從幾種明顯情境切 進去，不然會變成什麼都想談。', author: 'u53', x: 1500, y: 550, parentId: 'g5-w1-13', date: dates.w1+13000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w1-15', topicId: 't-g5', type: 'buildon', title: '如果一般人真的很少停下來懷疑', content: '如果一般人真的很少停下來懷疑，那我覺得風險就不是只有答錯，而是那個答案會 直接進到人的決定裡。', author: 'u53', x: 1850, y: 550, parentId: 'g5-w1-14', date: dates.w1+14000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w1-ra', topicId: 't-g5', type: 'riseabove', title: 'W1 小結：第五組第一週先把『講得很順』和『真的', content: '第五組第一週先把『講得很順』和『真的可信』拆開，開始建立對生成式 AI 流暢錯誤的警覺。', author: 'u51', x: 2200, y: 350, parentId: 'g5-w1-15', date: dates.w1+15000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G5 Week 2 (Base X: 2300) ---
                { id: 'g5-w2-1', topicId: 't-g5', type: 'question', title: '幻覺風險』放回使用情境 (W2 主節點)', content: '如果現在要把『幻覺風險』放回使用情境，那我們是不是不能再只講一個大概念？因為寫作文 亂掰一點，跟醫療建議亂掰一點，風險根本不是同一級。', author: 'u51', x: 2300, y: 350, parentId: 'g5-w1-ra', date: dates.w2, cluster: 'A', promisingness: 75 },
                { id: 'g5-w2-2', topicId: 't-g5', type: 'buildon', title: '我覺得要把任務類型拉進來', content: '我覺得要把任務類型拉進來。像事實 查詢、推理分析、創意生成、建議型回答，這幾種即使都出錯，後果也可能差很多。', author: 'u51', x: 2650, y: 350, parentId: 'g5-w2-1', date: dates.w2+1000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w2-3', topicId: 't-g5', type: 'improve', title: '所以我想把第五組的問題先縮成：不同任', content: '所以我想把第五組的問題先縮成：不同任務類型下，生成式 AI 的錯誤有沒有不同風險結構？ 這樣比較像可以研究。', author: 'u51', x: 3000, y: 350, parentId: 'g5-w2-2', date: dates.w2+2000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w2-4', topicId: 't-g5', type: 'counter', title: '但任務類型也不是全部', content: '但任務類型也不是全部，使用者本身會不會辨認也很重要。因為同一個 錯，遇到不同人，後果可能不一樣。', author: 'u51', x: 3350, y: 350, parentId: 'g5-w2-3', date: dates.w2+3000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w2-5', topicId: 't-g5', type: 'buildon', title: '也就是說', content: '也就是說，風險至少跟『錯誤類型 × 任務類型 × 使用者辨識能力』有關。', author: 'u51', x: 3700, y: 350, parentId: 'g5-w2-4', date: dates.w2+4000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w2-6', topicId: 't-g5', type: 'buildon', title: '我開始覺得第五組真的不能一直用很大的', content: '我開始覺得第五組真的不能一直用很大的字講『幻覺很危險』，而是要把它放回不 同任務裡看，這樣風險才會變清楚。', author: 'u51', x: 4050, y: 350, parentId: 'g5-w2-5', date: dates.w2+5000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w2-7', topicId: 't-g5', type: 'question', title: '如果我們現在開始分任務', content: '如果我們現在開始分任務，那要怎麼避免只是憑感覺說哪種比較危險？我覺得這邊很容易講 得很像，但其實很空。', author: 'u52', x: 2650, y: 150, parentId: 'g5-w2-1', date: dates.w2+6000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w2-8', topicId: 't-g5', type: 'buildon', title: '我比較同意先從幾種大家都直覺知道有差', content: '我比較同意先從幾種大家都直覺知道有差的任務開始，像純知識查詢跟 高風險建議。至少先把差距大的拉出來。', author: 'u52', x: 3000, y: 150, parentId: 'g5-w2-7', date: dates.w2+7000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w2-9', topicId: 't-g5', type: 'improve', title: '我們也可以先問一個比較簡單的：什麼錯', content: '我們也可以先問一個比較簡單的：什麼錯誤最容易被當成對的？這比直接問最危險是哪種，可 能更好下手。', author: 'u52', x: 3350, y: 150, parentId: 'g5-w2-8', date: dates.w2+8000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w2-10', topicId: 't-g5', type: 'counter', title: '不過『容易被當成對』還不等於『後果最', content: '不過『容易被當成對』還不等於『後果最大』，所以後面還是得把兩件事分開。', author: 'u52', x: 3700, y: 150, parentId: 'g5-w2-9', date: dates.w2+9000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w2-11', topicId: 't-g5', type: 'buildon', title: '我覺得這很好', content: '我覺得這很好，因為這表示第五組後面不是只看準不準，而是會看『好不好發現』和『後果大不 大』。', author: 'u52', x: 4050, y: 150, parentId: 'g5-w2-10', date: dates.w2+10000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w2-12', topicId: 't-g5', type: 'buildon', title: '我們不能只是憑感覺說哪個危險', content: '我比較在意的是，我們不能只是憑感覺說哪個危險。至少要先找到幾種很明顯差很 多的情境，不然很容易講空。', author: 'u52', x: 4400, y: 150, parentId: 'g5-w2-11', date: dates.w2+11000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w2-13', topicId: 't-g5', type: 'question', title: '如果是學生拿 AI 寫報告', content: '如果是學生拿 AI 寫報告，跟家長拿 AI 查健康資訊，兩邊錯誤的代價顯然不同。那我們是不 是應該連『誰在用』也一起考慮？', author: 'u53', x: 2650, y: 550, parentId: 'g5-w2-1', date: dates.w2+12000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w2-14', topicId: 't-g5', type: 'buildon', title: '我覺得要', content: '我覺得要，因為有些人本來就比較容易把 AI 當老師、當專 家、當權威。這時候錯誤的影響會被放大。', author: 'u53', x: 3000, y: 550, parentId: 'g5-w2-13', date: dates.w2+13000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w2-15', topicId: 't-g5', type: 'improve', title: '也許我們可以先把『任務風險』跟『使用', content: '也許我們可以先把『任務風險』跟『使用者依賴程度』放在一起想。不是只看答案錯不錯，而是看 人會不會因為太信而直接照做。', author: 'u53', x: 3350, y: 550, parentId: 'g5-w2-14', date: dates.w2+14000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w2-16', topicId: 't-g5', type: 'counter', title: '但也要小心不要把使用者都講得很被動', content: '但也要小心不要把使用者都講得很被動，因為有些人其實會自 己查證。只是我們現在研究的是：在哪些情況下，人比較不容易停下來查。', author: 'u53', x: 3700, y: 550, parentId: 'g5-w2-15', date: dates.w2+15000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w2-17', topicId: 't-g5', type: 'buildon', title: '我覺得這樣講比較有第五組味道', content: '我覺得這樣講比較有第五組味道，因為它不是只在批評 AI，而是在看 AI 跟人怎麼一起構成風 險。', author: 'u53', x: 4050, y: 550, parentId: 'g5-w2-16', date: dates.w2+16000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w2-18', topicId: 't-g5', type: 'buildon', title: '我現在比較會把『誰在用』一起放進來看', content: '我現在比較會把『誰在用』一起放進來看，因為同樣一句錯的話，遇到不同的人，可 能真的會造成完全不同的結果。', author: 'u53', x: 4400, y: 550, parentId: 'g5-w2-17', date: dates.w2+17000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w2-ra', topicId: 't-g5', type: 'riseabove', title: 'W2 小結：第五組第二週把錯誤放回任務、使用者與', content: '第五組第二週把錯誤放回任務、使用者與後果，開始看見風險不是抽象概念，而是情境化的', author: 'u51', x: 4750, y: 350, parentId: 'g5-w2-18', date: dates.w2+18000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G5 Week 3 (Base X: 4500) ---
                { id: 'g5-w3-1', topicId: 't-g5', type: 'question', title: '如果第五組後面真的要做風險結構 (W3 主節點)', content: '如果第五組後面真的要做風險結構，那第一步是不是要先承認：不是所有錯都能放在同一層 看？有些錯只是小偏差，有些錯會直接把人帶去很危險的方向。', author: 'u51', x: 4500, y: 350, parentId: 'g5-w2-ra', date: dates.w3, cluster: 'A', promisingness: 75 },
                { id: 'g5-w3-2', topicId: 't-g5', type: 'buildon', title: '我現在比較想先分三種：一種 是小錯但', content: '我現在比較想先分三種：一種 是小錯但容易被發現，一種是講得很像真的但其實有問題，一種是高後果錯誤。先不要分太細，但至少先 有層次。', author: 'u51', x: 4850, y: 350, parentId: 'g5-w3-1', date: dates.w3+1000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w3-3', topicId: 't-g5', type: 'improve', title: '也許我們可以把分類基準寫成兩軸：『容', content: '也許我們可以把分類基準寫成兩軸：『容不容易被發現』和『一旦相信會不會出大事』。這樣比單 純說 A 類 B 類更有意思。', author: 'u51', x: 5200, y: 350, parentId: 'g5-w3-2', date: dates.w3+2000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w3-4', topicId: 't-g5', type: 'counter', title: '不過兩軸也不能解決所有問題', content: '不過兩軸也不能解決所有問題，因為有些錯雖然後果不大，但如果 一直重複出現，也會慢慢影響信任或理解。', author: 'u51', x: 5550, y: 350, parentId: 'g5-w3-3', date: dates.w3+3000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w3-5', topicId: 't-g5', type: 'buildon', title: '這表示風險不是只有單次事件', content: '這表示風險不是只有單次事件，也可能跟穩定性有關。', author: 'u51', x: 5900, y: 350, parentId: 'g5-w3-4', date: dates.w3+4000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w3-6', topicId: 't-g5', type: 'buildon', title: '如果第五組要再往前走一步', content: '如果第五組要再往前走一步，我覺得就不能再把所有錯放在同一層了。因為有些只 是小偏差，有些真的會把人帶到很危險的方向。', author: 'u51', x: 6250, y: 350, parentId: 'g5-w3-5', date: dates.w3+5000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w3-7', topicId: 't-g5', type: 'question', title: '如果我們要說某種錯比較危險', content: '如果我們要說某種錯比較危險，那要靠什麼證明？我不想最後只是因為我們覺得可怕，就把 它定義成高風險。', author: 'u52', x: 4850, y: 150, parentId: 'g5-w3-1', date: dates.w3+6000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w3-8', topicId: 't-g5', type: 'buildon', title: '我覺得至少可以先從兩件事看：第一', content: '我覺得至少可以先從兩件事看：第一，人是不是容易被騙過；第二，就算被騙 過，會不會真的造成錯誤行動。', author: 'u52', x: 5200, y: 150, parentId: 'g5-w3-7', date: dates.w3+7000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w3-9', topicId: 't-g5', type: 'counter', title: '但還是有一種情況很麻煩：有些錯即使最', content: '但還是有一種情況很麻煩：有些錯即使最後沒造成大後果，也會讓人建立錯的理解。這種長期 影響也不能忽略。', author: 'u52', x: 5550, y: 150, parentId: 'g5-w3-8', date: dates.w3+8000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w3-10', topicId: 't-g5', type: 'improve', title: '所以我覺得可以分成『立即後果』跟『理', content: '所以我覺得可以分成『立即後果』跟『理解偏移』兩種風險。前者是馬上出事， 後者是慢慢把人帶歪。', author: 'u52', x: 5900, y: 150, parentId: 'g5-w3-9', date: dates.w3+9000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w3-11', topicId: 't-g5', type: 'buildon', title: '這樣第五組的分類就比較不像只有表面高', content: '這樣第五組的分類就比較不像只有表面高低，而是能看出不同風險的作用方式。', author: 'u52', x: 6250, y: 150, parentId: 'g5-w3-10', date: dates.w3+10000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w3-12', topicId: 't-g5', type: 'riseabove', title: '我現在比較能接受的說法是：高風險不只', content: '我現在比較能接受的說法是：高風險不只是錯得多，而是錯得難發現、錯得會被信、而且錯了之後會真的 改變人的判斷或行動。', author: 'u52', x: 6600, y: 150, parentId: 'g5-w3-11', date: dates.w3+11000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w3-13', topicId: 't-g5', type: 'buildon', title: '我開始比較能接受『高風險不是錯得最離', content: '我開始比較能接受『高風險不是錯得最離譜，而是最不容易被發現、最容易被接受 的那種錯』這個講法。', author: 'u52', x: 6950, y: 150, parentId: 'g5-w3-12', date: dates.w3+12000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w3-14', topicId: 't-g5', type: 'question', title: '我覺得還有一種風險是', content: '我覺得還有一種風險是，答案明明不完全對，但因為它講得很有自信，人就不會再去問第二 次。這種『停止懷疑』算不算也是代價？', author: 'u53', x: 4850, y: 550, parentId: 'g5-w3-1', date: dates.w3+13000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w3-15', topicId: 't-g5', type: 'buildon', title: '我覺得算', content: '我覺得算，而且很大。因為它讓錯誤不只是停在那一題 ，而是直接切斷後面的查證動作。', author: 'u53', x: 5200, y: 550, parentId: 'g5-w3-14', date: dates.w3+14000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w3-16', topicId: 't-g5', type: 'improve', title: '所以後面我們是不是要把『過度自信的語', content: '所以後面我們是不是要把『過度自信的語氣』也當成一個觀察點？因為錯誤本身跟它怎麼表現 出來，可能是兩回事。', author: 'u53', x: 5550, y: 550, parentId: 'g5-w3-15', date: dates.w3+15000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w3-17', topicId: 't-g5', type: 'counter', title: '但也不能只看語氣', content: '但也不能只看語氣，有些講得很保留的答案也可能錯。所以語氣應該是 風險放大器，不是錯誤本體。', author: 'u53', x: 5900, y: 550, parentId: 'g5-w3-16', date: dates.w3+16000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w3-18', topicId: 't-g5', type: 'buildon', title: '我覺得這句很好：語氣可能不是錯誤本身', content: '我覺得這句很好：語氣可能不是錯誤本身，但它會決定錯誤能不能順利進到人腦裡。', author: 'u53', x: 6250, y: 550, parentId: 'g5-w3-17', date: dates.w3+17000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w3-19', topicId: 't-g5', type: 'buildon', title: '我會一直想到一件事：有些答案不一定最', content: '我會一直想到一件事：有些答案不一定最錯，可是它會讓人不再問第二次。這種把 懷疑直接切掉的感覺，我覺得很可怕。', author: 'u53', x: 6600, y: 550, parentId: 'g5-w3-18', date: dates.w3+18000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w3-ra', topicId: 't-g5', type: 'riseabove', title: 'W3 小結：第五組第三週開始明確分辨：不是每一種', content: '第五組第三週開始明確分辨：不是每一種錯都一樣可怕，風險至少和可辨識性、後果與停止', author: 'u51', x: 7300, y: 350, parentId: 'g5-w3-19', date: dates.w3+19000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G5 Week 4 (Base X: 6700) ---
                { id: 'g5-w4-1', topicId: 't-g5', type: 'question', title: '如果我們現在要正式建立風險判準 (W4 主節點)', content: '如果我們現在要正式建立風險判準，那最少要放哪幾個面向才夠？我目前想到的是：錯得多 嚴重、好不好發現、語氣有多肯定。', author: 'u51', x: 6700, y: 350, parentId: 'g5-w3-ra', date: dates.w4, cluster: 'A', promisingness: 75 },
                { id: 'g5-w4-2', topicId: 't-g5', type: 'buildon', title: '我覺得這三個已經很像骨架了', content: '我覺得這三個已經很像骨架了。因為有些錯本身不算太嚴 重，但如果超難發現又講得很肯定，風險就會被放大。', author: 'u51', x: 7050, y: 350, parentId: 'g5-w4-1', date: dates.w4+1000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w4-3', topicId: 't-g5', type: 'counter', title: '不過如果只看這三個', content: '不過如果只看這三個，可能還少了一個『後續影響』。因為有些錯不是馬上害人，而是慢慢讓人 建立錯的理解。', author: 'u51', x: 7400, y: 350, parentId: 'g5-w4-2', date: dates.w4+2000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w4-4', topicId: 't-g5', type: 'improve', title: '那也許可以整理成四個面向：事實偏差程', content: '那也許可以整理成四個面向：事實偏差程度、可辨識性、表述自信、可能後果。 這樣比較完整。', author: 'u51', x: 7750, y: 350, parentId: 'g5-w4-3', date: dates.w4+3000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w4-5', topicId: 't-g5', type: 'buildon', title: '這樣一來', content: '這樣一來，第五組後面就不是在做『有沒有幻覺』，而是在做『這個幻覺值不值得被當成高風 險』。', author: 'u51', x: 8100, y: 350, parentId: 'g5-w4-4', date: dates.w4+4000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w4-6', topicId: 't-g5', type: 'riseabove', title: '我覺得第五組這週最大的進展', content: '我覺得第五組這週最大的進展，是把『錯誤』從一個單點現象，慢慢轉成一個可以分層 評估的風險問題。', author: 'u51', x: 8450, y: 350, parentId: 'g5-w4-5', date: dates.w4+5000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w4-7', topicId: 't-g5', type: 'buildon', title: '我現在開始比較想把第五組講清楚：我們', content: '我現在開始比較想把第五組講清楚：我們不是在列很多錯，而是在建立一套能分辨 『哪種錯更值得怕』的判準。', author: 'u51', x: 8800, y: 350, parentId: 'g5-w4-6', date: dates.w4+6000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w4-8', topicId: 't-g5', type: 'question', title: '如果我們真的要把風險分層', content: '如果我們真的要把風險分層，那邊界會不會很模糊？像有些答案內容不算太錯，但口氣超像 真的。這種到底該擺哪裡？', author: 'u52', x: 7050, y: 150, parentId: 'g5-w4-1', date: dates.w4+7000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w4-9', topicId: 't-g5', type: 'buildon', title: '我覺得這正好說明為什麼不能只看內容', content: '我覺得這正好說明為什麼不能只看內容。因為風險不是單一欄位， 是好幾個條件疊起來。', author: 'u52', x: 7400, y: 150, parentId: 'g5-w4-8', date: dates.w4+8000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w4-10', topicId: 't-g5', type: 'counter', title: '但如果太複雜', content: '但如果太複雜，最後又會很難操作。分類如果不能實際用，就算概念很美也沒用。', author: 'u52', x: 7750, y: 150, parentId: 'g5-w4-9', date: dates.w4+9000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w4-11', topicId: 't-g5', type: 'improve', title: '所以我支持先做成比較簡單的分層', content: '所以我支持先做成比較簡單的分層，例如低風險、中風險、高風險，再用四個面向去支撐這個分層。', author: 'u52', x: 8100, y: 150, parentId: 'g5-w4-10', date: dates.w4+10000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w4-12', topicId: 't-g5', type: 'buildon', title: '這樣雖然比較粗', content: '這樣雖然比較粗，但至少後面真的能拿來比較不同模型或不同題目。', author: 'u52', x: 8450, y: 150, parentId: 'g5-w4-11', date: dates.w4+11000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w4-13', topicId: 't-g5', type: 'riseabove', title: '我現在比 較認同的一句話是：高風險幻', content: '我現在比 較認同的一句話是：高風險幻覺不是錯得最離譜，而是最容易被接受、最不容易被察覺、又最可能讓人照著 走的那種錯。', author: 'u52', x: 8800, y: 150, parentId: 'g5-w4-12', date: dates.w4+12000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w4-14', topicId: 't-g5', type: 'buildon', title: '我覺得分類如果不能操作', content: '我覺得分類如果不能操作，再漂亮也沒有用。所以我現在比較支持先分低、中、高 風險，再用幾個面向去撐它。', author: 'u52', x: 9150, y: 150, parentId: 'g5-w4-13', date: dates.w4+13000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w4-15', topicId: 't-g5', type: 'question', title: '如果我們後面真的把風險分級', content: '如果我們後面真的把風險分級，那這個分級最終要幫誰看？是給研究者分析，還是給一般使 用者理解？', author: 'u53', x: 7050, y: 550, parentId: 'g5-w4-1', date: dates.w4+14000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w4-16', topicId: 't-g5', type: 'buildon', title: '我覺得兩邊都可以', content: '我覺得兩邊都可以，但功能不一樣。研究者需要比較細，一般人可能只需要知道 『這種情況要特別小心』。', author: 'u53', x: 7400, y: 550, parentId: 'g5-w4-15', date: dates.w4+15000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w4-17', topicId: 't-g5', type: 'counter', title: '不過如果只做研究者看得懂的分類', content: '不過如果只做研究者看得懂的分類，也可能離真實使用太遠。畢竟我們一直在談的代價，本來 就是發生在人身上。', author: 'u53', x: 7750, y: 550, parentId: 'g5-w4-16', date: dates.w4+16000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w4-18', topicId: 't-g5', type: 'improve', title: '也許我們可以讓架構本身是研究用的', content: '也許我們可以讓架構本身是研究用的，但最後再翻成比較白話的提醒語言 ，例如：這類答案最容易讓人直接相信。', author: 'u53', x: 8100, y: 550, parentId: 'g5-w4-17', date: dates.w4+17000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w4-19', topicId: 't-g5', type: 'buildon', title: '這樣第五組的東西就不會只停在學術框架', content: '這樣第五組的東西就不會只停在學術框架，也會回到社會使用。', author: 'u53', x: 8450, y: 550, parentId: 'g5-w4-18', date: dates.w4+18000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w4-20', topicId: 't-g5', type: 'riseabove', title: '我覺得我們這 週開始真的有把『幻覺』', content: '我覺得我們這 週開始真的有把『幻覺』從技術問題，慢慢做成『人—AI—風險』一起構成的問題。', author: 'u53', x: 8800, y: 550, parentId: 'g5-w4-19', date: dates.w4+19000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w4-21', topicId: 't-g5', type: 'buildon', title: '如果回到人會怎麼用', content: '如果回到人會怎麼用，我會覺得這套分級不能只留在研究者看得懂的層次，最好還 能轉成比較白話的提醒。', author: 'u53', x: 9150, y: 550, parentId: 'g5-w4-20', date: dates.w4+20000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w4-ra', topicId: 't-g5', type: 'riseabove', title: 'W4 小結：第五組第四週正式建立風險判準', content: '第五組第四週正式建立風險判準，從『有錯』走向『哪種錯更危險』。', author: 'u51', x: 9500, y: 350, parentId: 'g5-w4-21', date: dates.w4+21000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G5 Week 5 (Base X: 8900) ---
                { id: 'g5-w5-1', topicId: 't-g5', type: 'question', title: '如果現在已經有風險判準 (W5 主節點)', content: '如果現在已經有風險判準，那後面我們要怎麼把它變成真的能比較的架構？不然最後還是很 多很好的話，但沒有辦法系統地看。', author: 'u51', x: 8900, y: 350, parentId: 'g5-w4-ra', date: dates.w5, cluster: 'A', promisingness: 75 },
                { id: 'g5-w5-2', topicId: 't-g5', type: 'buildon', title: '我覺得可以先從『題目類型』和『錯誤層', content: '我覺得可以先從『題目類型』和『錯誤層級』交叉看。這樣就 能知道，不同題型下，哪一種高風險錯比較容易出現。', author: 'u51', x: 9250, y: 350, parentId: 'g5-w5-1', date: dates.w5+1000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w5-3', topicId: 't-g5', type: 'counter', title: '不過如果交叉太多層', content: '不過如果交叉太多層，表格會很亂。所以前面一定還是要先挑幾個最值得看的主變項。', author: 'u51', x: 9600, y: 350, parentId: 'g5-w5-2', date: dates.w5+2000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w5-4', topicId: 't-g5', type: 'improve', title: '也許先做最核心的三個比較：題型、風險', content: '也許先做最核心的三個比較：題型、風險層級、表述自信。這三個先跑起來，其他再補。', author: 'u51', x: 9950, y: 350, parentId: 'g5-w5-3', date: dates.w5+3000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w5-5', topicId: 't-g5', type: 'buildon', title: '這樣後面就能慢慢回答：是什麼條件', content: '這樣後面就能慢慢回答：是什麼條件，讓某種錯誤更容易變成高風險。', author: 'u51', x: 10300, y: 350, parentId: 'g5-w5-4', date: dates.w5+4000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w5-6', topicId: 't-g5', type: 'riseabove', title: '我覺得 第五組現在的進步很清楚：我們', content: '我覺得 第五組現在的進步很清楚：我們已經不是在收集錯誤，而是在建立『錯誤如何升成風險』的分析架構。', author: 'u51', x: 10650, y: 350, parentId: 'g5-w5-5', date: dates.w5+5000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w5-7', topicId: 't-g5', type: 'buildon', title: '我現在的想法是', content: '我現在的想法是，第五組後面真的不能只做『分類表』，而是要開始看錯誤在什麼條 件下會一路升成高風險。', author: 'u51', x: 11000, y: 350, parentId: 'g5-w5-6', date: dates.w5+6000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w5-8', topicId: 't-g5', type: 'question', title: '如果要說某種條件下高風險錯比較容易出', content: '如果要說某種條件下高風險錯比較容易出現，那我們是不是還要看錯誤是不是穩定出現？不 然一次出現也不能代表很多。', author: 'u52', x: 9250, y: 150, parentId: 'g5-w5-1', date: dates.w5+7000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w5-9', topicId: 't-g5', type: 'buildon', title: '我很在意『穩定性』', content: '我很在意『穩定性』，因為有些錯如果反覆出現，代表那不是偶然 ，而是模型真的有某種固定偏誤。', author: 'u52', x: 9600, y: 150, parentId: 'g5-w5-8', date: dates.w5+8000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w5-10', topicId: 't-g5', type: 'counter', title: '但穩定出現也不一定就更危險', content: '但穩定出現也不一定就更危險，還是要放回情境。有些穩定小錯，後果可能不大。', author: 'u52', x: 9950, y: 150, parentId: 'g5-w5-9', date: dates.w5+9000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w5-11', topicId: 't-g5', type: 'improve', title: '所以我覺得穩定性要跟風險層級一起看', content: '所以我覺得穩定性要跟風險層級一起看。不是單看它有沒有重複，而是看它是不是穩定重複地出現在高風 險區。', author: 'u52', x: 10300, y: 150, parentId: 'g5-w5-10', date: dates.w5+10000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w5-12', topicId: 't-g5', type: 'buildon', title: '這樣第五組的討論就會比較像在看系統性', content: '這樣第五組的討論就會比較像在看系統性問題，而不是單點事故。', author: 'u52', x: 10650, y: 150, parentId: 'g5-w5-11', date: dates.w5+11000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w5-13', topicId: 't-g5', type: 'riseabove', title: '我現在更能 接受的講法是：高風險幻覺', content: '我現在更能 接受的講法是：高風險幻覺不是一時失誤而已，而是可能在特定任務和特定表述條件下，穩定地再出現。', author: 'u52', x: 11000, y: 150, parentId: 'g5-w5-12', date: dates.w5+12000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w5-14', topicId: 't-g5', type: 'buildon', title: '我開始很在意『穩定性』', content: '我開始很在意『穩定性』，因為有些高風險不是偶爾出現，而是某些條件下會一直重 複。', author: 'u52', x: 11350, y: 150, parentId: 'g5-w5-13', date: dates.w5+13000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w5-15', topicId: 't-g5', type: 'question', title: '如果一種錯會穩定出現', content: '如果一種錯會穩定出現，而且人又穩定容易相信，那這種東西其實就不只是『答錯』，而是很像 一種會一直製造誤解的機制。', author: 'u53', x: 9250, y: 550, parentId: 'g5-w5-1', date: dates.w5+14000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w5-16', topicId: 't-g5', type: 'buildon', title: '我覺得這就是為什麼我們一直要把人放進', content: '我覺得這就是為什麼我們一直要把人放進來。因為只看模型本身 ，有時候會低估錯誤真正造成的社會效果。', author: 'u53', x: 9600, y: 550, parentId: 'g5-w5-15', date: dates.w5+15000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w5-17', topicId: 't-g5', type: 'counter', title: '不過也不能把責任全部推給使用者不查證', content: '不過也不能把責任全部推給使用者不查證，因為模型本身的表達方式確實會影響人會不會停 下來想。', author: 'u53', x: 9950, y: 550, parentId: 'g5-w5-16', date: dates.w5+16000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w5-18', topicId: 't-g5', type: 'improve', title: '所以我想把第五組的一個主軸寫成：不是', content: '所以我想把第五組的一個主軸寫成：不是只有『模型會不會錯』，還有『模型怎麼讓錯誤 比較容易被接受』。', author: 'u53', x: 10300, y: 550, parentId: 'g5-w5-17', date: dates.w5+17000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w5-19', topicId: 't-g5', type: 'buildon', title: '我覺得這樣第五組的研究味就很明顯', content: '我覺得這樣第五組的研究味就很明顯，因為它不是只在找 bug，而是在找風險如何被放大。', author: 'u53', x: 10650, y: 550, parentId: 'g5-w5-18', date: dates.w5+18000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w5-20', topicId: 't-g5', type: 'riseabove', title: '如果要我現在先收一句', content: '如果要我現在先收一句，我會說：幻覺真正的代價，不一定來自單一錯誤多大，而可能來自它 被流暢、自信和便利一起包裝之後，人更不容易停下來懷疑。', author: 'u53', x: 11000, y: 550, parentId: 'g5-w5-19', date: dates.w5+19000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w5-21', topicId: 't-g5', type: 'buildon', title: '如果一種錯很穩定地出現', content: '如果一種錯很穩定地出現，而且人又很穩定地相信，那它就不只是 bug，比較像一 種會一直製造誤解的機制。', author: 'u53', x: 11350, y: 550, parentId: 'g5-w5-20', date: dates.w5+20000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w5-ra', topicId: 't-g5', type: 'riseabove', title: 'W5 小結：第五組第五週把判準轉成分析架構', content: '第五組第五週把判準轉成分析架構，不再只收集錯誤，而是開始分析錯誤如何升成高風險。', author: 'u51', x: 11700, y: 350, parentId: 'g5-w5-21', date: dates.w5+21000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G5 Week 6 (Base X: 11100) ---
                { id: 'g5-w6-1', topicId: 't-g5', type: 'question', title: '如果我們現在回頭看 (W6 主節點)', content: '如果我們現在回頭看，很多高風險錯好像都有幾個共通點：講得很順、很肯定、還不容易馬上 被抓包。那這是不是表示風險不是只來自內容錯，而是來自一整套表現方式？', author: 'u51', x: 11100, y: 350, parentId: 'g5-w5-ra', date: dates.w6, cluster: 'A', promisingness: 75 },
                { id: 'g5-w6-2', topicId: 't-g5', type: 'buildon', title: '我覺得很像', content: '我覺得很像。內 容錯只是核心，但流暢性和自信會決定這個錯能不能順利進到人腦裡。', author: 'u51', x: 11450, y: 350, parentId: 'g5-w6-1', date: dates.w6+1000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w6-3', topicId: 't-g5', type: 'counter', title: '不過也不能講得像流暢性本身就是壞的', content: '不過也不能講得像流暢性本身就是壞的，因為流暢本來就是生成式 AI 的優勢。問題是它會不 會在錯的時候也維持同樣流暢。', author: 'u51', x: 11800, y: 350, parentId: 'g5-w6-2', date: dates.w6+2000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w6-4', topicId: 't-g5', type: 'improve', title: '所以我們可以把機制講成：當錯誤和高流', content: '所以我們可以把機制講成：當錯誤和高流暢、高自信綁在一起 ，而且又不容易被看出來時，風險就會快速升高。', author: 'u51', x: 12150, y: 350, parentId: 'g5-w6-3', date: dates.w6+3000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w6-5', topicId: 't-g5', type: 'buildon', title: '這樣第五組就不只是做分類', content: '這樣第五組就不只是做分類，還開始在解釋『為什麼某些錯特別危險』。', author: 'u51', x: 12500, y: 350, parentId: 'g5-w6-4', date: dates.w6+4000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w6-6', topicId: 't-g5', type: 'improve', title: '我覺得這 週開始可以慢慢把前面討論過', content: '我覺得這 週開始可以慢慢把前面討論過的東西收成一個比較像機制模型，而不是只停在現象整理。', author: 'u51', x: 12850, y: 350, parentId: 'g5-w6-5', date: dates.w6+5000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w6-7', topicId: 't-g5', type: 'riseabove', title: '我現在最想保留的一句話是：高風險幻覺', content: '我現在最想保留的一句話是：高風險幻覺不是單純內容失真，而是『失真內容 × 流暢語言 × 過度自信 × 低可辨識』一起形成的危險組合。', author: 'u51', x: 13200, y: 350, parentId: 'g5-w6-6', date: dates.w6+6000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w6-8', topicId: 't-g5', type: 'buildon', title: '如果回頭看', content: '如果回頭看，我覺得我們這週最重要的不是再去說哪個模型比較好，而是開始解釋 ：為什麼某些錯一旦出現，就特別容易變成高風險。', author: 'u51', x: 13550, y: 350, parentId: 'g5-w6-7', date: dates.w6+7000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w6-9', topicId: 't-g5', type: 'question', title: '如果我們現在要講『機制』', content: '如果我們現在要講『機制』，那要怎麼避免只是換一種比較厲害的說法？我覺得機制不能只是 把現象講得更漂亮而已。', author: 'u52', x: 11450, y: 150, parentId: 'g5-w6-1', date: dates.w6+8000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w6-10', topicId: 't-g5', type: 'buildon', title: '我同意', content: '我同意，所以我覺得機制至少要能回答一件事：為什麼某些錯會反覆 變成高風險，而不是偶爾出現一下。', author: 'u52', x: 11800, y: 150, parentId: 'g5-w6-9', date: dates.w6+9000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w6-11', topicId: 't-g5', type: 'counter', title: '但如果我們把太多因素都塞進機制', content: '但如果我們把太多因素都塞進機制，也可能又太大。最後機制就會變成什麼都講了，但什麼都 不清楚。', author: 'u52', x: 12150, y: 150, parentId: 'g5-w6-10', date: dates.w6+10000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w6-12', topicId: 't-g5', type: 'improve', title: '也許可以先守住最核心的兩步：先是模型', content: '也許可以先守住最核心的兩步：先是模型給出不穩事實，接著因為流暢與自信讓人比 較不會懷疑。這兩步已經很關鍵。', author: 'u52', x: 12500, y: 150, parentId: 'g5-w6-11', date: dates.w6+11000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w6-13', topicId: 't-g5', type: 'buildon', title: '後面的任務類型、使用者能力、後果大小', content: '後面的任務類型、使用者能力、後果大小，可以當作讓這個機制被放大的條件。', author: 'u52', x: 12850, y: 150, parentId: 'g5-w6-12', date: dates.w6+12000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w6-14', topicId: 't-g5', type: 'riseabove', title: '我比較接受的整理是：幻覺的高風險', content: '我比較接受的整理是：幻覺的高風險，不只是模型答錯，而是錯誤被一種很容易被接受的形式送出來，然後 在特定任務裡放大後果。', author: 'u52', x: 13200, y: 150, parentId: 'g5-w6-13', date: dates.w6+13000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w6-15', topicId: 't-g5', type: 'buildon', title: '我現在比較接受『機制』這個詞了', content: '我現在比較接受『機制』這個詞了，因為我們後面真的不是只在換更厲害的說法，而 是在回答：為什麼同樣是錯，有些特別容易反覆變成高風險。', author: 'u52', x: 13550, y: 150, parentId: 'g5-w6-14', date: dates.w6+14000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w6-16', topicId: 't-g5', type: 'question', title: '如果錯誤會因為表達方式被放大', content: '如果錯誤會因為表達方式被放大，那我覺得『信任』其實要被放進來。因為高風險很多時候不 是錯本身，而是人願不願意把判斷交出去。', author: 'u53', x: 11450, y: 550, parentId: 'g5-w6-1', date: dates.w6+15000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w6-17', topicId: 't-g5', type: 'buildon', title: '我很同意', content: '我很同意。尤其生成式 AI 最大的特性之一就是它 讓人覺得『直接拿來用好方便』。便利一高，人就更少停下來查。', author: 'u53', x: 11800, y: 550, parentId: 'g5-w6-16', date: dates.w6+16000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w6-18', topicId: 't-g5', type: 'counter', title: '但也不能只怪人懶', content: '但也不能只怪人懶，因為工具設計本來就會引導使用方式。越像在跟專家聊天，人就越容易把 它當成專家。', author: 'u53', x: 12150, y: 550, parentId: 'g5-w6-17', date: dates.w6+17000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w6-19', topicId: 't-g5', type: 'improve', title: '所以我想把『信任轉移』也當成第五組的', content: '所以我想把『信任轉移』也當成第五組的一條線。也就是：人本來會自己判斷的部 分，慢慢交給 AI，這時候幻覺後果就會被放大。', author: 'u53', x: 12500, y: 550, parentId: 'g5-w6-18', date: dates.w6+18000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w6-20', topicId: 't-g5', type: 'buildon', title: '這樣第五組後面就不只是在談模型行為', content: '這樣第五組後面就不只是在談模型行為，也會談人怎麼在互動裡改變自己的警覺程度。 【Rise Above】 我會把這週的收穫講成：高風險幻覺的真正問題，不只是它會錯，而是它可能在高便利、高信任的 互動裡，讓人更快放下原本應該有的懷疑。', author: 'u53', x: 12850, y: 550, parentId: 'g5-w6-19', date: dates.w6+19000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w6-21', topicId: 't-g5', type: 'buildon', title: '我開始很明確地覺得', content: '我開始很明確地覺得，『信任轉移』一定要被講出來。因為很多時候不是模型多厲害 ，而是人太快把原本該自己判斷的部分交出去。', author: 'u53', x: 13200, y: 550, parentId: 'g5-w6-20', date: dates.w6+20000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w6-ra', topicId: 't-g5', type: 'riseabove', title: 'W6 小結：第五組第六週從現象走向機制', content: '第五組第六週從現象走向機制，開始解釋高風險幻覺為什麼會形成、為什麼會被放大。', author: 'u51', x: 13900, y: 350, parentId: 'g5-w6-21', date: dates.w6+21000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G5 Week 7 (Base X: 13300) ---
                { id: 'g5-w7-1', topicId: 't-g5', type: 'question', title: '如果現在要我用一句話講第五組這七週到 (W7 主節點)', content: '如果現在要我用一句話講第五組這七週到底在做什麼，我應該不會只說『研究 AI 會不會幻 覺』，因為那太平了。我覺得我們後來真正抓到的是，為什麼有些幻覺特別危險。', author: 'u51', x: 13300, y: 350, parentId: 'g5-w6-ra', date: dates.w7, cluster: 'A', promisingness: 75 },
                { id: 'g5-w7-2', topicId: 't-g5', type: 'buildon', title: '對我來說', content: '對我來說，我 們最大的轉變是：一開始只覺得錯就是錯，後來才慢慢看到，錯誤還有好不好發現、講得多肯定、會不會真 的影響行動這些層次。', author: 'u51', x: 13650, y: 350, parentId: 'g5-w7-1', date: dates.w7+1000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w7-3', topicId: 't-g5', type: 'improve', title: '我想把第五組最後的模型整理成四步：先', content: '我想把第五組最後的模型整理成四步：先看內容有沒有偏差，再看這個偏差容不容易被看出來 ，再看表述是不是很自信，最後再看它落在哪種任務和後果情境裡。', author: 'u51', x: 14000, y: 350, parentId: 'g5-w7-2', date: dates.w7+2000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w7-4', topicId: 't-g5', type: 'counter', title: '但如果只講這四步', content: '但如果只講這四步，好像 又少了『穩定性』。因為有些高風險不是一次出現，而是在某些條件下一直重複。', author: 'u51', x: 14350, y: 350, parentId: 'g5-w7-3', date: dates.w7+3000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w7-5', topicId: 't-g5', type: 'buildon', title: '那也許可以再加一個觀念：當某種高風險', content: '那也許可以再加一個觀念：當某種高風險錯在特定任務裡穩定出現，它就不是單一失誤，而比 較像系統性風險。', author: 'u51', x: 14700, y: 350, parentId: 'g5-w7-4', date: dates.w7+4000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w7-6', topicId: 't-g5', type: 'improve', title: '這樣我們的模型就不只是分類', content: '這樣我們的模型就不只是分類，更是在講風險怎麼形成、怎麼被放大。', author: 'u51', x: 15050, y: 350, parentId: 'g5-w7-5', date: dates.w7+5000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w7-7', topicId: 't-g5', type: 'riseabove', title: '我會把第五組七週的知識建構歷程收成這', content: '我會把第五組七週的知識建構歷程收成這句：我們從『AI 有時候會亂講』，一路走到『高風 險幻覺是由內容失真、低可辨識、高流暢、高自信、任務後果與信任轉移共同形成的風險結構』。', author: 'u51', x: 15400, y: 350, parentId: 'g5-w7-6', date: dates.w7+6000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w7-8', topicId: 't-g5', type: 'buildon', title: '如果用知識建構的角度看', content: '如果用知識建構的角度看，我覺得第五組這七週其實一直在修同一件事：不是 AI 會不會亂講，而是哪些錯會真的穿過人的信任，變成後果。', author: 'u51', x: 15750, y: 350, parentId: 'g5-w7-7', date: dates.w7+7000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w7-9', topicId: 't-g5', type: 'question', title: '如果要把第五組最後講得夠扎實', content: '如果要把第五組最後講得夠扎實，我覺得還是要問：我們最不想回到哪種太簡單的說法？', author: 'u52', x: 13650, y: 150, parentId: 'g5-w7-1', date: dates.w7+8000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w7-10', topicId: 't-g5', type: 'buildon', title: '我最不想回到『準確率不高』這種話', content: '我最不想回到『準確率不高』這種話。因為我們這七週根本不是只在談準不準，而是在談哪種錯 會真的出事。', author: 'u52', x: 14000, y: 150, parentId: 'g5-w7-9', date: dates.w7+9000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w7-11', topicId: 't-g5', type: 'counter', title: '但也不能因為討論風險', content: '但也不能因為討論風險，就完全不看錯誤本身。內容錯還是起點，只是它不是終點。', author: 'u52', x: 14350, y: 150, parentId: 'g5-w7-10', date: dates.w7+10000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w7-12', topicId: 't-g5', type: 'improve', title: '所以我覺得最好的講法是：錯誤是起點', content: '所以我覺得最好的講法是：錯誤是起點，風險是錯誤進入真實情境之後的放大結果。', author: 'u52', x: 14700, y: 150, parentId: 'g5-w7-11', date: dates.w7+11000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w7-13', topicId: 't-g5', type: 'buildon', title: '這樣一來', content: '這樣一來，第五組就不只是評分 AI 表現，而是在分析錯誤如何穿過語言、信任和任務情境，變 成真的代價。', author: 'u52', x: 15050, y: 150, parentId: 'g5-w7-12', date: dates.w7+12000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w7-14', topicId: 't-g5', type: 'riseabove', title: '我現在最能接受的總結是：高風險幻覺不', content: '我現在最能接受的總結是：高風險幻覺不是答錯而已，而是錯誤被包裝得太像 正確、被使用得太像權威、被接受得太快，最後才變成代價。', author: 'u52', x: 15400, y: 150, parentId: 'g5-w7-13', date: dates.w7+13000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w7-15', topicId: 't-g5', type: 'buildon', title: '如果回頭整理', content: '如果回頭整理，我最不想再回到『準確率不高』這種太平的說法。因為我們後來根本 不是只在談準不準。', author: 'u52', x: 15750, y: 150, parentId: 'g5-w7-14', date: dates.w7+14000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w7-16', topicId: 't-g5', type: 'question', title: '如果最後要讓一般人也聽得懂第五組在研', content: '如果最後要讓一般人也聽得懂第五組在研究什麼，我覺得關鍵不是『幻覺』這個字，而是『為什 麼這種錯會讓人真的受影響』。那這句要怎麼說會最貼近生活？', author: 'u53', x: 13650, y: 550, parentId: 'g5-w7-1', date: dates.w7+15000, cluster: 'A', promisingness: 55 },
                { id: 'g5-w7-17', topicId: 't-g5', type: 'buildon', title: '我會說：最危險的不是 AI 亂講', content: '我會說：最危險的不是 AI 亂講 ，而是它亂講的時候看起來還很像可以直接相信。', author: 'u53', x: 14000, y: 550, parentId: 'g5-w7-16', date: dates.w7+16000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w7-18', topicId: 't-g5', type: 'counter', title: '不過這樣還少了一點', content: '不過這樣還少了一點，就是人不只是相信，還可能因為太方便而懶得再查。便利也是風險的一 部分。', author: 'u53', x: 14350, y: 550, parentId: 'g5-w7-17', date: dates.w7+17000, cluster: 'A', promisingness: 63 },
                { id: 'g5-w7-19', topicId: 't-g5', type: 'improve', title: '那可以改成：最危險的不是 AI 會錯', content: '那可以改成：最危險的不是 AI 會錯，而是它在方便、流暢、很像專家的互動裡出錯時，人 比較不會停下來懷疑。', author: 'u53', x: 14700, y: 550, parentId: 'g5-w7-18', date: dates.w7+18000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w7-20', topicId: 't-g5', type: 'buildon', title: '我覺得這句很像第五組一路走出來的感覺', content: '我覺得這句很像第五組一路走出來的感覺，因為我們一直都在看『錯誤怎麼變成被接受的錯 誤』。', author: 'u53', x: 15050, y: 550, parentId: 'g5-w7-19', date: dates.w7+19000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w7-21', topicId: 't-g5', type: 'improve', title: '如果後面要再白話一點', content: '如果後面要再白話一點，我甚至會說：有些答案不是錯得最明顯，反而是錯得最像真的， 那才最危險。', author: 'u53', x: 15400, y: 550, parentId: 'g5-w7-20', date: dates.w7+20000, cluster: 'B', promisingness: 68 },
                { id: 'g5-w7-22', topicId: 't-g5', type: 'riseabove', title: '我會把第五組最後的收穫講成：我們不是', content: '我會把第五組最後的收穫講成：我們不是只研究 AI 會不會幻覺，而是在研究當答案太方 便、太流暢、太像真的時，錯誤如何穿過人的信任，變成真正的風險。', author: 'u53', x: 15750, y: 550, parentId: 'g5-w7-21', date: dates.w7+21000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g5-w7-23', topicId: 't-g5', type: 'buildon', title: '我現在會用比較白話的方式講第五組：最', content: '我現在會用比較白話的方式講第五組：最危險的不是 AI 會錯，而是它錯的時候還 很像可以直接相信。', author: 'u53', x: 16100, y: 550, parentId: 'g5-w7-22', date: dates.w7+22000, cluster: 'B', promisingness: 60 },
                { id: 'g5-w7-ra', topicId: 't-g5', type: 'riseabove', title: 'W7 小結：第五組第七週最後收成的是一個高風險幻', content: '第五組第七週最後收成的是一個高風險幻覺如何形成、如何被信任放大、如何變成真實代', author: 'u51', x: 16450, y: 350, parentId: 'g5-w7-23', date: dates.w7+23000, cluster: 'C', promisingness: 95 }, // 熱點
            ]
        };

        window.state = {
            user: window.SEED_DATA.userList['teacher'], 
            userList: {...window.SEED_DATA.userList},
            topics: [], nodes: [], trash: [], currentView: 'entrance', currentTopicId: null,
            activeFilter: '全部', tempSelectedCategories: [], 
            editingTopicId: null, 
            canvas: { 
                scale: 1, offsetX: 0, offsetY: 0, 
                isDragging: false, lastX: 0, lastY: 0, 
                draggedNodeId: null, isClusterMode: false, isHeatmapMode: false, 
                animFrame: null,
                isSelecting: false, selectionStart: {x: 0, y: 0}, selectionCurrent: {x: 0, y: 0},
                isPanMode: false,
                isPinching: false, lastPinchDist: 0, startPinchScale: 1,
                // 🔥 [ADDED] Scrollbar Dragging State
                isDraggingScrollbar: null // 'h' or 'v'
            },
            selectedNodeIds: [],
            composer: { parentId: null, selectedScaffold: null }, profile: null
        };
        
        window.dataManager = {
            save: () => { 
                const dataToSave = { userList: window.state.userList, topics: window.state.topics, nodes: window.state.nodes, trash: window.state.trash };
                db.collection(DB_COLLECTION).doc(DB_DOC).set(dataToSave).then(() => { console.log("Cloud Saved"); }).catch((e) => { console.error("Save error:", e); });
                window.dataManager.saveLocalSession();
            },
            saveLocalSession: () => {
                if (!window.state.user) return;
                const userKey = Object.keys(window.state.userList).find(key => window.state.userList[key].id === window.state.user.id);
                const localState = { currentUserKey: userKey || 'teacher', currentView: window.state.currentView, currentTopicId: window.state.currentTopicId };
                localStorage.setItem('kb_local_session', JSON.stringify(localState));
            },
            load: () => {
                db.collection(DB_COLLECTION).doc(DB_DOC).onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        window.state.userList = data.userList || window.SEED_DATA.userList;
                        window.state.topics = data.topics || window.SEED_DATA.topics;
                        window.state.nodes = data.nodes || window.SEED_DATA.nodes;
                        window.state.trash = data.trash || [];
                        
                        const localSession = localStorage.getItem('kb_local_session');
                        let userKey = 'teacher';
                        if(localSession) {
                            try {
                                const parsed = JSON.parse(localSession);
                                if(window.state.userList[parsed.currentUserKey]) { userKey = parsed.currentUserKey; }
                            } catch(e){}
                        }
                        
                        window.state.user = window.state.userList[userKey] || window.state.userList['teacher'];

                        if (window.state.currentView === 'entrance') window.ui.renderEntrance();
                        else if (window.state.currentView === 'canvas') window.ui.renderCanvas();
                        else if (window.state.currentView === 'profile') window.ui.renderProfile();
                        window.ui.renderUserInfo(); window.ui.renderUserMenu(); window.app.updateTrashBadge();
                    } else {
                        window.state.userList = JSON.parse(JSON.stringify(window.SEED_DATA.userList));
                        window.state.topics = JSON.parse(JSON.stringify(window.SEED_DATA.topics));
                        window.state.nodes = JSON.parse(JSON.stringify(window.SEED_DATA.nodes));
                        window.state.trash = []; window.state.user = window.state.userList['teacher'];
                        window.dataManager.save();
                    }
                });

                const localSession = localStorage.getItem('kb_local_session');
                if (localSession) {
                    try {
                        const parsed = JSON.parse(localSession);
                        window.state.currentView = parsed.currentView || 'entrance';
                        window.state.currentTopicId = parsed.currentTopicId || null;
                    } catch(e) {}
                }
            },
            reset: () => { 
                if(confirm("確定重置所有資料？這將刪除雲端資料庫並載入最新的「知識建構範例教材」。")) {
                    const seed = { userList: window.SEED_DATA.userList, topics: window.SEED_DATA.topics, nodes: window.SEED_DATA.nodes, trash: [] };
                    db.collection(DB_COLLECTION).doc(DB_DOC).set(seed).then(() => { window.location.reload(); });
                }
            }
        };

        window.app = {};
        window.app.generateCategoryOptions = () => Object.entries(window.TOPIC_CATEGORIES).map(([value, label]) => `<option value="${value}">${label}</option>`).join('');
        window.app.generateCategoryFilters = () => {
            let html = `<button class="px-4 py-1.5 rounded-full text-sm font-medium filter-btn transition ${window.state.activeFilter === '全部' ? 'active bg-slate-200 text-slate-900 border-slate-300' : 'bg-white text-slate-500 border border-slate-200'}" data-category="全部">所有主題</button>`;
            html += Object.keys(window.TOPIC_CATEGORIES).map(key => {
                const isActive = window.state.activeFilter === key;
                return `<button class="px-4 py-1.5 rounded-full text-sm font-medium filter-btn transition ${isActive ? 'active bg-indigo-50 text-indigo-700 border-indigo-200' : 'bg-white text-slate-500 border border-slate-200'}" data-category="${key}">${window.TOPIC_CATEGORIES[key]}</button>`;
            }).join('');
            return html;
        };
        window.app.setFilter = (category) => { window.state.activeFilter = category; window.ui.renderEntrance(); };
        window.app.initCategorySelector = () => { };
        window.app.renderCategorySelector = () => {
            const container = document.getElementById('topic-category-selector'); if(!container) return;
            container.innerHTML = Object.keys(window.TOPIC_CATEGORIES).map(key => {
                const isSelected = window.state.tempSelectedCategories.includes(key);
                return `<span onclick="window.app.toggleTempCategory('${key}')" class="category-tag px-3 py-1 rounded-full text-xs font-bold border ${isSelected ? 'selected' : 'bg-white text-slate-500 border-slate-200'}">${window.TOPIC_CATEGORIES[key]}</span>`;
            }).join('');
        };
        window.app.toggleTempCategory = (key) => {
            if (window.state.tempSelectedCategories.includes(key)) { window.state.tempSelectedCategories = window.state.tempSelectedCategories.filter(c => c !== key); } else { window.state.tempSelectedCategories.push(key); }
            window.app.renderCategorySelector();
        };

        window.app.router = (view) => {
            if (view === 'canvas' && !window.state.currentTopicId) { window.ui.showToast('請先從主題入口選擇一個探究主題', 'error'); window.app.router('entrance'); return; }
            window.state.currentView = view;
            if(view === 'entrance') { window.state.currentTopicId = null; }
            window.dataManager.saveLocalSession();
            window.ui.updateNav(view);
            document.getElementById('user-menu').classList.add('hidden');

            // 🔥 [ADDED] Synchronized Scrollbar Logic
            applyTransform: () => {

            updateScrollbars: () => {
                const wrapper = document.getElementById('canvas-wrapper');
                const vThumb = document.getElementById('scrollbar-v-thumb');
                const hThumb = document.getElementById('scrollbar-h-thumb');
                if (!wrapper || !vThumb || !hThumb) return;

                const vpW = wrapper.clientWidth; const vpH = wrapper.clientHeight;
                const scale = window.state.canvas.scale;
                const contentW = window.app.canvas.VIRTUAL_W * scale;
                const contentH = window.app.canvas.VIRTUAL_H * scale;

                const hRatio = Math.min(vpW / contentW, 1);

                // Normalize offset against the scrollable boundaries
                const maxOffsetX = vpW * 0.8;
                const minOffsetX = -contentW + (vpW * 0.2);
                const maxOffsetY = vpH * 0.8;

                const hScrollPct = (maxOffsetX - window.state.canvas.offsetX) / (maxOffsetX - minOffsetX);
                const vScrollPct = (maxOffsetY - window.state.canvas.offsetY) / (maxOffsetY - minOffsetY);

                // Apply constraints to visual thumb position
                const clampedHPct = Math.min(Math.max(hScrollPct, 0), 1);
                const clampedVPct = Math.min(Math.max(vScrollPct, 0), 1);

                // The thumb can move within (100% - thumbWidth%)
                hThumb.style.left = `${clampedHPct * (100 - parseFloat(hThumb.style.width))}%`;

                const thumb = document.getElementById(`scrollbar-${dir}-thumb`);
                if (!wrapper || !track || !thumb) return;

                const trackRect = track.getBoundingClientRect();
                const scale = window.state.canvas.scale;
                
                if (dir === 'h') {
                    const contentW = window.app.canvas.VIRTUAL_W * scale;
                    const maxOffsetX = wrapper.clientWidth * 0.8;
                    const minOffsetX = -contentW + (wrapper.clientWidth * 0.2);
                    
                    // Calculate percentage of mouse within track
                    let pct = (e.clientX - trackRect.left - (thumb.clientWidth/2)) / (trackRect.width - thumb.clientWidth);

                    window.state.canvas.offsetX = maxOffsetX - (pct * (maxOffsetX - minOffsetX));

                    const contentH = window.app.canvas.VIRTUAL_H * scale;
