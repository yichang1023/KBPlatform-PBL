                    window.state.canvas.lastPinchDist = window.app.canvas.getDistance(e.touches);
                    window.state.canvas.startPinchScale = window.state.canvas.scale;
                    return;
                }

                if(e.target.closest('.node-card')) {
                    const nodeId = e.target.closest('.node-card').id.replace('node-', '');
                    if (!e.shiftKey && !e.ctrlKey && !window.state.selectedNodeIds.includes(nodeId)) {
                        window.state.selectedNodeIds = [];
                        document.querySelectorAll('.node-card.selected-node').forEach(el => el.classList.remove('selected-node'));
                    }
                    if (!window.state.selectedNodeIds.includes(nodeId)) {
                        window.state.selectedNodeIds.push(nodeId);
                        const card = document.getElementById(`node-${nodeId}`); if(card) card.classList.add('selected-node');
                    }
                    return; 
                }
                if (e.ctrlKey || window.state.canvas.isPanMode) {
                    window.state.canvas.isDragging = true;
                    const c = window.app.canvas.getCoords(e);
                    window.state.canvas.lastX = c.x; window.state.canvas.lastY = c.y;
                    const w = document.getElementById('canvas-wrapper'); if(w) w.style.cursor = 'grabbing';
                    return;
                }
                window.state.canvas.isSelecting = true;
                const c = window.app.canvas.getCoords(e);
                window.state.canvas.selectionStart = {x: c.x, y: c.y}; window.state.canvas.selectionCurrent = {x: c.x, y: c.y};
                const box = document.getElementById('selection-box');
                box.style.left = c.x + 'px'; box.style.top = c.y + 'px'; box.style.width = '0px'; box.style.height = '0px'; box.style.display = 'block';
                if (!e.shiftKey) { window.state.selectedNodeIds = []; document.querySelectorAll('.node-card.selected-node').forEach(el => el.classList.remove('selected-node')); }
            },
            pan: (e) => {
                if (window.state.canvas.isDraggingScrollbar) {
                    window.app.canvas.handleScrollbarDrag(e);
                    return;
                }

                if (window.state.canvas.isPinching && e.touches && e.touches.length === 2) {
                    const dist = window.app.canvas.getDistance(e.touches);
                    const zoomFactor = dist / window.state.canvas.lastPinchDist;
                    const newScale = window.state.canvas.startPinchScale * zoomFactor;
                    window.state.canvas.scale = Math.min(Math.max(0.1, newScale), 3);
                    window.app.canvas.applyTransform();
                    return;
                }

                const c = window.app.canvas.getCoords(e);
                if(window.state.canvas.isDragging) {
                    // 🔥 [MODIFIED] Free boundary dragging - no rigid clamps, just let offsets accumulate freely
                    window.state.canvas.offsetX += c.x - window.state.canvas.lastX;
                    window.state.canvas.offsetY += c.y - window.state.canvas.lastY;
                    window.state.canvas.lastX = c.x; window.state.canvas.lastY = c.y;
                    window.app.canvas.applyTransform();
                } else if(window.state.canvas.draggedNodeId) {
                    const dx = (c.x - window.state.canvas.lastX) / window.state.canvas.scale;
                    const dy = (c.y - window.state.canvas.lastY) / window.state.canvas.scale;
                    let nodesToMoveIds = [window.state.canvas.draggedNodeId];
                    if (window.state.selectedNodeIds.includes(window.state.canvas.draggedNodeId)) { nodesToMoveIds = window.state.selectedNodeIds; }

                    nodesToMoveIds.forEach(id => {
                        const node = window.state.nodes.find(n => n.id === id);
                        if(node) { node.x += dx; node.y += dy; const el = document.getElementById(`node-${node.id}`); if(el) { el.style.left = `${node.x}px`; el.style.top = `${node.y}px`; } }
                    });
                    window.state.canvas.lastX = c.x; window.state.canvas.lastY = c.y;
                } else if (window.state.canvas.isSelecting) {
                    window.state.canvas.selectionCurrent = {x: c.x, y: c.y};
                    const start = window.state.canvas.selectionStart; const current = window.state.canvas.selectionCurrent;
                    const x = Math.min(start.x, current.x); const y = Math.min(start.y, current.y);
                    const w = Math.abs(current.x - start.x); const h = Math.abs(current.y - start.y);
                    const box = document.getElementById('selection-box');
                    box.style.left = x + 'px'; box.style.top = y + 'px'; box.style.width = w + 'px'; box.style.height = h + 'px';
                }
            },
            handleEnd: (e) => {
                if (window.state.canvas.isDraggingScrollbar) {
                    const dir = window.state.canvas.isDraggingScrollbar;
                    document.getElementById(`scrollbar-${dir}-thumb`).classList.remove('dragging');
                    window.state.canvas.isDraggingScrollbar = null;
                    return;
                }

                if (window.state.canvas.isPinching && (!e.touches || e.touches.length < 2)) { window.state.canvas.isPinching = false; }
                if (window.state.canvas.isDragging) {
                    window.state.canvas.isDragging = false;
                    const cursor = window.state.canvas.isPanMode ? 'grab' : 'default'; 
                    const w = document.getElementById('canvas-wrapper'); if(w) w.style.cursor = cursor;
                }
                if (window.state.canvas.draggedNodeId) { window.state.canvas.draggedNodeId = null; }
                if (window.state.canvas.isSelecting) {
                    const start = window.state.canvas.selectionStart; const current = window.state.canvas.selectionCurrent;
                    const selRect = { left: Math.min(start.x, current.x), top: Math.min(start.y, current.y), right: Math.max(start.x, current.x), bottom: Math.max(start.y, current.y) };
                    if (Math.abs(selRect.right - selRect.left) < 5 && Math.abs(selRect.bottom - selRect.top) < 5) {
                            window.state.canvas.isSelecting = false; document.getElementById('selection-box').style.display = 'none'; return;
                    }
                    const nodeElements = document.querySelectorAll('.node-card');
                    const newSelectedIds = [];
                    nodeElements.forEach(el => {
                        const rect = el.getBoundingClientRect();
                        if (rect.left < selRect.right && rect.right > selRect.left && rect.top < selRect.bottom && rect.bottom > selRect.top) {
                            newSelectedIds.push(el.id.replace('node-', ''));
                        }
                    });
                    newSelectedIds.forEach(id => { if (!window.state.selectedNodeIds.includes(id)) window.state.selectedNodeIds.push(id); });
                    
                    document.querySelectorAll('.node-card.selected-node').forEach(el => {
                        if(!window.state.selectedNodeIds.includes(el.id.replace('node-', ''))) { el.classList.remove('selected-node'); }
                    });
                    window.state.selectedNodeIds.forEach(id => { const el = document.getElementById(`node-${id}`); if(el) el.classList.add('selected-node'); });

                    window.state.canvas.isSelecting = false; document.getElementById('selection-box').style.display = 'none';
                }
            },
            handleWheel: (e) => {
                e.preventDefault();
                const d = -e.deltaY * 0.001;
                window.state.canvas.scale = Math.min(Math.max(0.1, window.state.canvas.scale + d), 3);
                window.app.canvas.applyTransform();
            },
            zoom: (d) => { window.state.canvas.scale = Math.min(Math.max(0.1, window.state.canvas.scale + d), 3); window.app.canvas.applyTransform(); },
            fitView: () => { window.state.canvas.scale = window.innerWidth < 768 ? 0.8 : 1; window.state.canvas.offsetX = 0; window.state.canvas.offsetY = 0; window.app.canvas.applyTransform(); },
            startDrag: (e, id) => {
                window.state.canvas.draggedNodeId = id;
                const c = window.app.canvas.getCoords(e);
                window.state.canvas.lastX = c.x; window.state.canvas.lastY = c.y;
                if (!window.state.selectedNodeIds.includes(id)) {
                    if (!e.shiftKey) window.state.selectedNodeIds = [];
                    window.state.selectedNodeIds.push(id);
                    document.querySelectorAll('.node-card').forEach(el => el.classList.remove('selected-node'));
                    window.state.selectedNodeIds.forEach(i => { const el = document.getElementById(`node-${i}`); if(el) el.classList.add('selected-node'); });
                }
            },
            toggleHeatmap: () => { window.state.canvas.isHeatmapMode = !window.state.canvas.isHeatmapMode; window.ui.renderCanvas(); },
            toggleCluster: () => {
                const isCluster = !window.state.canvas.isClusterMode; window.state.canvas.isClusterMode = isCluster;
                const nodes = window.state.nodes.filter(n => n.topicId === window.state.currentTopicId);
                if (isCluster) {
                    const clusterGroups = { 'A': [], 'B': [], 'C': [], 'Other': [] };
                    nodes.forEach(n => { if (window.CLUSTER_CENTERS[n.cluster]) clusterGroups[n.cluster].push(n); else clusterGroups['Other'].push(n); });
                    const targets = []; const nodeW = 320; const nodeH = 200; 
                    Object.entries(clusterGroups).forEach(([key, groupNodes]) => {
                        const center = window.CLUSTER_CENTERS[key] || {x: 0, y: 0, width: 1000, height: 1000};
                        const cols = Math.max(1, Math.floor(center.width / nodeW));
                        groupNodes.forEach((n, idx) => {
                            if (n.savedX === undefined) { n.savedX = n.x; n.savedY = n.y; }
                            const col = idx % cols; const row = Math.floor(idx / cols);
                            const startX = center.x - ((cols * nodeW) / 2) + (nodeW / 2);
                            const startY = center.y - (center.height / 2) + 100; 
                            targets.push({ id: n.id, x: startX + (col * nodeW), y: startY + (row * nodeH) });
                        });
                    });
                    window.app.canvas.animateNodes(targets);
                } else {
                    const targets = nodes.map(n => ({ id: n.id, x: n.savedX !== undefined ? n.savedX : n.x, y: n.savedY !== undefined ? n.savedY : n.y }));
                    window.app.canvas.animateNodes(targets);
                }
                window.ui.renderCanvas();
            },
            animateNodes: (targets) => {
                const startPositions = {}; const nodes = window.state.nodes.filter(n => n.topicId === window.state.currentTopicId);
                nodes.forEach(n => { startPositions[n.id] = {x: n.x, y: n.y}; });
                const duration = 800; const startTime = performance.now(); window.state.canvas.isAnimating = true;
                const animate = (time) => {
                    const elapsed = time - startTime; const progress = Math.min(elapsed / duration, 1);
                    const ease = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
                    targets.forEach(target => {
                        const node = nodes.find(n => n.id === target.id);
                        if (node) {
                            const start = startPositions[target.id]; node.x = start.x + (target.x - start.x) * ease; node.y = start.y + (target.y - start.y) * ease;
                            const el = document.getElementById(`node-${node.id}`); if (el) { el.style.left = `${node.x}px`; el.style.top = `${node.y}px`; }
                        }
                    });
                    if (progress < 1) { requestAnimationFrame(animate); } 
                    else { 
                        window.state.canvas.isAnimating = false; 
                        targets.forEach(target => { const node = nodes.find(n => n.id === target.id); if(node) { node.x = target.x; node.y = target.y; } });

                </div>
                <div class="flex gap-2 pointer-events-auto">
                    <button onclick="window.app.canvas.toggleHeatmap()" id="btn-heatmap" class="${window.state.canvas.isHeatmapMode ? 'bg-orange-100 text-orange-600 border-orange-200' : 'bg-white/90 text-slate-500 border-slate-200'} backdrop-blur shadow-sm border rounded-lg px-3 py-1 text-xs font-bold flex items-center gap-1 transition-all hover:scale-105"><i class="fa-solid fa-fire ${window.state.canvas.isHeatmapMode ? 'animate-pulse' : ''}"></i> <span class="text-[10px] md:text-xs">潛力熱點</span></button>
                    <button onclick="window.app.canvas.toggleCluster()" id="btn-cluster" class="${window.state.canvas.isClusterMode ? 'bg-purple-100 text-purple-600 border-purple-200' : 'bg-white/90 text-slate-500 border-slate-200'} backdrop-blur shadow-sm border rounded-lg px-3 py-1 text-xs font-bold flex items-center gap-1 transition-all hover:scale-105"><i class="fa-solid fa-sparkles ${window.state.canvas.isClusterMode ? 'text-purple-500' : ''}"></i> <span class="text-[10px] md:text-xs">語意聚類</span></button>
                    <div class="bg-white/90 backdrop-blur shadow-sm border rounded-lg p-1 flex">
                        <button onclick="window.app.canvas.fitView()" class="w-8 h-8 flex items-center justify-center hover:bg-slate-100"><i class="fa-solid fa-expand"></i></button>
                        <button onclick="window.app.canvas.zoom(0.1)" class="w-8 h-8 flex items-center justify-center hover:bg-slate-100 hidden md:flex"><i class="fa-solid fa-plus"></i></button>
                        <button onclick="window.app.canvas.zoom(-0.1)" class="w-8 h-8 flex items-center justify-center hover:bg-slate-100 hidden md:flex"><i class="fa-solid fa-minus"></i></button>
                    </div>
                </div>
            </div>
            
            <div class="absolute bottom-20 md:bottom-6 left-1/2 transform -translate-x-1/2 z-40 pointer-events-auto transition-all duration-300">
                <button onclick="window.app.canvas.toggleMode()" class="${modeClass} pointer-events-auto cursor-pointer px-4 py-2 rounded-full shadow-md flex items-center gap-2 text-sm font-bold transition-all duration-300 hover:scale-105 active:scale-95">
                    ${modeIcon} <span>${modeLabel}</span>
                </button>
            </div>

            <div class="absolute bottom-20 right-4 md:bottom-8 md:right-8 z-40"> 
                 <button onclick="window.app.openComposer(null)" class="bg-indigo-600 text-white rounded-full w-12 h-12 md:w-14 md:h-14 shadow-xl flex items-center justify-center text-xl transition transform hover:scale-105"><i class="fa-solid fa-plus"></i></button>
            </div>
            
            <div class="hidden md:block absolute bottom-24 left-4 md:bottom-8 md:left-24 z-30 pointer-events-none">
                <div class="bg-white/80 backdrop-blur-sm border border-slate-200 p-3 rounded-lg shadow-sm text-xs text-slate-600 pointer-events-auto space-y-1">
                    <h4 class="font-bold text-slate-700 mb-1 flex items-center gap-1"><i class="fa-solid fa-circle-question text-indigo-500"></i> 操作指南</h4>
                    <div class="flex items-center justify-between gap-3"><span class="bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded text-[10px] font-mono text-slate-500">左鍵拖曳</span> <span>框選範圍</span></div>
                    <div class="flex items-center justify-between gap-3"><span class="bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded text-[10px] font-mono text-slate-500">Ctrl + 拖曳</span> <span>移動畫布</span></div>
                    <div class="flex items-center justify-between gap-3"><span class="bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded text-[10px] font-mono text-slate-500">捲軸拖曳</span> <span>巨型地圖移動</span></div>
                    <div class="flex items-center justify-between gap-3"><span class="bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded text-[10px] font-mono text-slate-500">滾輪</span> <span>縮放視角</span></div>
                </div>
            </div>

            <div id="canvas-wrapper" class="w-full h-full overflow-hidden relative touch-none noselect"  
                 style="cursor: ${isPanMode ? 'grab' : 'default'}"
                 ondblclick="window.app.canvas.handleDoubleClick(event)"
                 onmousedown="window.app.canvas.startPan(event)" 
                 ontouchstart="window.app.canvas.startPan(event)" 
                 onmousemove="window.app.canvas.pan(event)" 
                 ontouchmove="window.app.canvas.pan(event)" 
                 onwheel="window.app.canvas.handleWheel(event)">
                <div id="canvas-bg"></div>
                <div id="canvas-content" class="absolute top-0 left-0 w-full h-full origin-top-left will-change-transform">
                    <div id="cluster-labels-layer" class="absolute top-0 left-0 w-full h-full pointer-events-none z-0 transition-opacity duration-500 opacity-0"></div>
                    <svg id="connections-layer" class="absolute top-0 left-0 w-[50000px] h-[10000px] pointer-events-none overflow-visible z-0"></svg>
                    <div id="nodes-layer" class="z-10"></div>
                </div>
                
                <!-- 🔥 [ADDED] Canvas Scrollbars -->
                <div id="scrollbar-v-track" class="canvas-scrollbar-track">
                    <div id="scrollbar-v-thumb" class="canvas-scrollbar-thumb"></div>
                </div>
                <div id="scrollbar-h-track" class="canvas-scrollbar-track">
                    <div id="scrollbar-h-thumb" class="canvas-scrollbar-thumb"></div>
                </div>
            </div>`;
            
            if (window.state.canvas.isClusterMode) {
                const labelLayer = document.getElementById('cluster-labels-layer');
                if (labelLayer) {
                    labelLayer.innerHTML = Object.values(window.CLUSTER_CENTERS).map(c => `<div class="cluster-zone" style="left: ${c.x - c.width/2}px; top: ${c.y - c.height/2}px; width: ${c.width}px; height: ${c.height}px;"><div class="cluster-title">${c.title}</div></div>`).join('');
                    labelLayer.classList.remove('opacity-0'); labelLayer.style.opacity = '1';
                }
            }

            window.ui.drawNodes(nodes);
            setTimeout(() => window.ui.drawConnections(nodes), 0);
            window.app.canvas.applyTransform();
        };

        window.ui.renderProfile = () => {
            const container = document.getElementById('app-container');
            const u = window.state.user;
            container.innerHTML = `
            <div class="max-w-2xl mx-auto px-6 py-8 h-full overflow-y-auto custom-scroll pb-24">
                <div class="bg-gradient-to-br from-indigo-50 to-white rounded-2xl p-6 shadow-sm border border-indigo-100 text-center mb-6 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 via-purple-500 to-indigo-500"></div>
                    <img src="${u.avatar}" class="w-20 h-20 rounded-full mx-auto mb-3 border-4 border-white shadow-md">
                    <h2 class="text-2xl font-bold text-slate-800">${u.name}</h2>
                    <p class="text-slate-500 text-sm mb-1">${u.role === window.ROLES.LEAD ? '首席研究員' : '協同研究員'}</p>
                    <div class="flex justify-center gap-2 mt-4">
                        <span class="bg-white/80 border px-3 py-1 rounded-full text-xs font-bold text-slate-600 shadow-sm">ID: ${u.id}</span>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <h3 class="font-bold text-lg flex items-center gap-2"><i class="fa-solid fa-robot text-indigo-600"></i> 我的知識建構檔案 (KB Profile)</h3>
                        <button onclick="window.app.generateAIProfile()" id="btn-gen-profile" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-700 transition flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> <span>生成分析</span>
                        </button>
                    </div>
                    <div id="ai-loading" class="hidden p-8 text-center bg-white rounded-2xl border border-slate-100">
                        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mb-2"></div>
                        <p class="text-sm text-slate-500 animate-pulse">正在回顧你的知識演化軌跡...</p>
                    </div>
                    <div id="ai-profile-result" class="hidden space-y-4"></div>
                </div>
            </div>`;
            if (window.state.profile && document.getElementById('ai-profile-result')) { window.ui.renderProfileContent(window.state.profile); }
        };

        window.ui.renderProfileContent = (data) => {
            const result = document.getElementById('ai-profile-result');
            result.innerHTML = `
            <div class="animate-fade-in bg-white p-5 rounded-xl shadow-sm border-l-4 border-indigo-500 relative overflow-hidden">
                <div class="absolute right-0 top-0 opacity-5 transform translate-x-4 -translate-y-4"><i class="fa-solid ${data.icon} text-9xl text-indigo-900"></i></div>
                <h4 class="text-sm font-bold text-indigo-500 uppercase tracking-wider mb-3 flex items-center gap-2"><i class="fa-solid fa-fire"></i> 使用者知識角色</h4>
                <div class="relative z-10">
                    <p class="text-xl font-bold text-slate-800 mb-2">${data.role}</p>
                    <p class="text-sm text-slate-600 leading-relaxed">${data.desc}</p>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="animate-fade-in bg-white p-5 rounded-xl shadow-sm border-l-4 border-green-500" style="animation-delay: 0.1s">
                    <h4 class="text-sm font-bold text-green-600 uppercase tracking-wider mb-4 flex items-center gap-2"><i class="fa-solid fa-seedling"></i> 想法演化軌跡</h4>
                    <div class="pl-2">${data.trajectoryHTML}</div>
                </div>
                <div class="animate-fade-in bg-white p-5 rounded-xl shadow-sm border-l-4 border-blue-500" style="animation-delay: 0.2s">
                    <h4 class="text-sm font-bold text-blue-600 uppercase tracking-wider mb-4 flex items-center gap-2"><i class="fa-solid fa-puzzle-piece"></i> 社群推動力</h4>
                    ${data.communityHTML}
                </div>
            </div>
            <div class="animate-fade-in bg-white p-5 rounded-xl shadow-sm border-l-4 border-purple-500" style="animation-delay: 0.3s">
                <h4 class="text-sm font-bold text-purple-600 uppercase tracking-wider mb-4 flex items-center gap-2"><i class="fa-solid fa-chart-pie"></i> 知識建構策略分佈</h4>
                <p class="text-xs text-slate-500 mb-4">這顯示了你在知識建構過程中所使用的認知策略多樣性 (Idea Diversity)：</p>
                <div class="grid grid-cols-1 gap-2">${data.statsHTML}</div>
            </div>`;
            result.classList.remove('hidden');
        };

        window.ui.drawNodes = (nodes) => {
            document.getElementById('nodes-layer').innerHTML = nodes.map(node => {
                const s = window.SCAFFOLDS[node.type];
                const user = Object.values(window.state.userList).find(u => u.id === node.author) || {name: '?'};
                const canDel = window.state.user.role === window.ROLES.LEAD || node.author === window.state.user.id;
                
                // 🔥 [MODIFIED] Only truly high promisingness gets the heatmap badge
                const isPromising = window.state.canvas.isHeatmapMode && node.promisingness > 70;
                const heatmapClass = isPromising ? 'promising-node' : '';
                const flameBadge = isPromising ? `<div class="absolute -top-3 -right-2 bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full flex items-center gap-1 shadow-sm animate-bounce-slow z-50"><i class="fa-solid fa-fire"></i> 熱點</div>` : '';
                
                const isSelected = window.state.selectedNodeIds.includes(node.id) ? 'selected-node' : '';
                return `
                <div id="node-${node.id}" class="absolute node-card w-64 md:w-72 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-visible ${heatmapClass} ${isSelected}" style="left: ${node.x}px; top: ${node.y}px;" onmousedown="event.stopPropagation(); window.app.canvas.startDrag(event, '${node.id}')" ontouchstart="event.stopPropagation(); window.app.canvas.startDrag(event, '${node.id}')" ondblclick="event.stopPropagation(); window.app.openNodeDetail('${node.id}')">
                    ${flameBadge}
                    <div class="px-3 py-2 ${s.bgSoft} border-b ${s.border} flex justify-between items-center cursor-move rounded-t-xl">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 rounded-full ${s.color} text-white flex justify-center items-center text-xs"><i class="fa-solid ${s.icon}"></i></span>
                            <span class="text-xs font-bold ${s.text}">${s.label}</span>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="event.stopPropagation(); window.app.openNodeDetail('${node.id}')" class="w-8 h-8 rounded hover:bg-white/50 text-slate-500 flex justify-center items-center"><i class="fa-solid fa-eye"></i></button>
                            <button onclick="event.stopPropagation(); window.app.openComposer('${node.id}')" class="w-8 h-8 rounded hover:bg-white/50 text-slate-500 flex justify-center items-center"><i class="fa-solid fa-reply"></i></button>
                            ${canDel ? `<button onclick="event.stopPropagation(); window.app.deleteNode('${node.id}')" class="w-8 h-8 rounded hover:bg-white/50 text-slate-500 hover:text-red-500 flex justify-center items-center"><i class="fa-solid fa-xmark"></i></button>` : ''}
                        </div>
                    </div>
                    <div class="p-3 text-sm text-slate-700 leading-relaxed min-h-[60px] pointer-events-none bg-white">
                        <h4 class="font-bold mb-1 text-slate-900 block truncate text-base">${node.title || '無標題'}</h4>
                        <p class="line-clamp-2 text-slate-600">${node.content}</p>
                    </div>
                    <div class="px-3 py-2 bg-slate-50 border-t flex justify-between text-[10px] text-slate-500 items-center rounded-b-xl">
                        <div class="flex items-center gap-2">
                            <img src="${user.avatar}" class="w-4 h-4 rounded-full">
                            <span>${user.name}</span>
                        </div>
                        <span>${new Date(node.date).toLocaleDateString()}</span>
                    </div>
                </div>`;
            }).join('');
        };
        window.ui.drawConnections = (nodes) => { 
            const layer = document.getElementById('connections-layer'); if(!layer) return;
            layer.innerHTML = `<defs>${Object.keys(window.SCAFFOLDS).map(k => { const c = { question: '#3b82f6', extend: '#eab308', improve: '#22c55e', counter: '#ef4444', riseabove: '#a855f7' }[k]; return `<marker id="arrow-${k}" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="${c}" /></marker>`; }).join('')}</defs>`;
            const cardWidth = window.innerWidth < 768 ? 256 : 288; const halfW = cardWidth / 2;
            const paths = nodes.filter(n => n.parentId).map(node => {
                const parent = window.state.nodes.find(p => p.id === node.parentId); if (!parent) return '';
                const startX = parent.x + halfW; const startY = parent.y + 140; const endX = node.x + halfW; const endY = node.y;
                const dist = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                let curveFactor = 0.4; if (endY < startY) curveFactor = 0.6; 
                const cp1x = startX; const cp1y = startY + dist * curveFactor; const cp2x = endX; const cp2y = endY - dist * curveFactor;
                const colorMap = { question: '#3b82f6', extend: '#eab308', improve: '#22c55e', counter: '#ef4444', riseabove: '#a855f7' };
                return `<path d="M ${startX} ${startY} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${endY}" stroke="${colorMap[node.type]}" fill="none" stroke-width="2" stroke-opacity="0.6" marker-end="url(#arrow-${node.type})" />`;
            }).join('');
            layer.innerHTML += paths;
        };

        window.addEventListener('DOMContentLoaded', () => { if (window.ui && typeof window.ui.init === 'function') { window.ui.init(); } else { console.error("UI Init failed"); } });
    </script>
</body>
</html>
