                { id: 'g2-w7-4', topicId: 't-g2', type: 'counter', title: '但如果只講四步', content: '但如果只講四步，又好像把很多討論壓太 扁。像恢復時間、提醒分級、邊界案例，這些也都是我們後來才長出來的重要東西。', author: 'u21', x: 14350, y: 350, parentId: 'g2-w7-3', date: dates.w7+3000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w7-5', topicId: 't-g2', type: 'buildon', title: '也許可以把它變成『四步判讀 + 一個', content: '也許可以把它變成『四步判讀 + 一個原則』。那個原則就是：不把所有變化都直接翻成危險。這 樣比較能保留我們這七週最大的修正。', author: 'u21', x: 14700, y: 350, parentId: 'g2-w7-4', date: dates.w7+4000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w7-6', topicId: 't-g2', type: 'improve', title: '我還想在最後加一句：系統不是取代照護', content: '我還想在最後加一句：系統不是取代照護者，而是幫照 護者先過濾風險。這樣比較符合我們整組最後的理解，也比較不會把 AI 說得太神。', author: 'u21', x: 15050, y: 350, parentId: 'g2-w7-5', date: dates.w7+5000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w7-7', topicId: 't-g2', type: 'riseabove', title: '我們這七週真正建構出來的', content: '我們這七週真正建構出來的，不是一組更敏感的警報器，而是一個『以可信度為前提、以基 線為基礎、以情境為解釋、以風險為目的』的居家判讀模型。這是我們從做系統走到做研究最明顯的轉變。', author: 'u21', x: 15400, y: 350, parentId: 'g2-w7-6', date: dates.w7+6000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g2-w7-8', topicId: 't-g2', type: 'buildon', title: '如果回頭看', content: '如果回頭看，我覺得我們最後建起來的不是一個更會叫的系統，而是一個比較知道 什麼時候該講、什麼時候先別太武斷的系統。', author: 'u21', x: 15750, y: 350, parentId: 'g2-w7-7', date: dates.w7+7000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w7-9', topicId: 't-g2', type: 'question', title: '如果要回頭看', content: '如果要回頭看，我覺得自己變最多的是，現在看到結果不會第一時間只問『有沒有成功』。那你 們覺得我們最後最能拿出來說服別人的證據是什麼？', author: 'u22', x: 13650, y: 150, parentId: 'g2-w7-1', date: dates.w7+8000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w7-10', topicId: 't-g2', type: 'buildon', title: '對我來說', content: '對我來說，最有說服力的不是單一漂亮 數據，而是我們能說清楚為什麼以前容易誤報、現在為什麼比較不容易。這種前後差異，比單純展示功能 更有力。', author: 'u22', x: 14000, y: 150, parentId: 'g2-w7-9', date: dates.w7+9000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w7-11', topicId: 't-g2', type: 'improve', title: '我想把我們的成果整理成：舊邏輯容易把', content: '我想把我們的成果整理成：舊邏輯容易把所有偏離都當異常；新邏輯會先檢查訊號品質、情境 和基線，再決定提醒。這樣評審也比較容易看懂我們改了什麼。', author: 'u22', x: 14350, y: 150, parentId: 'g2-w7-10', date: dates.w7+10000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w7-12', topicId: 't-g2', type: 'counter', title: '不過我們也要誠實說', content: '不過我們也要誠實說，目前還 是有做不到的地方。像真的很亂的環境、訊號很差的時候，系統還是很難判。我覺得把這些講出來，反而更 像真的研究。', author: 'u22', x: 14700, y: 150, parentId: 'g2-w7-11', date: dates.w7+11000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w7-13', topicId: 't-g2', type: 'buildon', title: '如果要用一句比較白話的話', content: '如果要用一句比較白話的話，我會說：我們不是把系統做得更會叫，而是讓它比較不會亂叫。 這句其實很生活化，但很符合我們這組。', author: 'u22', x: 15050, y: 150, parentId: 'g2-w7-12', date: dates.w7+12000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w7-14', topicId: 't-g2', type: 'riseabove', title: '我現在覺得第二組最有價值的地方', content: '我現在覺得第二組最有價值的地方，是我們把『非 接觸監測』往前推成『可被信任的非接觸判讀』。這中間差的不是硬體而已，而是整個思考方式。', author: 'u22', x: 15400, y: 150, parentId: 'g2-w7-13', date: dates.w7+13000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g2-w7-15', topicId: 't-g2', type: 'buildon', title: '我現在會把第二組的進步講成：我們不是', content: '我現在會把第二組的進步講成：我們不是把數值做得更漂亮，而是把判斷做得比較 有根據。', author: 'u22', x: 15750, y: 150, parentId: 'g2-w7-14', date: dates.w7+14000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w7-16', topicId: 't-g2', type: 'question', title: '如果最後要讓家屬記得一件事', content: '如果最後要讓家屬記得一件事，我希望不是記住某個數值，而是記住我們為什麼一直在講『不 能只看數值』。你們覺得這要怎麼說會最清楚？', author: 'u23', x: 13650, y: 550, parentId: 'g2-w7-1', date: dates.w7+15000, cluster: 'A', promisingness: 55 },
                { id: 'g2-w7-17', topicId: 't-g2', type: 'buildon', title: '我會想說', content: '我會想說，因為人活在生活裡，不是活在表格 裡。同樣的呼吸、同樣的動作，在不同時間、不同身體狀態、不同環境裡，意思都可能不一樣。', author: 'u23', x: 14000, y: 550, parentId: 'g2-w7-16', date: dates.w7+16000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w7-18', topicId: 't-g2', type: 'improve', title: '所以我們最後其實是在替家屬把那個『生', content: '所以我們最後其實是在替家屬把那個『生活裡很難一下看懂的變化』先做第一層整理。不是替 他們做所有決定，而是把最需要注意的部分先挑出來。', author: 'u23', x: 14350, y: 550, parentId: 'g2-w7-17', date: dates.w7+17000, cluster: 'B', promisingness: 68 },
                { id: 'g2-w7-19', topicId: 't-g2', type: 'counter', title: '但我也覺得不能把 AI 講得太像貼心', content: '但我也覺得不能把 AI 講得太像貼心照 護者。因為它還是有看不懂的地方，也有判斷不準的時候。這些邊界如果不講，最後受影響的還是使用者。', author: 'u23', x: 14700, y: 550, parentId: 'g2-w7-18', date: dates.w7+18000, cluster: 'A', promisingness: 63 },
                { id: 'g2-w7-20', topicId: 't-g2', type: 'buildon', title: '我很喜歡我們最後一直回到『信任』這件', content: '我很喜歡我們最後一直回到『信任』這件事。因為照護系統如果不被信任，就算功能很多也沒有 用。相反地，就算它沒有全能，但只要判得比較合理，人就比較敢用。', author: 'u23', x: 15050, y: 550, parentId: 'g2-w7-19', date: dates.w7+19000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w7-21', topicId: 't-g2', type: 'riseabove', title: '我會把第二組這七週 的收穫講成：我們', content: '我會把第二組這七週 的收穫講成：我們不是把居家照護變成一直被監控，而是試著把科技變成一個比較懂生活、也比較懂分寸 的提醒者。這樣才真的有可能讓人安心。', author: 'u23', x: 15400, y: 550, parentId: 'g2-w7-20', date: dates.w7+20000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g2-w7-22', topicId: 't-g2', type: 'buildon', title: '如果用比較白話的方式講', content: '如果用比較白話的方式講，我覺得第二組最後是在做一個『比較懂生活，也比較懂 分寸』的提醒系統。', author: 'u23', x: 15750, y: 550, parentId: 'g2-w7-21', date: dates.w7+21000, cluster: 'B', promisingness: 60 },
                { id: 'g2-w7-ra', topicId: 't-g2', type: 'riseabove', title: 'W7 小結：第二組第七週最後收成的是一個可信、可', content: '第二組第七週最後收成的是一個可信、可被理解、也比較能被信任的居家判讀模型。', author: 'u21', x: 16100, y: 350, parentId: 'g2-w7-22', date: dates.w7+22000, cluster: 'C', promisingness: 95 }, // 熱點
                // --- G3 Week 1 (Base X: 100) ---
                { id: 'g3-w1-1', topicId: 't-g3', type: 'question', title: '我們以前有點太快相信 AI 了', content: '我現在越想越覺得，我們以前有點太快相信 AI 了。像它看到呼吸有變化、活動怪怪的，就很 容易往異常想，可是毛小孩本來就很常一下衝來衝去、一下又趴著不動。那它現在到底是在看懂狀態，還 是只是在抓『跟剛剛不一樣』？', author: 'u31', x: 100, y: 350, parentId: null, date: dates.w1, cluster: 'A', promisingness: 55 },
                { id: 'g3-w1-2', topicId: 't-g3', type: 'buildon', title: '如果只是抓到不一樣', content: '如果只是抓到不一樣，那很多正常行為也會被誤會。像剛玩完、 看到飼主回家太興奮、吃完東西在整理自己，這些都可能讓數值跟姿態變掉。', author: 'u31', x: 450, y: 350, parentId: 'g3-w1-1', date: dates.w1+1000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w1-3', topicId: 't-g3', type: 'improve', title: '我覺得我們這週先不要急著想怎麼讓系統', content: '我覺得我們這週先不要急著想怎麼讓系統更敏感，而是先列出『最容易被 AI 誤解成異常的正 常情況』。這樣後面才知道要防哪種誤判。', author: 'u31', x: 800, y: 350, parentId: 'g3-w1-2', date: dates.w1+2000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w1-4', topicId: 't-g3', type: 'counter', title: '但也不能因為怕誤判', content: '但也不能因為怕誤判，就把所有變化都當沒事。因為 有些真的有狀況，一開始也只是看起來怪怪的而已。所以不是不要判，而是不能判太快。', author: 'u31', x: 1150, y: 350, parentId: 'g3-w1-3', date: dates.w1+3000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w1-5', topicId: 't-g3', type: 'buildon', title: '我現在比較想把問題改成：什麼樣的變化', content: '我現在比較想把問題改成：什麼樣的變化，才值得被當成需要再追蹤的訊號？這樣比直接問有 沒有異常更像真的在做研究。', author: 'u31', x: 1500, y: 350, parentId: 'g3-w1-4', date: dates.w1+4000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w1-6', topicId: 't-g3', type: 'buildon', title: '我現在雖然還沒有完全講得很準', content: '我現在雖然還沒有完全講得很準，但我開始覺得第三組真正麻煩的地方，是 AI 很 容易把『看起來有變化』直接翻成『有問題』。', author: 'u31', x: 1850, y: 350, parentId: 'g3-w1-5', date: dates.w1+5000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w1-7', topicId: 't-g3', type: 'question', title: '我覺得最麻煩的是', content: '我覺得最麻煩的是，毛小孩又不會自己開口說『我現在只是很嗨』。所以如果 AI 只看數字， 真的超容易搞錯吧？同樣是喘，有可能是熱、有可能是累，也有可能是真的不舒服。', author: 'u32', x: 450, y: 150, parentId: 'g3-w1-1', date: dates.w1+6000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w1-8', topicId: 't-g3', type: 'buildon', title: '接安桀的', content: '接安桀的， 我覺得我們之前太像把毛小孩當成『小型病人』在看，可是牠其實有很多自己的生活節奏。像睡一睡突然換 姿勢、聽到聲音站起來看一下，這種都很正常。', author: 'u32', x: 800, y: 150, parentId: 'g3-w1-7', date: dates.w1+7000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w1-9', topicId: 't-g3', type: 'improve', title: '我們可不可以先從『最像異常但其實很常', content: '我們可不可以先從『最像異常但其實很常發生』的情境開始收？因為這種最容易讓系統看起來 很忙，但其實沒幫到主人。', author: 'u32', x: 1150, y: 150, parentId: 'g3-w1-8', date: dates.w1+8000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w1-10', topicId: 't-g3', type: 'counter', title: '不過我也要反過來講', content: '不過我也要反過來講，如果我們都用『牠本來就這樣』帶過，可能又 會漏掉真的有問題的訊號。尤其毛小孩很會撐，有時候不舒服不會表現得很明顯。', author: 'u32', x: 1500, y: 150, parentId: 'g3-w1-9', date: dates.w1+9000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w1-11', topicId: 't-g3', type: 'buildon', title: '所以我覺得我們這組不是在做一個會抓病', content: '所以我覺得我們這組不是在做一個會抓病的東西，而是在做一個比較不會亂誤會牠的系統。這 個方向我覺得比較對。', author: 'u32', x: 1850, y: 150, parentId: 'g3-w1-10', date: dates.w1+10000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w1-12', topicId: 't-g3', type: 'buildon', title: '如果站在主人角度', content: '如果站在主人角度，我覺得最怕的不是 AI 沒看到，而是它很有把握地看錯。因為 那種錯比較容易讓人直接信。', author: 'u32', x: 2200, y: 150, parentId: 'g3-w1-11', date: dates.w1+11000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w1-13', topicId: 't-g3', type: 'question', title: '我有在想', content: '我有在想，會不會有些不是毛小孩狀態真的變了，而是感測本身就被毛、姿勢、角度或距離影 響？如果資料一開始就偏掉，我們後面再怎麼判也可能是錯的。', author: 'u33', x: 450, y: 550, parentId: 'g3-w1-1', date: dates.w1+12000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w1-14', topicId: 't-g3', type: 'buildon', title: '例如牠側躺、縮成一團、毛比 較厚', content: '例如牠側躺、縮成一團、毛比 較厚，感測到的東西可能本來就不一樣。這樣看來，我們不能只看輸出結果，還要回頭看量測條件。', author: 'u33', x: 800, y: 550, parentId: 'g3-w1-13', date: dates.w1+13000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w1-15', topicId: 't-g3', type: 'improve', title: '我建議這週開始把每次量到的情況都加註', content: '我建議這週開始把每次量到的情況都加註記，例如站著、趴著、睡著、剛活動完、距離大概多 少。這樣我們之後比較知道哪種狀況最容易亂。', author: 'u33', x: 1150, y: 550, parentId: 'g3-w1-14', date: dates.w1+14000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w1-16', topicId: 't-g3', type: 'counter', title: '但如果每次都記很多', content: '但如果每次都記很多，又會很花時間。所以可 能要先抓最關鍵幾項，不然資料雖然多，最後也不一定整理得動。', author: 'u33', x: 1500, y: 550, parentId: 'g3-w1-15', date: dates.w1+15000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w1-17', topicId: 't-g3', type: 'buildon', title: '我會一直回到資料入口', content: '我會一直回到資料入口，因為如果一開始毛、姿勢、角度就讓訊號飄掉，後面判得 再漂亮也可能沒有意義。', author: 'u33', x: 1850, y: 550, parentId: 'g3-w1-16', date: dates.w1+16000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w1-18', topicId: 't-g3', type: 'question', title: '我覺得我們現在真正要問的', content: '我覺得我們現在真正要問的，不是『能不能量到』，而是『量到之後能不能合理解釋』。如果這件 事做不到，其實系統再多功能也只是看起來厲害。', author: 'u34', x: 450, y: 850, parentId: 'g3-w1-1', date: dates.w1+17000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w1-19', topicId: 't-g3', type: 'buildon', title: '我比較同意先把問題撐開', content: '我比較同意先把問題撐開，因為我們現在知 道太快下結論很危險。先把哪些正常情況最容易被誤判找出來，後面才知道要怎麼設判準。', author: 'u34', x: 800, y: 850, parentId: 'g3-w1-18', date: dates.w1+18000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w1-20', topicId: 't-g3', type: 'improve', title: '我建議本週先不追求結論', content: '我建議本週先不追求結論，先整理成兩欄：一欄是『真的可能危險』，一欄是『看起來像危險但可 能只是生活狀態』。這樣比較清楚。', author: 'u34', x: 1150, y: 850, parentId: 'g3-w1-19', date: dates.w1+19000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w1-21', topicId: 't-g3', type: 'counter', title: '但兩欄中間一定會有灰色區', content: '但兩欄中間一定會有灰色區，這也是我們後面真正該處理的 地方。因為最難的通常不是最明顯的兩端，而是中間那些講不準的情況。', author: 'u34', x: 1500, y: 850, parentId: 'g3-w1-20', date: dates.w1+20000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w1-22', topicId: 't-g3', type: 'buildon', title: '我開始覺得我們真正要處理的是『詮釋』', content: '我開始覺得我們真正要處理的是『詮釋』，不是只有『量測』。因為量得到不代表知道 那代表什麼。', author: 'u34', x: 1850, y: 850, parentId: 'g3-w1-21', date: dates.w1+21000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w1-ra', topicId: 't-g3', type: 'riseabove', title: 'W1 小結：第三組第一週先把『有變化』和『真的看', content: '第三組第一週先把『有變化』和『真的看懂』拆開，開始懷疑 AI 可能只是抓到不一樣，卻還沒', author: 'u31', x: 2550, y: 475, parentId: 'g3-w1-22', date: dates.w1+22000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G3 Week 2 (Base X: 2300) ---
                { id: 'g3-w2-1', topicId: 't-g3', type: 'question', title: '如果每隻毛小孩本來的活動量、個性、作 (W2 主節點)', content: '如果每隻毛小孩本來的活動量、個性、作息都不一樣，那我們是不是不能一直想著找『全體通 用門檻』？因為有的本來就超嗨，有的本來就懶得動。', author: 'u31', x: 2300, y: 350, parentId: 'g3-w1-ra', date: dates.w2, cluster: 'A', promisingness: 75 },
                { id: 'g3-w2-2', topicId: 't-g3', type: 'buildon', title: '我現在越來越覺得', content: '我現在越來越覺得，先知道這隻毛小孩 平常長什麼樣，比急著判牠有沒有異常更重要。因為沒有平常的參考，很多變化根本不知道算大還算小。', author: 'u31', x: 2650, y: 350, parentId: 'g3-w2-1', date: dates.w2+1000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w2-3', topicId: 't-g3', type: 'improve', title: '可不可以先幫每隻毛小孩建立一個基本狀', content: '可不可以先幫每隻毛小孩建立一個基本狀態？像平常安靜時大概怎樣、剛玩完會怎樣、準備睡 覺時又怎樣。這樣比較像在看『這隻』，不是看一個平均值。', author: 'u31', x: 3000, y: 350, parentId: 'g3-w2-2', date: dates.w2+2000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w2-4', topicId: 't-g3', type: 'counter', title: '但基線也不是記一次就好', content: '但基線也不是記一次就好，牠今天 跟明天可能又不一樣。所以我覺得基線比較像範圍，不是一條死線。', author: 'u31', x: 3350, y: 350, parentId: 'g3-w2-3', date: dates.w2+3000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w2-5', topicId: 't-g3', type: 'buildon', title: '這樣看來', content: '這樣看來，我們後面收資料時，『當下在做什麼』這件事應該跟數值一樣重要。', author: 'u31', x: 3700, y: 350, parentId: 'g3-w2-4', date: dates.w2+4000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w2-6', topicId: 't-g3', type: 'buildon', title: '我現在比較傾向先看『這一隻平常怎樣』', content: '我現在比較傾向先看『這一隻平常怎樣』，再去看今天哪裡不一樣。這樣比較不像把 所有毛小孩都塞進同一個模板。', author: 'u31', x: 4050, y: 350, parentId: 'g3-w2-5', date: dates.w2+5000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w2-7', topicId: 't-g3', type: 'question', title: '像有些狗看到主人拿牽繩就已經先興奮到', content: '像有些狗看到主人拿牽繩就已經先興奮到不行了，那這種時候 AI 如果只看到呼吸變快，會不 會就太容易想太多？', author: 'u32', x: 2650, y: 150, parentId: 'g3-w2-1', date: dates.w2+6000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w2-8', topicId: 't-g3', type: 'buildon', title: '我覺得毛小孩最麻煩的地方就是', content: '我覺得毛小孩最麻煩的地方就是，牠不是一直很固定。人至少還會配合量 測，牠想動就動、想滾就滾，所以情境真的不能省。', author: 'u32', x: 3000, y: 150, parentId: 'g3-w2-7', date: dates.w2+7000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w2-9', topicId: 't-g3', type: 'improve', title: '我們後面是不是可以先分幾種最常見情境', content: '我們後面是不是可以先分幾種最常見情境：睡覺、剛起來、玩完、被聲音吸引、吃飯前後。先抓 這些大的，會比全部混在一起好很多。', author: 'u32', x: 3350, y: 150, parentId: 'g3-w2-8', date: dates.w2+8000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w2-10', topicId: 't-g3', type: 'counter', title: '不過也不是分完情境就沒事', content: '不過也不是分完情境就沒事，因為同樣是玩完，有的恢 復很快，有的恢復很慢。可能還是要再加時間這個因素。', author: 'u32', x: 3700, y: 150, parentId: 'g3-w2-9', date: dates.w2+9000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w2-11', topicId: 't-g3', type: 'buildon', title: '我開始覺得我們不是在做『看數值』', content: '我開始覺得我們不是在做『看數值』，而是在做『看毛小孩的生活節奏』。這個差很多。', author: 'u32', x: 4050, y: 150, parentId: 'g3-w2-10', date: dates.w2+10000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w2-12', topicId: 't-g3', type: 'buildon', title: '像平常很活潑的', content: '像平常很活潑的，跟本來就懶洋洋的，用同一條線看真的很怪。這種差異不補進去 ，後面一定一直誤判。', author: 'u32', x: 4400, y: 150, parentId: 'g3-w2-11', date: dates.w2+11000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w2-13', topicId: 't-g3', type: 'question', title: '如果要建立基線', content: '如果要建立基線，那量測條件是不是也得盡量一致？不然今天近一點、明天遠一點，最後看到 的差異可能不全是牠本身造成的。', author: 'u33', x: 2650, y: 550, parentId: 'g3-w2-1', date: dates.w2+12000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w2-14', topicId: 't-g3', type: 'buildon', title: '所以我覺得個體差異跟量測條件其實要一', content: '所以我覺得個體差異跟量測條件其實要一起看。不能只說這 隻平常就這樣，還要確認我們是不是用差不多的方式在看牠。', author: 'u33', x: 3000, y: 550, parentId: 'g3-w2-13', date: dates.w2+13000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w2-15', topicId: 't-g3', type: 'improve', title: '我提議把會明顯影響資料的條件先列成固', content: '我提議把會明顯影響資料的條件先列成固定記錄欄，像距離、姿態、活動前後、環境干擾。這樣 我們比較不會後面才發現資料根本不能直接比。', author: 'u33', x: 3350, y: 550, parentId: 'g3-w2-14', date: dates.w2+14000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w2-16', topicId: 't-g3', type: 'counter', title: '但如果條件都要很一致', content: '但如果條件都要很一致，現實上家裡又做不 到。所以我們最後可能還是得接受有些變動存在，再想辦法判斷哪些變動影響最大。', author: 'u33', x: 3700, y: 550, parentId: 'g3-w2-15', date: dates.w2+15000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w2-17', topicId: 't-g3', type: 'buildon', title: '也就是說', content: '也就是說，我們不是要把居家環境變成實驗室，而是要知道在居家環境裡，哪些差異值得被認 真看待。', author: 'u33', x: 4050, y: 550, parentId: 'g3-w2-16', date: dates.w2+16000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w2-18', topicId: 't-g3', type: 'buildon', title: '我還是會回到量測條件', content: '我還是會回到量測條件，因為今天近一點、明天遠一點，最後看到的差異不一定都 是毛小孩自己造成的。', author: 'u33', x: 4400, y: 550, parentId: 'g3-w2-17', date: dates.w2+17000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w2-19', topicId: 't-g3', type: 'question', title: '如果我們已經知道不能用單一門檻', content: '如果我們已經知道不能用單一門檻，那後面系統判斷是不是也要從『直接判異常』，改成『先比 對這隻平常狀態』？', author: 'u34', x: 2650, y: 850, parentId: 'g3-w2-1', date: dates.w2+18000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w2-20', topicId: 't-g3', type: 'buildon', title: '我覺得這樣比較合理', content: '我覺得這樣比較合理，因為我們現在最怕的就是系統把正常但活潑的毛小 孩，一直當成高風險。', author: 'u34', x: 3000, y: 850, parentId: 'g3-w2-19', date: dates.w2+19000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w2-21', topicId: 't-g3', type: 'improve', title: '也許我們可以先把問題寫得更清楚：不是', content: '也許我們可以先把問題寫得更清楚：不是問『牠現在有沒有異常』，而是問『牠現在有沒有偏離 自己平常的狀態，而且這個偏離沒有合理情境能解釋』。', author: 'u34', x: 3350, y: 850, parentId: 'g3-w2-20', date: dates.w2+20000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w2-22', topicId: 't-g3', type: 'counter', title: '不過這樣一改', content: '不過這樣一改，系統邏輯會變複雜很 多。所以後面我們還是得取捨，先抓最關鍵的幾個條件，不然會變成概念很完整，但做不出來。', author: 'u34', x: 3700, y: 850, parentId: 'g3-w2-21', date: dates.w2+21000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w2-23', topicId: 't-g3', type: 'riseabove', title: '我覺得我們這週最大的進展', content: '我覺得我們這週最大的進展，是從『所有毛小孩共用一條線』，慢慢改成『先理解這一隻平常 怎樣，再去看牠現在哪裡不對』。這比較像可信判讀的開始。', author: 'u34', x: 4050, y: 850, parentId: 'g3-w2-22', date: dates.w2+22000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w2-24', topicId: 't-g3', type: 'buildon', title: '如果系統先比對『這隻平常怎樣』', content: '如果系統先比對『這隻平常怎樣』，後面判異常才比較有根，不然很像一開始就在亂 猜。', author: 'u34', x: 4400, y: 850, parentId: 'g3-w2-23', date: dates.w2+23000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w2-ra', topicId: 't-g3', type: 'riseabove', title: 'W2 小結：第三組第二週把『異常』放回每一隻毛小', content: '第三組第二週把『異常』放回每一隻毛小孩自己的生活節奏與量測條件，開始建立個體基線', author: 'u31', x: 4750, y: 475, parentId: 'g3-w2-24', date: dates.w2+24000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G3 Week 3 (Base X: 4500) ---
                { id: 'g3-w3-1', topicId: 't-g3', type: 'question', title: '如果我們現在要先挑幾個最重要的變數 (W3 主節點)', content: '如果我們現在要先挑幾個最重要的變數，你們覺得第一個該抓哪個？我自己現在很卡在『姿 態/活動狀態』跟『感測位置或 ROI』這兩個，因為這兩個都很容易直接影響判讀。', author: 'u31', x: 4500, y: 350, parentId: 'g3-w2-ra', date: dates.w3, cluster: 'A', promisingness: 75 },
                { id: 'g3-w3-2', topicId: 't-g3', type: 'buildon', title: '我傾向先抓姿 態和活動狀態', content: '我傾向先抓姿 態和活動狀態，因為牠只要一轉身、縮起來或突然站起來，看到的東西就差很多。這種變化如果沒先搞清 楚，後面很容易把生活動作當異常。', author: 'u31', x: 4850, y: 350, parentId: 'g3-w3-1', date: dates.w3+1000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-3', topicId: 't-g3', type: 'counter', title: '但宏渝之前講的 ROI 我也覺得很關', content: '但宏渝之前講的 ROI 我也覺得很關鍵。因為如果框的區域不穩，前面那些討論可能都是在錯 的基礎上判。', author: 'u31', x: 5200, y: 350, parentId: 'g3-w3-2', date: dates.w3+2000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w3-4', topicId: 't-g3', type: 'improve', title: '不然我們把問題拆兩層：第一層先確認『', content: '不然我們把問題拆兩層：第一層先確認『看哪裡才合理』，第二層再討論『看到的變 化代表什麼』。這樣比較不會全部混在一起。', author: 'u31', x: 5550, y: 350, parentId: 'g3-w3-3', date: dates.w3+3000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w3-5', topicId: 't-g3', type: 'buildon', title: '如果照這樣', content: '如果照這樣，第三組後面就可以先做 ROI 穩定度，再做姿態和狀態對數值的影響。這樣感覺路 線比較清楚。', author: 'u31', x: 5900, y: 350, parentId: 'g3-w3-4', date: dates.w3+4000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-6', topicId: 't-g3', type: 'riseabove', title: '我覺得我們這週開始有進到研究味了', content: '我覺得我們這週開始有進到研究味了。因為我們不再只是丟很多可能性，而 是開始決定哪些變數值得先被理解，哪些可以先放後面。', author: 'u31', x: 6250, y: 350, parentId: 'g3-w3-5', date: dates.w3+5000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w3-7', topicId: 't-g3', type: 'buildon', title: '我現在比較想先把問題壓到最核心', content: '我現在比較想先把問題壓到最核心，不然第三組很容易每個點都很有道理，最後反 而不知道先追哪個。', author: 'u31', x: 6600, y: 350, parentId: 'g3-w3-6', date: dates.w3+6000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-8', topicId: 't-g3', type: 'question', title: '我覺得主人真正想知道的不是所有數值', content: '我覺得主人真正想知道的不是所有數值，而是『牠現在看起來怪，是不是要擔心』。那這樣的話 ，什麼變數最接近主人會在意的那種怪？', author: 'u32', x: 4850, y: 150, parentId: 'g3-w3-1', date: dates.w3+7000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w3-9', topicId: 't-g3', type: 'buildon', title: '我覺得恢復速度可能很重要', content: '我覺得恢復速度可能很重要。因為有些當下看起來很 喘很亂，其實一下就恢復；但如果拖很久都回不來，那感覺就比較值得注意。', author: 'u32', x: 5200, y: 150, parentId: 'g3-w3-8', date: dates.w3+8000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-10', topicId: 't-g3', type: 'counter', title: '可是如果我們都等恢復速度', content: '可是如果我們都等恢復速度，會不會有些事情反而太晚知道？有些危險可能就是需要早一點 被看到。', author: 'u32', x: 5550, y: 150, parentId: 'g3-w3-9', date: dates.w3+9000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w3-11', topicId: 't-g3', type: 'improve', title: '也許可以分成『當下變化』跟『後續恢復', content: '也許可以分成『當下變化』跟『後續恢復』兩個層次。一開始先記到變化，再看它有沒有 持續或變更糟。', author: 'u32', x: 5900, y: 150, parentId: 'g3-w3-10', date: dates.w3+10000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w3-12', topicId: 't-g3', type: 'buildon', title: '這樣就不會把每個瞬間都直接判死刑', content: '這樣就不會把每個瞬間都直接判死刑，也不會完全放掉後面慢慢變嚴重的狀況。', author: 'u32', x: 6250, y: 150, parentId: 'g3-w3-11', date: dates.w3+11000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-13', topicId: 't-g3', type: 'buildon', title: '我覺得第三組很適合做這種分層判斷', content: '我覺得第三組很適合做這種分層判斷，因為我們現在越來越不是看單點，而是看一整段狀態。', author: 'u32', x: 6600, y: 150, parentId: 'g3-w3-12', date: dates.w3+12000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-14', topicId: 't-g3', type: 'buildon', title: '我其實會一直想：主人最後真正想知道的', content: '我其實會一直想：主人最後真正想知道的是什麼。我覺得不是全部數值，而是『這個 怪，有沒有必要現在就緊張』。', author: 'u32', x: 6950, y: 150, parentId: 'g3-w3-13', date: dates.w3+13000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-15', topicId: 't-g3', type: 'question', title: '如果 ROI 沒抓穩', content: '如果 ROI 沒抓穩，那姿態、恢復速度這些後面判讀會不會都被拖累？我現在真的覺得，資料 可信度這件事不能一直放後面。', author: 'u33', x: 4850, y: 550, parentId: 'g3-w3-1', date: dates.w3+14000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w3-16', topicId: 't-g3', type: 'buildon', title: '像毛比較厚、光線、距離、身體遮擋', content: '像毛比較厚、光線、距離、身體遮擋，這些都可能讓 ROI 不穩。 不是因為毛小孩有問題，而是我們看到的區域本來就在晃。', author: 'u33', x: 5200, y: 550, parentId: 'g3-w3-15', date: dates.w3+15000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-17', topicId: 't-g3', type: 'improve', title: '我建議之後每次記錄都先標『本次 RO', content: '我建議之後每次記錄都先標『本次 ROI/訊號品質是否穩定』，不然後面討論異常時，可能其實 是在討論雜訊。', author: 'u33', x: 5550, y: 550, parentId: 'g3-w3-16', date: dates.w3+16000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w3-18', topicId: 't-g3', type: 'counter', title: '但如果太依賴『穩定才算』', content: '但如果太依賴『穩定才算』，又會變成系統只能在理想條件下用。居家環境不可 能每次都完美，所以我們還是要想不穩時能做到多少。', author: 'u33', x: 5900, y: 550, parentId: 'g3-w3-17', date: dates.w3+17000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w3-19', topicId: 't-g3', type: 'buildon', title: '也許可以先定義哪種程度叫『可接受的不', content: '也許可以先定義哪種程度叫『可接受的不穩』。不是要求完全不晃，而是知道晃到哪裡之後就不 能太相信。', author: 'u33', x: 6250, y: 550, parentId: 'g3-w3-18', date: dates.w3+18000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-20', topicId: 't-g3', type: 'riseabove', title: '我現在比較清楚了：第三組不是只在做生', content: '我現在比較清楚了：第三組不是只在做生命體徵偵測，而是在建立『什麼條件下 ，這些偵測才值得被相信』。', author: 'u33', x: 6600, y: 550, parentId: 'g3-w3-19', date: dates.w3+19000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w3-21', topicId: 't-g3', type: 'buildon', title: '如果 ROI 沒穩住', content: '如果 ROI 沒穩住，我會很難放心往後判。因為那很像入口就已經歪了，後面怎麼解 釋都可能不太對。', author: 'u33', x: 6950, y: 550, parentId: 'g3-w3-20', date: dates.w3+20000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-22', topicId: 't-g3', type: 'question', title: '如果我們要把變數排優先順序', content: '如果我們要把變數排優先順序，我覺得可以先看哪個最常讓結果失真、哪個最影響後續判讀。 這樣比單純覺得重要更有依據。', author: 'u34', x: 4850, y: 850, parentId: 'g3-w3-1', date: dates.w3+21000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w3-23', topicId: 't-g3', type: 'buildon', title: '目前看起來', content: '目前看起來，ROI 穩定、姿態/活動狀態、恢復時間，這三個最 有機會變成核心。因為它們一個管資料入口、一個管情境理解、一個管風險持續性。', author: 'u34', x: 5200, y: 850, parentId: 'g3-w3-22', date: dates.w3+22000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-24', topicId: 't-g3', type: 'improve', title: '我建議這週先不要全部展開', content: '我建議這週先不要全部展開，先把這三個定成主線。後面每次討論都回來看是不是在補這三個 ，而不是又飄掉。', author: 'u34', x: 5550, y: 850, parentId: 'g3-w3-23', date: dates.w3+23000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w3-25', topicId: 't-g3', type: 'counter', title: '因為我們這組很容易想到很多東西', content: '因為我們這組很容易想到很多東西，優點是快，缺點是散。所以現在最重要的 不是再多想，而是敢刪。', author: 'u34', x: 5900, y: 850, parentId: 'g3-w3-24', date: dates.w3+24000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w3-26', topicId: 't-g3', type: 'riseabove', title: '我覺得第三組這週最值得留下來的一句話', content: '我覺得第三組這週最值得留下來的一句話是：不是所有能量到的都值得判，不是所有變化 都值得怕，真正重要的是找出哪些變化在可信條件下還持續不對。', author: 'u34', x: 6250, y: 850, parentId: 'g3-w3-25', date: dates.w3+25000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w3-27', topicId: 't-g3', type: 'buildon', title: '第三組這週最重要的其實是敢刪', content: '第三組這週最重要的其實是敢刪，因為不刪，大家的想法都很好，卻不會變成真正 能研究的主線。', author: 'u34', x: 6600, y: 850, parentId: 'g3-w3-26', date: dates.w3+26000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w3-ra', topicId: 't-g3', type: 'riseabove', title: 'W3 小結：第三組第三週開始明顯聚焦：不是再一直', content: '第三組第三週開始明顯聚焦：不是再一直加想法，而是挑出 ROI、姿態、恢復時間、資料可信', author: 'u31', x: 7300, y: 475, parentId: 'g3-w3-27', date: dates.w3+27000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G3 Week 4 (Base X: 6700) ---
                { id: 'g3-w4-1', topicId: 't-g3', type: 'question', title: '如果今天數值有變、姿態也怪 (W4 主節點)', content: '如果今天數值有變、姿態也怪，可是 ROI 剛好又不穩，這種我們到底能不能判？我現在越來 越覺得，『看到異常』跟『有資格說它異常』是兩回事。', author: 'u31', x: 6700, y: 350, parentId: 'g3-w3-ra', date: dates.w4, cluster: 'A', promisingness: 75 },
                { id: 'g3-w4-2', topicId: 't-g3', type: 'buildon', title: '我覺得要先過一個可信度門檻', content: '我覺得要先過一個可信度門檻。也就是說 ，資料本身都不穩的情況下，我們最多只能說『值得再看』，不能直接講異常。', author: 'u31', x: 7050, y: 350, parentId: 'g3-w4-1', date: dates.w4+1000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-3', topicId: 't-g3', type: 'counter', title: '但如果每次都先等到很穩才判', content: '但如果每次都先等到很穩才判，有些事情又可能錯過。所以可信度也不一定是非黑即白，可能 要分等級。', author: 'u31', x: 7400, y: 350, parentId: 'g3-w4-2', date: dates.w4+2000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w4-4', topicId: 't-g3', type: 'improve', title: '我提議可以先分三層：資料不夠穩', content: '我提議可以先分三層：資料不夠穩，只能觀察；資料夠穩但情境可解釋，先追蹤；資 料夠穩而且偏離基線又沒合理解釋，才往高風險推。', author: 'u31', x: 7750, y: 350, parentId: 'g3-w4-3', date: dates.w4+3000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w4-5', topicId: 't-g3', type: 'buildon', title: '這樣一來', content: '這樣一來，我們就不是在硬判正常/異常，而是在做一種比較像人會做的分層判斷。 【Rise Above】 我覺得第三組現在真正要建立的是『可信異常』這個概念。不是只要有變就叫異常，而是資料可信、 情境說不通、偏離還持續，這種才值得被認真對待。', author: 'u31', x: 8100, y: 350, parentId: 'g3-w4-4', date: dates.w4+4000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-6', topicId: 't-g3', type: 'buildon', title: '我現在開始覺得真正異常不是『有變』', content: '我現在開始覺得真正異常不是『有變』，而是『這個變化放回情境後，還是沒辦法合 理解釋』。', author: 'u31', x: 8450, y: 350, parentId: 'g3-w4-5', date: dates.w4+5000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-7', topicId: 't-g3', type: 'question', title: '其實主人最怕的應該不是系統偶爾沒反應', content: '其實主人最怕的應該不是系統偶爾沒反應，而是它一直亂反應。因為亂久了，真的有事時大家 反而不信。那這是不是代表『可信』比『敏感』更重要？', author: 'u32', x: 7050, y: 150, parentId: 'g3-w4-1', date: dates.w4+6000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w4-8', topicId: 't-g3', type: 'buildon', title: '我很認同安桀講的分層', content: '我很認同安桀講的分層。因為現實生活不 是所有事都一秒鐘判清楚，有些本來就只能先觀察一下。', author: 'u32', x: 7400, y: 150, parentId: 'g3-w4-7', date: dates.w4+7000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-9', topicId: 't-g3', type: 'counter', title: '不過如果我們太強調可信', content: '不過如果我們太強調可信，也可能會變得太保守。像有些真的危險，可能就是先從一點怪怪的 開始。', author: 'u32', x: 7750, y: 150, parentId: 'g3-w4-8', date: dates.w4+8000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w4-10', topicId: 't-g3', type: 'improve', title: '也許可以把『需要觀察』這件事本身就當', content: '也許可以把『需要觀察』這件事本身就當成一種提醒，不是只有高風險才通知。只是通知 的語氣和強度要不同。', author: 'u32', x: 8100, y: 150, parentId: 'g3-w4-9', date: dates.w4+9000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w4-11', topicId: 't-g3', type: 'buildon', title: '這樣主人就不會只有『沒事』跟『出事』', content: '這樣主人就不會只有『沒事』跟『出事』兩種感覺，而是知道現在是先留意，還是真的要處理。', author: 'u32', x: 8450, y: 150, parentId: 'g3-w4-10', date: dates.w4+10000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-12', topicId: 't-g3', type: 'riseabove', title: '我現在覺得第三組不是在做一個神準預言', content: '我現在覺得第三組不是在做一個神準預言機，而是在做一個比較有分寸的判讀者。會知道什 麼時候該講重話，什麼時候只該提醒。', author: 'u32', x: 8800, y: 150, parentId: 'g3-w4-11', date: dates.w4+11000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w4-13', topicId: 't-g3', type: 'buildon', title: '我開始比較在意『可信』這件事', content: '我開始比較在意『可信』這件事，因為一直亂叫真的很傷主人對系統的耐心。', author: 'u32', x: 9150, y: 150, parentId: 'g3-w4-12', date: dates.w4+12000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-14', topicId: 't-g3', type: 'question', title: '如果要做可信度分級', content: '如果要做可信度分級，那我們是不是也得把會影響可信度的條件講清楚？不然最後又只是憑 感覺說這筆比較穩。', author: 'u33', x: 7050, y: 550, parentId: 'g3-w4-1', date: dates.w4+13000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w4-15', topicId: 't-g3', type: 'buildon', title: '像 ROI 是否穩、距離是否偏掉、姿', content: '像 ROI 是否穩、距離是否偏掉、姿態是否遮擋、動作是否太大，這些其實 都可以當成可信度的判斷依據。', author: 'u33', x: 7400, y: 550, parentId: 'g3-w4-14', date: dates.w4+14000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-16', topicId: 't-g3', type: 'improve', title: '我建議之後我們每次討論一筆資料時', content: '我建議之後我們每次討論一筆資料時，都先回答三件事：看哪裡、看得穩不穩、穩了之後看到 了什麼。這樣討論會乾淨很多。', author: 'u33', x: 7750, y: 550, parentId: 'g3-w4-15', date: dates.w4+15000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w4-17', topicId: 't-g3', type: 'counter', title: '但如果每次都這樣走流程', content: '但如果每次都這樣走流程，會不會討論變很慢？有時候大家就 是會想直接跳到結果。', author: 'u33', x: 8100, y: 550, parentId: 'g3-w4-16', date: dates.w4+16000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w4-18', topicId: 't-g3', type: 'buildon', title: '不過也正因為我們以前太常直接跳結果', content: '不過也正因為我們以前太常直接跳結果，才會一直誤會。現在花這個時間，我覺得反而是在省 後面一直重來的時間。', author: 'u33', x: 8450, y: 550, parentId: 'g3-w4-17', date: dates.w4+17000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-19', topicId: 't-g3', type: 'riseabove', title: '我覺得資料可信度不是附加條件', content: '我覺得資料可信度不是附加條件，而是整個判讀的入口。入口沒過， 後面再漂亮都不該講太滿。', author: 'u33', x: 8800, y: 550, parentId: 'g3-w4-18', date: dates.w4+18000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w4-20', topicId: 't-g3', type: 'buildon', title: '如果要做可信度分級', content: '如果要做可信度分級，我覺得一定要把會讓資料變得不可靠的條件先講清楚，不然 最後還是很像憑感覺。', author: 'u33', x: 9150, y: 550, parentId: 'g3-w4-19', date: dates.w4+19000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-21', topicId: 't-g3', type: 'question', title: '如果要把這些討論變成系統邏輯', content: '如果要把這些討論變成系統邏輯，那是不是可以先做一個簡單流程：先看資料品質，再看偏離 基線，再看情境能不能解釋，最後才決定提醒層級？', author: 'u34', x: 7050, y: 850, parentId: 'g3-w4-1', date: dates.w4+20000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w4-22', topicId: 't-g3', type: 'buildon', title: '我覺得這個流程已經比一開始成熟很多', content: '我覺得這個流程已經比一開始成熟很多， 因為它不是直接把單一變化翻成危險，而是先過幾道判斷。', author: 'u34', x: 7400, y: 850, parentId: 'g3-w4-21', date: dates.w4+21000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-23', topicId: 't-g3', type: 'counter', title: '但流程太長也可能不好用', content: '但流程太長也可能不好用，所以後面一定還要再壓縮。不是每個條件都做滿，而是保留最有用 的幾個。', author: 'u34', x: 7750, y: 850, parentId: 'g3-w4-22', date: dates.w4+22000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w4-24', topicId: 't-g3', type: 'improve', title: '也許我們可以先把每個條件的重要性排一', content: '也許我們可以先把每個條件的重要性排一下，之後真的做系統時就優先保留最核心 的。', author: 'u34', x: 8100, y: 850, parentId: 'g3-w4-23', date: dates.w4+23000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w4-25', topicId: 't-g3', type: 'buildon', title: '目前我會排：資料品質、姿態/情境、偏', content: '目前我會排：資料品質、姿態/情境、偏離基線、持續時間。這四個最像我們這七週一直在長出 來的骨架。', author: 'u34', x: 8450, y: 850, parentId: 'g3-w4-24', date: dates.w4+24000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-26', topicId: 't-g3', type: 'riseabove', title: '如果要用一句話講', content: '如果要用一句話講，我會說：第三組不是在做『看見異常』，而是在做『把可疑變 化一步一步篩成可信異常』。', author: 'u34', x: 8800, y: 850, parentId: 'g3-w4-25', date: dates.w4+25000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w4-27', topicId: 't-g3', type: 'buildon', title: '如果回到我們前面一直在修的問題', content: '如果回到我們前面一直在修的問題，我會覺得這週是在把想法壓成一個流程，而不 是再多長幾個概念。', author: 'u34', x: 9150, y: 850, parentId: 'g3-w4-26', date: dates.w4+26000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w4-ra', topicId: 't-g3', type: 'riseabove', title: 'W4 小結：第三組第四週正式建立『可信異常』這個', content: '第三組第四週正式建立『可信異常』這個觀念：不是看到變化就算異常，而是要先過資料可信', author: 'u31', x: 9500, y: 475, parentId: 'g3-w4-27', date: dates.w4+27000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G3 Week 5 (Base X: 8900) ---
                { id: 'g3-w5-1', topicId: 't-g3', type: 'question', title: '如果前面我們都已經講到資料品質、情境 (W5 主節點)', content: '如果前面我們都已經講到資料品質、情境、基線、持續時間了，那系統最後到底要怎麼把這些 合在一起？總不能討論很完整，做的時候又回到單一條件。', author: 'u31', x: 8900, y: 350, parentId: 'g3-w4-ra', date: dates.w5, cluster: 'A', promisingness: 75 },
                { id: 'g3-w5-2', topicId: 't-g3', type: 'buildon', title: '我現在想的是', content: '我現在想的是，先讓系統判斷『這 筆資料能不能信』，再判斷『是不是偏離平常』，最後才判斷『需不需要提醒主人』。這樣層次比較清楚。', author: 'u31', x: 9250, y: 350, parentId: 'g3-w5-1', date: dates.w5+1000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w5-3', topicId: 't-g3', type: 'counter', title: '但如果每一步都做很細', content: '但如果每一步都做很細，系統可能會太重。尤其我們專題時間有限，不可能把所有情境都做 滿。', author: 'u31', x: 9600, y: 350, parentId: 'g3-w5-2', date: dates.w5+2000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w5-4', topicId: 't-g3', type: 'improve', title: '所以我們可能要先抓最常見、最會誤判的', content: '所以我們可能要先抓最常見、最會誤判的幾種情況，讓流程先解決那些。先把大問題壓下 來，比全部都做一點點好。', author: 'u31', x: 9950, y: 350, parentId: 'g3-w5-3', date: dates.w5+3000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w5-5', topicId: 't-g3', type: 'buildon', title: '像睡覺翻身、突然起身、剛玩完這三種', content: '像睡覺翻身、突然起身、剛玩完這三種，就很適合先做。因為它們真的很容易把判讀搞亂。', author: 'u31', x: 10300, y: 350, parentId: 'g3-w5-4', date: dates.w5+4000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w5-6', topicId: 't-g3', type: 'improve', title: '我想把第三組的邏輯畫成流程圖：輸入資', content: '我想把第三組的邏輯畫成流程圖：輸入資料 → 檢查可信度 → 比對基線/情境 → 判斷追蹤或提 醒。這樣我們比較知道自己現在真的在做什麼。', author: 'u31', x: 10650, y: 350, parentId: 'g3-w5-5', date: dates.w5+5000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w5-7', topicId: 't-g3', type: 'riseabove', title: '我覺得我們現在的進步很明顯：以前像是', content: '我覺得我們現在的進步很明顯：以前像是拿感測器直接對生活下判決，現在比較像先理解 生活，再讓系統學著不要太武斷。', author: 'u31', x: 11000, y: 350, parentId: 'g3-w5-6', date: dates.w5+6000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w5-8', topicId: 't-g3', type: 'buildon', title: '我現在的想法是', content: '我現在的想法是，第三組真正要做的不是把條件一直疊上去，而是把『判斷順序』講 清楚。', author: 'u31', x: 11350, y: 350, parentId: 'g3-w5-7', date: dates.w5+7000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w5-9', topicId: 't-g3', type: 'question', title: '如果主人最後收到提醒', content: '如果主人最後收到提醒，他最需要看到的是什麼？是數值、是危險等級，還是『為什麼系統會 這樣想』？我覺得這個也會影響信不信它。', author: 'u32', x: 9250, y: 150, parentId: 'g3-w5-1', date: dates.w5+8000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w5-10', topicId: 't-g3', type: 'buildon', title: '我覺得至少要讓人知道不是亂跳', content: '我覺得至少要讓人知道不是亂跳。像『目前資料穩 定』『持續偏離平常』『當下不是活動後』，這種簡單理由其實很有用。', author: 'u32', x: 9600, y: 150, parentId: 'g3-w5-9', date: dates.w5+9000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w5-11', topicId: 't-g3', type: 'counter', title: '但如果理由講太多', content: '但如果理由講太多，又會變得很像機器在自言自語，主人可能也懶得看。', author: 'u32', x: 9950, y: 150, parentId: 'g3-w5-10', date: dates.w5+10000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w5-12', topicId: 't-g3', type: 'improve', title: '也許第一 層先講簡單判斷', content: '也許第一 層先講簡單判斷，第二層才放依據。這樣一般人不會被嚇到，想看細節的人也看得到。', author: 'u32', x: 10300, y: 150, parentId: 'g3-w5-11', date: dates.w5+11000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w5-13', topicId: 't-g3', type: 'buildon', title: '我覺得這很像我們現在整組的方向：不是', content: '我覺得這很像我們現在整組的方向：不是一直炫功能，而是讓主人慢慢覺得『這個系統講話有 道理』。', author: 'u32', x: 10650, y: 150, parentId: 'g3-w5-12', date: dates.w5+12000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w5-14', topicId: 't-g3', type: 'improve', title: '還有提醒也可以分級', content: '還有提醒也可以分級。不是所有情況都用同一種方式跳出來，不然真的很快就被當背 景音。', author: 'u32', x: 11000, y: 150, parentId: 'g3-w5-13', date: dates.w5+13000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w5-15', topicId: 't-g3', type: 'riseabove', title: '我會把第三組現在的方向講成：我們不是', content: '我會把第三組現在的方向講成：我們不是要系統什麼都管，而是讓它在真的值得出聲的時 候，能比較有根據地出聲。', author: 'u32', x: 11350, y: 150, parentId: 'g3-w5-14', date: dates.w5+14000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w5-16', topicId: 't-g3', type: 'buildon', title: '我會一直想到主人收到提醒那一刻', content: '我會一直想到主人收到提醒那一刻，他需要的不是一堆術語，而是『你現在為什麼 這樣判』。', author: 'u32', x: 11700, y: 150, parentId: 'g3-w5-15', date: dates.w5+15000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w5-17', topicId: 't-g3', type: 'question', title: '如果流程要做出來', content: '如果流程要做出來，那資料品質這關要怎麼量化？總不能只靠我們自己看覺得穩不穩。', author: 'u33', x: 9250, y: 550, parentId: 'g3-w5-1', date: dates.w5+16000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w5-18', topicId: 't-g3', type: 'buildon', title: '也許可以先用比較簡單的方式', content: '也許可以先用比較簡單的方式，例如 ROI 偏移程度、連續訊號穩定性、明顯遮擋與否。先不用太 複雜，但至少有依據。', author: 'u33', x: 9600, y: 550, parentId: 'g3-w5-17', date: dates.w5+17000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w5-19', topicId: 't-g3', type: 'counter', title: '不過量化太細也有可能做不完', content: '不過量化太細也有可能做不完，所以我覺得先抓最明顯、最常出問題的幾個指標就好。', author: 'u33', x: 9950, y: 550, parentId: 'g3-w5-18', date: dates.w5+18000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w5-20', topicId: 't-g3', type: 'improve', title: '後面我們可以把錯誤也反過來用', content: '後面我們可以把錯誤也反過來用。只要某類錯常常出現在某種條件下，那那個條件就應該被拉 進可信度判斷。', author: 'u33', x: 10300, y: 550, parentId: 'g3-w5-19', date: dates.w5+19000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w5-21', topicId: 't-g3', type: 'buildon', title: '這樣等於系統邏輯不是憑空設的', content: '這樣等於系統邏輯不是憑空設的，而是從我們一直撞到的問題裡慢慢長出來。', author: 'u33', x: 10650, y: 550, parentId: 'g3-w5-20', date: dates.w5+20000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w5-22', topicId: 't-g3', type: 'riseabove', title: '我覺得第三組的系統邏輯', content: '我覺得第三組的系統邏輯，應該不是『先有模型再找資料』，而是『先從資料和失敗看出規律，再把規律變成 模型』。', author: 'u33', x: 11000, y: 550, parentId: 'g3-w5-21', date: dates.w5+21000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w5-23', topicId: 't-g3', type: 'buildon', title: '如果要把資料品質真的放進系統邏輯', content: '如果要把資料品質真的放進系統邏輯，我覺得至少要先有幾個很明顯的判斷點，不 然會太虛。', author: 'u33', x: 11350, y: 550, parentId: 'g3-w5-22', date: dates.w5+22000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w5-24', topicId: 't-g3', type: 'question', title: '如果我們要把流程壓成真正能做的版本', content: '如果我們要把流程壓成真正能做的版本，那哪些步驟是一定不能拿掉的？', author: 'u34', x: 9250, y: 850, parentId: 'g3-w5-1', date: dates.w5+23000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w5-25', topicId: 't-g3', type: 'buildon', title: '我覺得 最少要保留三個：資料品質、偏', content: '我覺得 最少要保留三個：資料品質、偏離基線、情境解釋。持續時間可以看情況加進去，但前三個幾乎是骨架。', author: 'u34', x: 9600, y: 850, parentId: 'g3-w5-24', date: dates.w5+24000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w5-26', topicId: 't-g3', type: 'counter', title: '如果連這三個都想省', content: '如果連這三個都想省，那最後很可能又回到最早那種『看到變化就叫』的系統。那我們這幾週等 於白長。', author: 'u34', x: 9950, y: 850, parentId: 'g3-w5-25', date: dates.w5+25000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w5-27', topicId: 't-g3', type: 'improve', title: '所以我建議流程先簡', content: '所以我建議流程先簡，但不能空。寧可少做幾個花的功能，也不要把真正關鍵的判準 丟掉。', author: 'u34', x: 10300, y: 850, parentId: 'g3-w5-26', date: dates.w5+26000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w5-28', topicId: 't-g3', type: 'riseabove', title: '如果要用一句最精簡的話說第三組現在的', content: '如果要用一句最精簡的話說第三組現在的系統，我會說：它不是更敏感，而是更會判斷自己 什麼時候該相信眼前看到的東西。', author: 'u34', x: 10650, y: 850, parentId: 'g3-w5-27', date: dates.w5+27000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w5-29', topicId: 't-g3', type: 'buildon', title: '我的想法是', content: '我的想法是，系統最後不需要看起來什麼都懂，但一定要知道自己什麼時候該保 守。', author: 'u34', x: 11000, y: 850, parentId: 'g3-w5-28', date: dates.w5+28000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w5-ra', topicId: 't-g3', type: 'riseabove', title: 'W5 小結：第三組第五週把前面的判準推成系統邏輯', content: '第三組第五週把前面的判準推成系統邏輯，從『會偵測』進一步走到『比較會判斷自己什麼時', author: 'u31', x: 12050, y: 475, parentId: 'g3-w5-29', date: dates.w5+29000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G3 Week 6 (Base X: 11100) ---
                { id: 'g3-w6-1', topicId: 't-g3', type: 'question', title: '如果系統這次又判錯 (W6 主節點)', content: '如果系統這次又判錯，我們到底要怎麼看它？以前我們很容易直接說『不準』，但現在我覺得 每一種錯背後原因都不一樣。', author: 'u31', x: 11100, y: 350, parentId: 'g3-w5-ra', date: dates.w6, cluster: 'A', promisingness: 75 },
                { id: 'g3-w6-2', topicId: 't-g3', type: 'buildon', title: '有些錯是因為資料不夠穩', content: '有些錯是因為資料不夠穩，有些是情境沒判進去，有些是基線根 本還不夠完整。把它們都叫不準，其實什麼都學不到。', author: 'u31', x: 11450, y: 350, parentId: 'g3-w6-1', date: dates.w6+1000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w6-3', topicId: 't-g3', type: 'improve', title: '我覺得我們可以開始幫錯誤分類', content: '我覺得我們可以開始幫錯誤分類。至少分成：資料入口問題、生活情境誤讀、持續時間沒算、提 醒門檻太直。這樣每種錯才知道往哪裡修。', author: 'u31', x: 11800, y: 350, parentId: 'g3-w6-2', date: dates.w6+2000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w6-4', topicId: 't-g3', type: 'counter', title: '但分類不是越多越厲害', content: '但分類不是越多越厲害，重點是分完之後真的能 改。所以分類要能回到實際決策，不是做漂亮名詞而已。', author: 'u31', x: 12150, y: 350, parentId: 'g3-w6-3', date: dates.w6+3000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w6-5', topicId: 't-g3', type: 'buildon', title: '我現在反而覺得', content: '我現在反而覺得，專題做到這裡最值錢的不是完全沒錯，而是我們知道它在哪些情況下會錯。 這樣才有邊界。', author: 'u31', x: 12500, y: 350, parentId: 'g3-w6-4', date: dates.w6+4000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w6-6', topicId: 't-g3', type: 'improve', title: '後面展示結果時', content: '後面展示結果時，我想把成功案例跟失效案例一起放。因為只有放成功，別人 看不出我們真的有在理解系統。', author: 'u31', x: 12850, y: 350, parentId: 'g3-w6-5', date: dates.w6+5000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w6-7', topicId: 't-g3', type: 'riseabove', title: '我覺得第三組現在已經不是在追求『零錯', content: '我覺得第三組現在已經不是在追求『零錯誤』，而是在建立『可解釋的錯誤』。只要錯誤能被 解釋、能被定位，它就不只是失敗，而是知識。', author: 'u31', x: 13200, y: 350, parentId: 'g3-w6-6', date: dates.w6+6000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w6-8', topicId: 't-g3', type: 'buildon', title: '這週最重要的不是再去遮錯', content: '這週最重要的不是再去遮錯，而是承認錯誤真的在幫我們看清楚哪一塊邏輯還太 快。', author: 'u31', x: 13550, y: 350, parentId: 'g3-w6-7', date: dates.w6+7000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w6-9', topicId: 't-g3', type: 'question', title: '我最近越來越覺得', content: '我最近越來越覺得，主人其實不會期待系統百分之百神準，但他會期待系統不要在最不該亂 叫的地方亂叫。那這是不是代表，有些錯比別的錯更傷信任？', author: 'u32', x: 11450, y: 150, parentId: 'g3-w6-1', date: dates.w6+8000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w6-10', topicId: 't-g3', type: 'buildon', title: '像睡覺翻身如果一直被當異常', content: '像睡覺翻身如果一直被當異常， 主人應該很快就煩了。這種誤報雖然看起來沒那麼嚴重，但其實超傷信任。', author: 'u32', x: 11800, y: 150, parentId: 'g3-w6-9', date: dates.w6+9000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w6-11', topicId: 't-g3', type: 'counter', title: '可是如果太在意不要誤報', content: '可是如果太在意不要誤報，可能又會漏掉真的危險。這就是為什麼我們最後一定是在平衡，不 是在追一邊。', author: 'u32', x: 12150, y: 150, parentId: 'g3-w6-10', date: dates.w6+10000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w6-12', topicId: 't-g3', type: 'improve', title: '也許我們可以把錯誤分成『會讓人不信』', content: '也許我們可以把錯誤分成『會讓人不信』和『會讓人錯過』兩種角度來看。這樣比較 像真實使用者在意的事。', author: 'u32', x: 12500, y: 150, parentId: 'g3-w6-11', date: dates.w6+11000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w6-13', topicId: 't-g3', type: 'buildon', title: '我覺得這樣滿符合第三組主題', content: '我覺得這樣滿符合第三組主題，因為我們不是只想證明 AI 看得到，而是想知道它值不值得被 交付一部分判讀工作。', author: 'u32', x: 12850, y: 150, parentId: 'g3-w6-12', date: dates.w6+12000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w6-14', topicId: 't-g3', type: 'improve', title: '所以錯誤不只是技術問題', content: '所以錯誤不只是技術問題，也是信任問題。這個我覺得可以直接寫進我 們後面結論。', author: 'u32', x: 13200, y: 150, parentId: 'g3-w6-13', date: dates.w6+13000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w6-15', topicId: 't-g3', type: 'riseabove', title: '如果要說第三組這週最大的長大', content: '如果要說第三組這週最大的長大，我會說是：我們開始把失敗當成邊界圖。每錯一次，不是 只扣分，而是多知道一塊『這裡不能太自信』。', author: 'u32', x: 13550, y: 150, parentId: 'g3-w6-14', date: dates.w6+14000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w6-16', topicId: 't-g3', type: 'buildon', title: '我開始覺得有些錯真的很傷信任', content: '我開始覺得有些錯真的很傷信任，不是因為它最嚴重，而是因為它一直在最不該亂 叫的地方亂叫。', author: 'u32', x: 13900, y: 150, parentId: 'g3-w6-15', date: dates.w6+15000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w6-17', topicId: 't-g3', type: 'question', title: '如果某一類錯一直都跟 ROI 飄掉或', content: '如果某一類錯一直都跟 ROI 飄掉或遮擋有關，那我們是不是該承認，在這種條件下系統現在 就不該講得太滿？', author: 'u33', x: 11450, y: 550, parentId: 'g3-w6-1', date: dates.w6+16000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w6-18', topicId: 't-g3', type: 'buildon', title: '我覺得要', content: '我覺得要，因為資料入口一旦不穩，後面判讀其實都很危險。與其硬講，不 如誠實說現在可信度不足。', author: 'u33', x: 11800, y: 550, parentId: 'g3-w6-17', date: dates.w6+17000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w6-19', topicId: 't-g3', type: 'counter', title: '但如果每次都退回可信度不足', content: '但如果每次都退回可信度不足，也可能顯得系統很沒用。所以我們還是得找出在不穩條件下最 低限度能做到什麼。', author: 'u33', x: 12150, y: 550, parentId: 'g3-w6-18', date: dates.w6+18000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w6-20', topicId: 't-g3', type: 'improve', title: '也許可以分成：可以判、可以追蹤但不下', content: '也許可以分成：可以判、可以追蹤但不下結論、暫時不建議判讀。這樣比只 有能或不能更像真實系統。', author: 'u33', x: 12500, y: 550, parentId: 'g3-w6-19', date: dates.w6+19000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w6-21', topicId: 't-g3', type: 'buildon', title: '這樣其實也把我們前幾週講的分層判讀接', content: '這樣其實也把我們前幾週講的分層判讀接起來了。原來那些討論不是分開的，是會互相接的。', author: 'u33', x: 12850, y: 550, parentId: 'g3-w6-20', date: dates.w6+20000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w6-22', topicId: 't-g3', type: 'riseabove', title: '我覺得第三組現在慢慢長出一個很重要的', content: '我覺得第三組現在慢慢長出一個很重要的觀念：知道什麼時候不能太相信資料，本身就是一 種高階判讀能力。', author: 'u33', x: 13200, y: 550, parentId: 'g3-w6-21', date: dates.w6+21000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w6-23', topicId: 't-g3', type: 'buildon', title: '我的想法是', content: '我的想法是，知道哪些條件下不該太相信資料，本身就是一種高階判讀。', author: 'u33', x: 13550, y: 550, parentId: 'g3-w6-22', date: dates.w6+22000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w6-24', topicId: 't-g3', type: 'question', title: '如果要把這些錯誤真正變成系統改進依據', content: '如果要把這些錯誤真正變成系統改進依據，那我們是不是要建立一個『從錯誤回推邏輯缺口』 的方式？', author: 'u34', x: 11450, y: 850, parentId: 'g3-w6-1', date: dates.w6+23000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w6-25', topicId: 't-g3', type: 'buildon', title: '例如誤報很多', content: '例如誤報很多，就回頭看是情境判斷太弱還是門檻太直；漏報比較多，就看是不是持 續時間或基線範圍設太鬆。', author: 'u34', x: 11800, y: 850, parentId: 'g3-w6-24', date: dates.w6+24000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w6-26', topicId: 't-g3', type: 'counter', title: '但不能每次錯都只改一點點數值', content: '但不能每次錯都只改一點點數值，因為那樣很容易變成局部修修補補。更重要的是看背後邏輯 是不是有缺一塊。', author: 'u34', x: 12150, y: 850, parentId: 'g3-w6-25', date: dates.w6+25000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w6-27', topicId: 't-g3', type: 'improve', title: '我建議我們後面每次檢討都先問：這個錯', content: '我建議我們後面每次檢討都先問：這個錯是輸入問題、判讀問題，還是提醒 策略問題？這樣比較快找到該修哪裡。', author: 'u34', x: 12500, y: 850, parentId: 'g3-w6-26', date: dates.w6+26000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w6-28', topicId: 't-g3', type: 'riseabove', title: '我會把第三組這週收成一句話：失敗不是', content: '我會把第三組這週收成一句話：失敗不是在告訴我們系統爛，而是在提醒我們，哪一個判讀 假設其實還站不穩。', author: 'u34', x: 12850, y: 850, parentId: 'g3-w6-27', date: dates.w6+27000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w6-29', topicId: 't-g3', type: 'buildon', title: '如果回頭整理', content: '如果回頭整理，我覺得這週真正長出來的是『錯誤不是扣分，是邏輯缺口定位器』。', author: 'u34', x: 13200, y: 850, parentId: 'g3-w6-28', date: dates.w6+28000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w6-ra', topicId: 't-g3', type: 'riseabove', title: 'W6 小結：第三組第六週把錯誤改寫成邊界知識：失', content: '第三組第六週把錯誤改寫成邊界知識：失敗不只是扣分，而是在提醒哪些條件下不該太自', author: 'u31', x: 14250, y: 475, parentId: 'g3-w6-29', date: dates.w6+29000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G3 Week 7 (Base X: 13300) ---
                { id: 'g3-w7-1', topicId: 't-g3', type: 'question', title: '如果現在要我們用一句話講第三組這七週 (W7 主節點)', content: '如果現在要我們用一句話講第三組這七週到底做了什麼，你們會怎麼說？我最不想回到『做 一個會量生命體徵的系統』，因為那真的太前面了。', author: 'u31', x: 13300, y: 350, parentId: 'g3-w6-ra', date: dates.w7, cluster: 'A', promisingness: 75 },
                { id: 'g3-w7-2', topicId: 't-g3', type: 'buildon', title: '我自己的感覺是', content: '我自己的感覺是，我們從『看起來有變化』 一路走到『這個變化到底該不該被相信、該不該被提醒』。這中間其實才是我們最有價值的部分。', author: 'u31', x: 13650, y: 350, parentId: 'g3-w7-1', date: dates.w7+1000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w7-3', topicId: 't-g3', type: 'improve', title: '我想把我們的模型整理成四步：先看資料', content: '我想把我們的模型整理成四步：先看資料入口穩不穩，再看有沒有偏離這隻平常狀態，再看生 活情境能不能解釋，最後才決定是觀察、追蹤還是提醒。', author: 'u31', x: 14000, y: 350, parentId: 'g3-w7-2', date: dates.w7+2000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w7-4', topicId: 't-g3', type: 'counter', title: '但如果只講四步', content: '但如果只講四步，好像又太平了。因為 我們後面其實還長出『錯誤會告訴我們邊界』這件事，這個我覺得也很重要。', author: 'u31', x: 14350, y: 350, parentId: 'g3-w7-3', date: dates.w7+3000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w7-5', topicId: 't-g3', type: 'buildon', title: '那也許可以加一個原則：不是所有變化都', content: '那也許可以加一個原則：不是所有變化都直接翻成危險，也不是所有不確定都硬裝成很肯定。', author: 'u31', x: 14700, y: 350, parentId: 'g3-w7-4', date: dates.w7+4000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w7-6', topicId: 't-g3', type: 'improve', title: '這樣我們的模型就不只是流程', content: '這樣我們的模型就不只是流程，還有一個態度：先理解，再判斷；先確認可信，再提醒。', author: 'u31', x: 15050, y: 350, parentId: 'g3-w7-5', date: dates.w7+5000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w7-7', topicId: 't-g3', type: 'riseabove', title: '我會把第三組七週的收穫講成：我們不是', content: '我會把第三組七週的收穫講成：我們不是把毛小孩變成一串會跳動的數值，而是慢慢建立 一套『從資料可信度出發，結合個體基線、生活情境與持續變化，來做有分寸健康判讀』的模型。', author: 'u31', x: 15400, y: 350, parentId: 'g3-w7-6', date: dates.w7+6000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w7-8', topicId: 't-g3', type: 'buildon', title: '如果回頭整理', content: '如果回頭整理，我覺得第三組最明顯的改變，是我們不再急著把每個變化都翻成結 論。', author: 'u31', x: 15750, y: 350, parentId: 'g3-w7-7', date: dates.w7+7000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w7-9', topicId: 't-g3', type: 'question', title: '如果要讓主人一聽就懂我們這組在幹嘛', content: '如果要讓主人一聽就懂我們這組在幹嘛，我覺得關鍵不是技術名詞，而是我們到底幫他解決 了什麼。那你們覺得最貼近生活的一句話是什麼？', author: 'u32', x: 13650, y: 150, parentId: 'g3-w7-1', date: dates.w7+8000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w7-10', topicId: 't-g3', type: 'buildon', title: '我會說', content: '我會說，我們不是讓 AI 一直盯著毛小孩， 而是幫主人先過濾掉那些不需要太緊張的變化，讓真正值得注意的東西比較不會被淹掉。', author: 'u32', x: 14000, y: 150, parentId: 'g3-w7-9', date: dates.w7+9000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w7-11', topicId: 't-g3', type: 'counter', title: '不過如果只這樣講', content: '不過如果只這樣講，好像又把我們說得太輕鬆。因為其實我們也一直在提醒，系統不是全知全 能，它也有看不懂的時候。', author: 'u32', x: 14350, y: 150, parentId: 'g3-w7-10', date: dates.w7+10000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w7-12', topicId: 't-g3', type: 'improve', title: '那可以改成：我們讓系統比較知道什麼時', content: '那可以改成：我們讓系統比較知道什麼時候該講，什麼時候先別太 武斷。這樣比較有第三組的味道。', author: 'u32', x: 14700, y: 150, parentId: 'g3-w7-11', date: dates.w7+11000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w7-13', topicId: 't-g3', type: 'buildon', title: '我真的很喜歡我們後來一直回到『分寸』', content: '我真的很喜歡我們後來一直回到『分寸』這件事。因為以前很像只在比誰更敏感，現在比較像在 想誰比較懂牠。', author: 'u32', x: 15050, y: 150, parentId: 'g3-w7-12', date: dates.w7+12000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w7-14', topicId: 't-g3', type: 'improve', title: '如果後面要做海報或口頭', content: '如果後面要做海報或口頭，我覺得這句可以直接用：不是看見變化就叫，而是 先判斷這個變化值不值得叫。', author: 'u32', x: 15400, y: 150, parentId: 'g3-w7-13', date: dates.w7+13000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w7-15', topicId: 't-g3', type: 'riseabove', title: '我會把第三組最後的核心寫成：真正好的', content: '我會把第三組最後的核心寫成：真正好的健康監測，不是一直提高警覺，而是能在理解毛小 孩生活節奏的前提下，做出比較可信、也比較不擾人的提醒。', author: 'u32', x: 15750, y: 150, parentId: 'g3-w7-14', date: dates.w7+14000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w7-16', topicId: 't-g3', type: 'buildon', title: '我的想法是', content: '我的想法是，第三組最後最貼近生活的一句話不是『看見異常』，而是『先幫主人過 濾掉那些不必太緊張的變化』。', author: 'u32', x: 16100, y: 150, parentId: 'g3-w7-15', date: dates.w7+15000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w7-17', topicId: 't-g3', type: 'question', title: '如果要回頭看', content: '如果要回頭看，我覺得我自己變最大的是，現在不會看到一筆資料就直接信。那我們最後要怎 麼把『資料可信度』這件事講成大家都聽得懂的話？', author: 'u33', x: 13650, y: 550, parentId: 'g3-w7-1', date: dates.w7+16000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w7-18', topicId: 't-g3', type: 'buildon', title: '也許可以直接講：不是系統看到就算數', content: '也許可以直接講：不是系統看到就算數，還 要先確定它現在看到的是不是穩、是不是被遮到、是不是剛好框錯地方。', author: 'u33', x: 14000, y: 550, parentId: 'g3-w7-17', date: dates.w7+17000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w7-19', topicId: 't-g3', type: 'counter', title: '但這樣講又怕太像技術細節', content: '但這樣講又怕太像技術細節，別人可能聽到一半就飄掉。', author: 'u33', x: 14350, y: 550, parentId: 'g3-w7-18', date: dates.w7+18000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w7-20', topicId: 't-g3', type: 'improve', title: '可以改成比較白話：系統 也要先確定自', content: '可以改成比較白話：系統 也要先確定自己沒看走眼，才有資格提醒別人。這樣應該就比較好懂。', author: 'u33', x: 14700, y: 550, parentId: 'g3-w7-19', date: dates.w7+19000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w7-21', topicId: 't-g3', type: 'buildon', title: '我覺得這句很像我們第三組一路走出來的', content: '我覺得這句很像我們第三組一路走出來的精神。因為我們後面一直都在做這件事：先懷疑自己 看到的，再決定要不要說。', author: 'u33', x: 15050, y: 550, parentId: 'g3-w7-20', date: dates.w7+20000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w7-22', topicId: 't-g3', type: 'riseabove', title: '如果要我收成一句話', content: '如果要我收成一句話，我會說：第三組不只是讓 AI 去看毛小孩 ，而是先教 AI 什麼時候它自己其實還看不夠清楚。', author: 'u33', x: 15400, y: 550, parentId: 'g3-w7-21', date: dates.w7+21000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w7-23', topicId: 't-g3', type: 'buildon', title: '我現在會把第三組最後的重點講成：系統', content: '我現在會把第三組最後的重點講成：系統也要先確定自己沒有看走眼，才有資格提 醒別人。', author: 'u33', x: 15750, y: 550, parentId: 'g3-w7-22', date: dates.w7+22000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w7-24', topicId: 't-g3', type: 'question', title: '如果最後要把我們這七週壓成一個最精簡', content: '如果最後要把我們這七週壓成一個最精簡的判讀架構，你們覺得骨架要留哪幾個？ 【Build on】 我會留四個：資料品質、個體基線、生活情境、持續時間。這四個幾乎把我們一路在修的東西都包進去 了。', author: 'u34', x: 13650, y: 850, parentId: 'g3-w7-1', date: dates.w7+23000, cluster: 'A', promisingness: 55 },
                { id: 'g3-w7-25', topicId: 't-g3', type: 'counter', title: '當然還可以再加很多細節', content: '當然還可以再加很多細節，但如果骨架太肥，最後反而看不出真正核心。', author: 'u34', x: 14000, y: 850, parentId: 'g3-w7-24', date: dates.w7+24000, cluster: 'A', promisingness: 63 },
                { id: 'g3-w7-26', topicId: 't-g3', type: 'improve', title: '所以我覺 得第三組最後最好的樣子', content: '所以我覺 得第三組最後最好的樣子，不是看起來最全，而是核心夠清楚：先確認能信，再確認偏離，再決定怎麼提 醒。', author: 'u34', x: 14350, y: 850, parentId: 'g3-w7-25', date: dates.w7+25000, cluster: 'B', promisingness: 68 },
                { id: 'g3-w7-27', topicId: 't-g3', type: 'buildon', title: '而且這個架構不是憑空想出來的', content: '而且這個架構不是憑空想出來的，是從七週的錯誤、爭論、修正慢慢長出來的，所以它很有根。', author: 'u34', x: 14700, y: 850, parentId: 'g3-w7-26', date: dates.w7+26000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w7-28', topicId: 't-g3', type: 'riseabove', title: '我會把第三組的知識建構歷程收成這句：', content: '我會把第三組的知識建構歷程收成這句：我們從『感測生命體徵』走到『建立可信判讀條件』， 再走到『形成有分寸的提醒邏輯』。這條路本身，就是我們最完整的成長軌跡。', author: 'u34', x: 15050, y: 850, parentId: 'g3-w7-27', date: dates.w7+27000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g3-w7-29', topicId: 't-g3', type: 'buildon', title: '如果要壓成最精簡的骨架', content: '如果要壓成最精簡的骨架，我還是會留：資料品質、個體基線、生活情境、持續時 間。', author: 'u34', x: 15400, y: 850, parentId: 'g3-w7-28', date: dates.w7+28000, cluster: 'B', promisingness: 60 },
                { id: 'g3-w7-ra', topicId: 't-g3', type: 'riseabove', title: 'W7 小結：第三組第七週最後收成的', content: '第三組第七週最後收成的，不只是毛小孩生命體徵偵測，而是一套從資料可信度出發、結合', author: 'u31', x: 16450, y: 475, parentId: 'g3-w7-29', date: dates.w7+29000, cluster: 'C', promisingness: 95 }, // 熱點
                // --- G4 Week 1 (Base X: 100) ---
                { id: 'g4-w1-1', topicId: 't-g4', type: 'question', title: '我們一開始很容易被『音量越大應該越有', content: '我現在越想越覺得，我們一開始很容易被『音量越大應該越有效』這種直覺帶走。可是如果真 的那麼簡單，應該就不會出現有時候很大聲也滅不掉，反而某些條件下比較容易成功的情況。那是不是重 點根本不是大聲，而是聲波怎麼干擾火焰？', author: 'u41', x: 100, y: 350, parentId: null, date: dates.w1, cluster: 'A', promisingness: 55 },
                { id: 'g4-w1-2', topicId: 't-g4', type: 'buildon', title: '如果是這樣', content: '如果是這樣，我們現在就不能只把音量當主角，還 要把頻率、距離、角度、火焰大小都一起拉進來看。因為火不是只有『有沒有吹到』而已。', author: 'u41', x: 450, y: 350, parentId: 'g4-w1-1', date: dates.w1+1000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w1-3', topicId: 't-g4', type: 'improve', title: '我覺得這週先不要急著比誰比較強', content: '我覺得這週先不要急著比誰比較強，先列出：哪些情況下看起來很強但其實沒用，哪些情況下 沒那麼大聲卻可能比較有效。這樣後面比較知道問題在哪。', author: 'u41', x: 800, y: 350, parentId: 'g4-w1-2', date: dates.w1+2000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w1-4', topicId: 't-g4', type: 'counter', title: '但我也不是說音量不重要', content: '但我也不是說音量不重要，應該還 是重要，只是它可能不是唯一決定因素。', author: 'u41', x: 1150, y: 350, parentId: 'g4-w1-3', date: dates.w1+3000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w1-5', topicId: 't-g4', type: 'buildon', title: '所以我想把我們的問題先改寫成：在什麼', content: '所以我想把我們的問題先改寫成：在什麼條件下，聲波比較有機會讓火焰失穩，而不是直接問 音量越大有沒有越好。', author: 'u41', x: 1500, y: 350, parentId: 'g4-w1-4', date: dates.w1+4000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w1-6', topicId: 't-g4', type: 'buildon', title: '我現在比較在意的不是哪個條件最猛', content: '我現在比較在意的不是哪個條件最猛，而是火焰到底是怎麼開始撐不住的。因為如 果這件事沒看清楚，後面一直加音量其實很像在亂撞。', author: 'u41', x: 1850, y: 350, parentId: 'g4-w1-5', date: dates.w1+5000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w1-7', topicId: 't-g4', type: 'question', title: '如果我們現在只盯著音量看', content: '如果我們現在只盯著音量看，會不會其實忽略了火焰本身的狀態？像火焰大小不同、燃料不 同，可能本來就不會一樣。', author: 'u42', x: 450, y: 150, parentId: 'g4-w1-1', date: dates.w1+6000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w1-8', topicId: 't-g4', type: 'buildon', title: '我覺得仁傑講的有道理', content: '我覺得仁傑講的有道理，因為『大聲』比較像結果看起來很猛，但不 一定真的打到重點。也許真正該看的是火焰有沒有被擾亂到。', author: 'u42', x: 800, y: 150, parentId: 'g4-w1-7', date: dates.w1+7000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w1-9', topicId: 't-g4', type: 'improve', title: '這週我想先把『有沒有擺動變明顯』『有', content: '這週我想先把『有沒有擺動變明顯』『有沒有變小』『有沒有短暫快熄』這些現象也一起記。因為 熄滅前的變化可能比最後有沒有熄更有訊息。', author: 'u42', x: 1150, y: 150, parentId: 'g4-w1-8', date: dates.w1+8000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w1-10', topicId: 't-g4', type: 'counter', title: '不過如果現象記太多', content: '不過如果現象記太多，後面也可能很難整理，所 以要先抓幾個最有代表性的。', author: 'u42', x: 1500, y: 150, parentId: 'g4-w1-9', date: dates.w1+9000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w1-11', topicId: 't-g4', type: 'buildon', title: '我開始覺得第四組不能只看最後熄沒熄', content: '我開始覺得第四組不能只看最後熄沒熄，因為有些條件雖然還沒成功，但火焰已經 有很明顯被影響。', author: 'u42', x: 1850, y: 150, parentId: 'g4-w1-10', date: dates.w1+10000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w1-12', topicId: 't-g4', type: 'question', title: '我在現場的感覺是', content: '我在現場的感覺是，有時候明明聲音超大，但火只是晃得很厲害，沒有真的滅掉。那這種情況 算有效還是無效？', author: 'u43', x: 450, y: 550, parentId: 'g4-w1-1', date: dates.w1+11000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w1-13', topicId: 't-g4', type: 'buildon', title: '如果只是晃很大但最後沒熄', content: '如果只是晃很大但最後沒熄，其實也不能直接說完全沒效果。因為那代表火 焰是有被影響到的，只是還沒到熄掉的程度。', author: 'u43', x: 800, y: 550, parentId: 'g4-w1-12', date: dates.w1+12000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w1-14', topicId: 't-g4', type: 'improve', title: '所以我覺得我們不能只有『熄』和『沒熄', content: '所以我覺得我們不能只有『熄』和『沒熄』兩種結果，至少還要記『明顯擾動』這一類。', author: 'u43', x: 1150, y: 550, parentId: 'g4-w1-13', date: dates.w1+13000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w1-15', topicId: 't-g4', type: 'counter', title: '但如果分類太多', content: '但如果分類太多，也要小心會不會變得很主觀，所以後面可能要再定清楚一點。', author: 'u43', x: 1500, y: 550, parentId: 'g4-w1-14', date: dates.w1+14000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w1-16', topicId: 't-g4', type: 'buildon', title: '我在現場看到的感覺是', content: '我在現場看到的感覺是，有些看起來『差一點』的狀態，其實很值得追。因為那表示 火焰不是完全沒反應。', author: 'u43', x: 1850, y: 550, parentId: 'g4-w1-15', date: dates.w1+15000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w1-17', topicId: 't-g4', type: 'question', title: '如果我們真的要證明不是越大聲越好', content: '如果我們真的要證明不是越大聲越好，那後面是不是要設計可以比較的條件，不然最後還是 只是感覺？', author: 'u44', x: 450, y: 850, parentId: 'g4-w1-1', date: dates.w1+16000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w1-18', topicId: 't-g4', type: 'buildon', title: '我覺得至少要固定一些東西', content: '我覺得至少要固定一些東西，例如火焰大小、距離、測試時間，不然每次都不一樣， 很難知道到底差在哪。', author: 'u44', x: 800, y: 850, parentId: 'g4-w1-17', date: dates.w1+17000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w1-19', topicId: 't-g4', type: 'improve', title: '我們可以先把這週重點定成：先抓最可能', content: '我們可以先把這週重點定成：先抓最可能影響結果的變數，然後想哪些要先固定，哪些可以拿 來比較。', author: 'u44', x: 1150, y: 850, parentId: 'g4-w1-18', date: dates.w1+18000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w1-20', topicId: 't-g4', type: 'counter', title: '因為如果全部都一起變', content: '因為如果全部都一起變，最後就算結果很漂亮，也不太知道是誰在起作用。', author: 'u44', x: 1500, y: 850, parentId: 'g4-w1-19', date: dates.w1+19000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w1-21', topicId: 't-g4', type: 'buildon', title: '先固定條件', content: '先固定條件。', author: 'u44', x: 1850, y: 850, parentId: 'g4-w1-20', date: dates.w1+20000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w1-22', topicId: 't-g4', type: 'improve', title: '後面才好比', content: '後面才好比。', author: 'u44', x: 2200, y: 850, parentId: 'g4-w1-21', date: dates.w1+21000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w1-ra', topicId: 't-g4', type: 'riseabove', title: 'W1 小結：第四組第一週先把『音量越大越有效』這', content: '第四組第一週先把『音量越大越有效』這種直覺打開，開始把注意力轉向火焰到底怎麼被干', author: 'u41', x: 2550, y: 475, parentId: 'g4-w1-22', date: dates.w1+22000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G4 Week 2 (Base X: 2300) ---
                { id: 'g4-w2-1', topicId: 't-g4', type: 'question', title: '如果同樣的音量 (W2 主節點)', content: '如果同樣的音量，在不同距離或角度下效果差很多，那這就表示聲波不是單純越強越好，而是 它跟火焰接觸的方式也很重要。那我們是不是該先把幾個最會影響結果的條件釐清？', author: 'u41', x: 2300, y: 350, parentId: 'g4-w1-ra', date: dates.w2, cluster: 'A', promisingness: 75 },
                { id: 'g4-w2-2', topicId: 't-g4', type: 'buildon', title: '我目前 覺得至少有四個：頻率、距離、', content: '我目前 覺得至少有四個：頻率、距離、角度、火焰大小。因為這四個都很可能直接影響火焰有沒有被擾亂到。', author: 'u41', x: 2650, y: 350, parentId: 'g4-w2-1', date: dates.w2+1000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w2-3', topicId: 't-g4', type: 'improve', title: '這週我想先把討論從『最強』改成『最穩', content: '這週我想先把討論從『最強』改成『最穩』。不是看哪次最猛，而是看哪些條件比較容易重複出現 同樣結果。', author: 'u41', x: 3000, y: 350, parentId: 'g4-w2-2', date: dates.w2+2000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w2-4', topicId: 't-g4', type: 'counter', title: '因為如果某次剛好成功', content: '因為如果某次剛好成功，但下一次完全做不出來，那也不能算真的抓到規律。', author: 'u41', x: 3350, y: 350, parentId: 'g4-w2-3', date: dates.w2+3000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w2-5', topicId: 't-g4', type: 'buildon', title: '所以第四組後面應該要慢慢從單次表現', content: '所以第四組後面應該要慢慢從單次表現，走到條件與結果之間的穩定關係。', author: 'u41', x: 3700, y: 350, parentId: 'g4-w2-4', date: dates.w2+4000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w2-6', topicId: 't-g4', type: 'buildon', title: '如果回到我們現在最需要釐清的', content: '如果回到我們現在最需要釐清的，我會覺得不是『哪次最好』，而是『哪些條件一換 ，火焰反應就真的不一樣』。', author: 'u41', x: 4050, y: 350, parentId: 'g4-w2-5', date: dates.w2+5000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w2-7', topicId: 't-g4', type: 'question', title: '如果火焰會受距離跟角度影響', content: '如果火焰會受距離跟角度影響，那我們後面是不是也不能只用『有沒有熄』來看效果？因為有 些條件下可能明顯比較容易讓火焰不穩，只是還差一步。', author: 'u42', x: 2650, y: 150, parentId: 'g4-w2-1', date: dates.w2+6000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w2-8', topicId: 't-g4', type: 'buildon', title: '我覺得仁傑講的『最穩』很重要', content: '我覺得仁傑講的『最穩』很重要，因為 有時候最強不一定最有意義。能重複做出來的，才比較像我們真的理解了一些東西。', author: 'u42', x: 3000, y: 150, parentId: 'g4-w2-7', date: dates.w2+7000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w2-9', topicId: 't-g4', type: 'improve', title: '我們可不可以先把每次結果分成：幾乎沒', content: '我們可不可以先把每次結果分成：幾乎沒影響、有擾動、明顯變弱、熄滅。這樣比二分法更能看 出差異。', author: 'u42', x: 3350, y: 150, parentId: 'g4-w2-8', date: dates.w2+8000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w2-10', topicId: 't-g4', type: 'counter', title: '不過分類也不能只是看感覺', content: '不過分類也不能只是看感覺，後面最好要再想怎麼定義比較一致，不然不同人看可能 不一樣。', author: 'u42', x: 3700, y: 150, parentId: 'g4-w2-9', date: dates.w2+9000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w2-11', topicId: 't-g4', type: 'buildon', title: '我覺得這樣剛好也能把浚丞前面講的現場', content: '我覺得這樣剛好也能把浚丞前面講的現場觀察整理進來，不會只剩最後熄沒熄。', author: 'u42', x: 4050, y: 150, parentId: 'g4-w2-10', date: dates.w2+10000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w2-12', topicId: 't-g4', type: 'buildon', title: '我開始比較認同要把『有擾動』『明顯變', content: '我開始比較認同要把『有擾動』『明顯變弱』『熄滅』分開看，因為這樣才不會所有過 程都被最後一個結果蓋掉。', author: 'u42', x: 4400, y: 150, parentId: 'g4-w2-11', date: dates.w2+11000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w2-13', topicId: 't-g4', type: 'question', title: '我在現場最有感的是', content: '我在現場最有感的是，火焰有時候看起來已經快不行了，但就是差那一下沒熄。那這種『快熄 了』到底能不能算是一種重要結果？', author: 'u43', x: 2650, y: 550, parentId: 'g4-w2-1', date: dates.w2+12000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w2-14', topicId: 't-g4', type: 'buildon', title: '我覺得能', content: '我覺得能，因為那代表條件已經有碰到火焰的弱點，只是 還不夠。這種其實很值得後面再追。', author: 'u43', x: 3000, y: 550, parentId: 'g4-w2-13', date: dates.w2+13000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w2-15', topicId: 't-g4', type: 'improve', title: '所以我支持宇鑫講的分級', content: '所以我支持宇鑫講的分級。尤其像火焰變小、晃動明顯、底部不穩這些，都比只看最後結果更 有內容。', author: 'u43', x: 3350, y: 550, parentId: 'g4-w2-14', date: dates.w2+14000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w2-16', topicId: 't-g4', type: 'counter', title: '但如果觀察太靠肉眼', content: '但如果觀察太靠肉眼，也可能有點主觀。所以後面可以想有沒有更固定的記錄方式。', author: 'u43', x: 3700, y: 550, parentId: 'g4-w2-15', date: dates.w2+15000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w2-17', topicId: 't-g4', type: 'buildon', title: '至少現階段先把現象留下來', content: '至少現階段先把現象留下來，我覺得比完全不記好多了。', author: 'u43', x: 4050, y: 550, parentId: 'g4-w2-16', date: dates.w2+16000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w2-18', topicId: 't-g4', type: 'buildon', title: '像火焰明明有被打到', content: '像火焰明明有被打到，可是最後沒熄，這種我覺得真的不能直接當沒用。', author: 'u43', x: 4400, y: 550, parentId: 'g4-w2-17', date: dates.w2+17000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w2-19', topicId: 't-g4', type: 'question', title: '如果這週要把條件拉進來', content: '如果這週要把條件拉進來，那哪些條件要固定、哪些條件可以拿來比，這件事要先決定，不然 後面很容易亂掉。', author: 'u44', x: 2650, y: 850, parentId: 'g4-w2-1', date: dates.w2+18000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w2-20', topicId: 't-g4', type: 'buildon', title: '我覺得先固定火焰大小和燃料種類', content: '我覺得先固定火焰大小和燃料種類，然後拿距離、角度或頻率去比，會比較 容易看出差異。', author: 'u44', x: 3000, y: 850, parentId: 'g4-w2-19', date: dates.w2+19000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w2-21', topicId: 't-g4', type: 'improve', title: '後面表格可以把『固定條件』和『比較條', content: '後面表格可以把『固定條件』和『比較條件』分開寫，這樣我們自己也比較不會搞混。', author: 'u44', x: 3350, y: 850, parentId: 'g4-w2-20', date: dates.w2+20000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w2-22', topicId: 't-g4', type: 'counter', title: '因為如果一邊改距離', content: '因為如果一邊改距離，一邊火焰大小又不同，最後根本不知道是哪個造成結果差異。', author: 'u44', x: 3700, y: 850, parentId: 'g4-w2-21', date: dates.w2+21000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w2-23', topicId: 't-g4', type: 'buildon', title: '固定哪些、比較哪些', content: '固定哪些、比較哪些。', author: 'u44', x: 4050, y: 850, parentId: 'g4-w2-22', date: dates.w2+22000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w2-24', topicId: 't-g4', type: 'improve', title: '要先分', content: '要先分。', author: 'u44', x: 4400, y: 850, parentId: 'g4-w2-23', date: dates.w2+23000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w2-ra', topicId: 't-g4', type: 'riseabove', title: 'W2 小結：第四組第二週不再只看『有沒有熄』', content: '第四組第二週不再只看『有沒有熄』，而是開始把距離、角度、火焰狀態與中間擾動一起放進', author: 'u41', x: 4750, y: 475, parentId: 'g4-w2-24', date: dates.w2+24000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G4 Week 3 (Base X: 4500) ---
                { id: 'g4-w3-1', topicId: 't-g4', type: 'question', title: '如果現在要排優先順序 (W3 主節點)', content: '如果現在要排優先順序，我覺得最值得先追的不是『哪個條件最好看』，而是哪個變數最能解 釋火焰為什麼會變不穩。你們覺得臨界聲壓、頻率、距離，哪個比較像核心？', author: 'u41', x: 4500, y: 350, parentId: 'g4-w2-ra', date: dates.w3, cluster: 'A', promisingness: 75 },
                { id: 'g4-w3-2', topicId: 't-g4', type: 'buildon', title: '我目前偏向『臨界 聲壓 × 距離』先', content: '我目前偏向『臨界 聲壓 × 距離』先抓，因為這兩個跟聲波真正作用到火焰的強弱最直接有關。頻率也重要，但可能要放在一 起看。', author: 'u41', x: 4850, y: 350, parentId: 'g4-w3-1', date: dates.w3+1000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-3', topicId: 't-g4', type: 'counter', title: '但如果只看臨界聲壓', content: '但如果只看臨界聲壓，又可能太像回到『大聲就好』。所以我覺得不能把聲壓獨立看，還是要放 回條件裡。', author: 'u41', x: 5200, y: 350, parentId: 'g4-w3-2', date: dates.w3+2000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w3-4', topicId: 't-g4', type: 'improve', title: '也許我們可以改問：在什麼距離和頻率條', content: '也許我們可以改問：在什麼距離和頻率條件下，火焰最容易接近失穩臨界點。這樣 比單純找最大值更有研究味。', author: 'u41', x: 5550, y: 350, parentId: 'g4-w3-3', date: dates.w3+3000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w3-5', topicId: 't-g4', type: 'buildon', title: '而且『臨界』這個概念很重要', content: '而且『臨界』這個概念很重要，因為它代表不是一直線，而是到了某個邊界後效果會突然變不一 樣。', author: 'u41', x: 5900, y: 350, parentId: 'g4-w3-4', date: dates.w3+4000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-6', topicId: 't-g4', type: 'riseabove', title: '我覺得第四組現在真正開始往上走的地方', content: '我覺得第四組現在真正開始往上走的地方，是從『比較誰比較強』，慢慢走到『找火焰失 穩的臨界條件』。這差很多。', author: 'u41', x: 6250, y: 350, parentId: 'g4-w3-5', date: dates.w3+5000, cluster: 'A', promisingness: 85 }, // 熱點
                { id: 'g4-w3-7', topicId: 't-g4', type: 'buildon', title: '我現在比較傾向把注意力放在『臨界』這', content: '我現在比較傾向把注意力放在『臨界』這件事。因為如果能找到火焰開始明顯不穩 的那個區間，後面很多條件就會比較好排。', author: 'u41', x: 6600, y: 350, parentId: 'g4-w3-6', date: dates.w3+6000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-8', topicId: 't-g4', type: 'question', title: '如果我們現在開始談臨界條件', content: '如果我們現在開始談臨界條件，那是不是也代表不能只看成功案例，還要看那些『差一點成 功』的情況？因為臨界通常就在那附近。', author: 'u42', x: 4850, y: 150, parentId: 'g4-w3-1', date: dates.w3+7000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w3-9', topicId: 't-g4', type: 'buildon', title: '我覺得那些『快熄了但還沒熄』的狀態超', content: '我覺得那些『快熄了但還沒熄』的狀態超重要，因為它 最像在告訴我們火焰已經開始撐不住。', author: 'u42', x: 5200, y: 150, parentId: 'g4-w3-8', date: dates.w3+8000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-10', topicId: 't-g4', type: 'improve', title: '所以後面記錄我想多加一欄：是不是接近', content: '所以後面記錄我想多加一欄：是不是接近失穩。雖然這還要再定義，但至少先把這種狀態留 住。', author: 'u42', x: 5550, y: 150, parentId: 'g4-w3-9', date: dates.w3+9000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w3-11', topicId: 't-g4', type: 'counter', title: '但這樣也要小心別變得太主觀', content: '但這樣也要小心別變得太主觀，不然『快熄』每個人看法不同。', author: 'u42', x: 5900, y: 150, parentId: 'g4-w3-10', date: dates.w3+10000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w3-12', topicId: 't-g4', type: 'buildon', title: '也許可以先配合影片或照片來對照', content: '也許可以先配合影片或照片來對照，先讓判斷比較一致。', author: 'u42', x: 6250, y: 150, parentId: 'g4-w3-11', date: dates.w3+11000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-13', topicId: 't-g4', type: 'buildon', title: '我開始覺得那些『差一點成功』的案例不', content: '我開始覺得那些『差一點成功』的案例不能只是附帶提一下，它們很可能才是在告 訴我們臨界點在哪。', author: 'u42', x: 6600, y: 150, parentId: 'g4-w3-12', date: dates.w3+12000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-14', topicId: 't-g4', type: 'question', title: '我發現有些時候火焰不是直接變小', content: '我發現有些時候火焰不是直接變小，而是底部開始很不穩、整個形狀很怪。這種是不是比最後 大小更早出現？', author: 'u43', x: 4850, y: 550, parentId: 'g4-w3-1', date: dates.w3+13000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w3-15', topicId: 't-g4', type: 'buildon', title: '如果是', content: '如果是，那我們應該要更重視火焰形狀或擾動，不只是看最後有沒有熄。', author: 'u43', x: 5200, y: 550, parentId: 'g4-w3-14', date: dates.w3+14000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-16', topicId: 't-g4', type: 'improve', title: '我覺得『火焰失穩』這個詞滿適合我們', content: '我覺得『火焰失穩』這個詞滿適合我們，因為它比單純『熄火』更能把過程講出來。', author: 'u43', x: 5550, y: 550, parentId: 'g4-w3-15', date: dates.w3+15000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w3-17', topicId: 't-g4', type: 'counter', title: '不 過如果我們只講失穩', content: '不 過如果我們只講失穩，後面還是得證明怎樣的擾動才算真的有意義，不然評審可能會覺得我們只是把晃動 講得很厲害。', author: 'u43', x: 5900, y: 550, parentId: 'g4-w3-16', date: dates.w3+16000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w3-18', topicId: 't-g4', type: 'buildon', title: '所以觀察要跟結果接起來', content: '所以觀察要跟結果接起來，不是只記現象，還要看這些現象後來有沒有比較接近熄滅。', author: 'u43', x: 6250, y: 550, parentId: 'g4-w3-17', date: dates.w3+17000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-19', topicId: 't-g4', type: 'buildon', title: '像底部開始不穩、形狀怪掉', content: '像底部開始不穩、形狀怪掉，我覺得都比最後熄不熄更早出現。', author: 'u43', x: 6600, y: 550, parentId: 'g4-w3-18', date: dates.w3+18000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-20', topicId: 't-g4', type: 'question', title: '如果這週開始聚焦臨界條件', content: '如果這週開始聚焦臨界條件，那我們後面測試是不是也該更有系統，不然很難真的找出邊界。', author: 'u44', x: 4850, y: 850, parentId: 'g4-w3-1', date: dates.w3+19000, cluster: 'A', promisingness: 55 },
                { id: 'g4-w3-21', topicId: 't-g4', type: 'buildon', title: '我覺得可以用一種漸進式方式', content: '我覺得可以用一種漸進式方式，例如距離慢慢拉、音量慢慢加，看在哪裡開始明顯不一樣。', author: 'u44', x: 5200, y: 850, parentId: 'g4-w3-20', date: dates.w3+20000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-22', topicId: 't-g4', type: 'improve', title: '這樣比一次只測幾個很跳的點更好', content: '這樣比一次只測幾個很跳的點更好，因為臨界通常就在中間，不一定剛好落在我們隨便選的條 件上。', author: 'u44', x: 5550, y: 850, parentId: 'g4-w3-21', date: dates.w3+21000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w3-23', topicId: 't-g4', type: 'counter', title: '但漸進式會比較花時間', content: '但漸進式會比較花時間，所以可能要先挑最有希望的區間做。', author: 'u44', x: 5900, y: 850, parentId: 'g4-w3-22', date: dates.w3+22000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w3-24', topicId: 't-g4', type: 'buildon', title: '我覺得這樣也比較符合第四組現在的方向', content: '我覺得這樣也比較符合第四組現在的方向：不是做很多散的測試，而是做能逼近機制的測試。', author: 'u44', x: 6250, y: 850, parentId: 'g4-w3-23', date: dates.w3+23000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-25', topicId: 't-g4', type: 'buildon', title: '可以用漸進式', content: '可以用漸進式。', author: 'u44', x: 6600, y: 850, parentId: 'g4-w3-24', date: dates.w3+24000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w3-26', topicId: 't-g4', type: 'improve', title: '比較找得到邊界', content: '比較找得到邊界。', author: 'u44', x: 6950, y: 850, parentId: 'g4-w3-25', date: dates.w3+25000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w3-ra', topicId: 't-g4', type: 'riseabove', title: 'W3 小結：第四組第三週開始真正聚焦：不是繼續加', content: '第四組第三週開始真正聚焦：不是繼續加很多條件，而是慢慢逼近火焰失穩的臨界條件。', author: 'u41', x: 7300, y: 475, parentId: 'g4-w3-26', date: dates.w3+26000, cluster: 'C', promisingness: 88 }, // 熱點
                // --- G4 Week 4 (Base X: 6700) ---
                { id: 'g4-w4-1', topicId: 't-g4', type: 'question', title: '如果我們只用『有沒有熄』當唯一標準 (W4 主節點)', content: '如果我們只用『有沒有熄』當唯一標準，其實會漏掉很多有價值的變化。那第四組現在要怎麼 定義『有效』，才不會太粗？', author: 'u41', x: 6700, y: 350, parentId: 'g4-w3-ra', date: dates.w4, cluster: 'A', promisingness: 75 },
                { id: 'g4-w4-2', topicId: 't-g4', type: 'buildon', title: '我覺得至少可以分三層：無明顯影響、有', content: '我覺得至少可以分三層：無明顯影響、有明顯擾動/接近失穩、成功 熄滅。這樣比較能看出過程。', author: 'u41', x: 7050, y: 350, parentId: 'g4-w4-1', date: dates.w4+1000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w4-3', topicId: 't-g4', type: 'counter', title: '但如果只看過程又不看最後結果', content: '但如果只看過程又不看最後結果，也不行。因為真正滅火還是要回到實際效果，不然會變得很 會講現象但不夠扎實。', author: 'u41', x: 7400, y: 350, parentId: 'g4-w4-2', date: dates.w4+2000, cluster: 'A', promisingness: 63 },
                { id: 'g4-w4-4', topicId: 't-g4', type: 'improve', title: '所以我覺得判準應該是：有沒有熄滅是最', content: '所以我覺得判準應該是：有沒有熄滅是最終結果；有沒有持續擾動、接近 失穩、能否重複出現，是過程證據。兩個都要。', author: 'u41', x: 7750, y: 350, parentId: 'g4-w4-3', date: dates.w4+3000, cluster: 'B', promisingness: 68 },
                { id: 'g4-w4-5', topicId: 't-g4', type: 'buildon', title: '這樣後面我們做分析時就不會只剩成功次', content: '這樣後面我們做分析時就不會只剩成功次數，還會有條件和現象之間的關係。', author: 'u41', x: 8100, y: 350, parentId: 'g4-w4-4', date: dates.w4+4000, cluster: 'B', promisingness: 60 },
                { id: 'g4-w4-6', topicId: 't-g4', type: 'riseabove', title: '我覺得第四組這週的進展', content: '我覺得第四組這週的進展，是從『結果導向』走到『結果 + 機制證據並重』。這樣才比較像研究，而不是只秀 一次成功。', author: 'u41', x: 8450, y: 350, parentId: 'g4-w4-5', date: dates.w4+5000, cluster: 'A', promisingness: 85 }, // 熱點
